name: Update OSRS Prices

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at midnight UTC to keep prices fresh
    - cron: '0 0 * * *'

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Fetch and update OSRS prices
        run: node scripts/fetch-prices.cjs

      - name: Check if prices changed
        id: changed
        run: |
          if git diff --quiet src/data/items.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push price updates
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Price Update Bot"
          git add src/data/items.json
          git commit -m "chore: Update OSRS prices from wiki API"
          git push
