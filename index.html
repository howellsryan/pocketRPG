<style>
:root {
  --color-parchment: #f5e6c8;
  --color-parchment-dark: #e8d5a8;
  --color-ink: #1a1a0e;
  --color-ink-light: #3d3a2e;
  --color-gold: #d4a017;
  --color-gold-light: #f0c040;
  --color-gold-dim: #8b6914;
  --color-blood: #8b1a1a;
  --color-blood-mid: #6b1414;
  --color-blood-light: #c0392b;
  --color-emerald: #1a6b3c;
  --color-emerald-mid: #1d7a44;
  --color-emerald-light: #27ae60;
  --color-mana: #2c5aa0;
  --color-mana-light: #3498db;
  --color-void: #0f0f0f;
  --color-void-light: #1a1a1a;
  --color-void-lighter: #252525;
  --color-void-border: #333;
  --color-xp-bar: #3cb043;
  --color-hp-green: #27ae60;
  --color-hp-yellow: #f39c12;
  --color-hp-red: #c0392b;
  --font-display: 'Cinzel', serif;
  --font-body: 'Nunito', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html, body, #app {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: var(--color-void);
  color: var(--color-parchment);
  font-family: var(--font-body);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--color-void-light); }
::-webkit-scrollbar-thumb { background: var(--color-void-border); border-radius: 2px; }

/* Toast animations */
@keyframes toast-in {
  from { transform: translateY(-100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes toast-out {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100%); opacity: 0; }
}
.toast-enter { animation: toast-in 0.3s ease-out forwards; }
.toast-exit { animation: toast-out 0.3s ease-in forwards; }

/* Progress bar animation */
@keyframes progress-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.progress-active { animation: progress-pulse 1.2s ease-in-out infinite; }

/* Combat hit flash */
@keyframes hit-flash {
  0% { background-color: rgba(192, 57, 43, 0.3); }
  100% { background-color: transparent; }
}
.hit-flash { animation: hit-flash 0.3s ease-out; }

/* Safe area */
.pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
.mb-safe { margin-bottom: env(safe-area-inset-bottom); }
</style>

/**
 * Random integer between min and max (inclusive)
 */
function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
/**
 * Format a number with commas: 1234567 → "1,234,567"
 */
function formatNumber(n) {
    return n.toLocaleString('en-US');
}
/**
 * Format ticks to human-readable time
 */
function ticksToTime(ticks) {
    const seconds = (ticks * 0.6);
    if (seconds < 60)
        return `${seconds.toFixed(1)}s`;
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}m ${secs}s`;
}
/**
 * Clamp a value between min and max
 */
function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}
/**
 * Deep clone a plain object
 */
function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
}
/**
 * FNV-1a hash for save integrity
 */
function fnv1a(str) {
    let hash = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 0x01000193);
    }
    return (hash >>> 0).toString(16);
}
/**
 * Debounce a function
 */
function debounce(fn, ms) {
    let timer;
    return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), ms);
    };
}
/**
 * Calculate combat level from skills (OSRS formula)
 */
function calcCombatLevel(stats) {
    const base = 0.25 * (stats.defence + stats.hitpoints + Math.floor(stats.prayer / 2));
    const melee = 0.325 * (stats.attack + stats.strength);
    const range = 0.325 * Math.floor(stats.ranged * 1.5);
    const mage = 0.325 * Math.floor(stats.magic * 1.5);
    return Math.floor(base + Math.max(melee, range, mage));
}

// ── engine/experience.js ──

// Pre-compute XP table using exact OSRS formula
// totalXP(L) = floor( sum(x=1 to L-1) of floor(x + 300 * 2^(x/7)) / 4 )
const XP_TABLE = new Array(MAX_LEVEL + 1);
XP_TABLE[1] = 0;
function buildXPTable() {
    let cumulative = 0;
    for (let level = 1; level < MAX_LEVEL; level++) {
        cumulative += Math.floor(level + 300 * Math.pow(2, level / 7));
        XP_TABLE[level + 1] = Math.floor(cumulative / 4);
    }
}
buildXPTable();
/**
 * Get total XP required for a given level
 */
function getXPForLevel(level) {
    if (level < 1)
        return 0;
    if (level > MAX_LEVEL)
        return XP_TABLE[MAX_LEVEL];
    return XP_TABLE[level];
}
/**
 * Get level from total XP (binary search)
 */
function getLevelFromXP(xp) {
    if (xp < 0)
        return 1;
    let lo = 1, hi = MAX_LEVEL;
    while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        if (XP_TABLE[mid] <= xp)
            lo = mid;
        else
            hi = mid - 1;
    }
    return lo;
}
/**
 * XP remaining to reach the next level
 */
function getXPToNextLevel(currentXP) {
    const level = getLevelFromXP(currentXP);
    if (level >= MAX_LEVEL)
        return 0;
    return XP_TABLE[level + 1] - currentXP;
}
/**
 * Progress fraction (0-1) toward next level
 */
function getLevelProgress(currentXP) {
    const level = getLevelFromXP(currentXP);
    if (level >= MAX_LEVEL)
        return 1;
    const thisLevelXP = XP_TABLE[level];
    const nextLevelXP = XP_TABLE[level + 1];
    return (currentXP - thisLevelXP) / (nextLevelXP - thisLevelXP);
}
/**
 * Clamp XP to max
 */
function clampXP(xp) {
    return Math.min(xp, MAX_XP);
}

// ── engine/formulas.js ──

/**
 * Calculate effective strength level for max hit
 */
function effectiveStrength(strengthLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
    return Math.floor((strengthLevel + potionBonus) * prayerMult) + styleBonus + 8;
}
/**
 * Calculate melee max hit
 */
function meleeMaxHit(effectiveStr, equipmentStrengthBonus, gearMult = 1.0) {
    const base = Math.floor(0.5 + effectiveStr * (equipmentStrengthBonus + 64) / 640);
    return Math.floor(base * gearMult);
}
/**
 * Calculate effective attack level for accuracy
 */
function effectiveAttack(attackLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
    return Math.floor((attackLevel + potionBonus) * prayerMult) + styleBonus + 8;
}
/**
 * Calculate max attack roll
 */
function maxAttackRoll(effectiveAtk, equipmentAttackBonus) {
    return effectiveAtk * (equipmentAttackBonus + 64);
}
/**
 * Calculate max defence roll (monster or player)
 */
function maxDefenceRoll(defenceLevel, styleDefenceBonus) {
    return (defenceLevel + 9) * (styleDefenceBonus + 64);
}
/**
 * Calculate hit chance (accuracy) from attack and defence rolls
 */
function hitChance(atkRoll, defRoll) {
    if (atkRoll > defRoll) {
        return 1 - (defRoll + 2) / (2 * (atkRoll + 1));
    }
    else {
        return atkRoll / (2 * (defRoll + 1));
    }
}
/**
 * Roll damage for an attack
 * Returns 0 for miss, 1-maxHit for hit (simplified from OSRS)
 */
function rollDamage(accuracy, maxHit) {
    if (Math.random() < accuracy) {
        return randInt(1, Math.max(1, maxHit));
    }
    return 0;
}
// ── Ranged ──
function effectiveRanged(rangedLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
    return Math.floor((rangedLevel + potionBonus) * prayerMult) + styleBonus + 8;
}
function rangedMaxHit(effectiveRng, rangedStrengthBonus) {
    return Math.floor(0.5 + effectiveRng * (rangedStrengthBonus + 64) / 640);
}
// ── Magic ──
function effectiveMagic(magicLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
    return Math.floor((magicLevel + potionBonus) * prayerMult) + styleBonus + 8;
}
/**
 * Monster magic defence roll (70% Magic + 30% Defence)
 */
function monsterMagicDefenceRoll(monsterMagicLevel, monsterDefenceLevel, magicDefenceBonus) {
    const effectiveDef = Math.floor(monsterMagicLevel * 0.7) + Math.floor(monsterDefenceLevel * 0.3) + 9;
    return effectiveDef * (magicDefenceBonus + 64);
}
/**
 * Magic max hit (spell-based + equipment bonus)
 */
function magicMaxHit(spellBaseDamage, magicDamageBonus = 0) {
    return Math.floor(spellBaseDamage * (1 + magicDamageBonus / 100));
}

/**

function getMeleeStyleBonuses(stance) {
    switch (stance) {
        case 'accurate': return { attackStyleBonus: 3, strengthStyleBonus: 0, defenceStyleBonus: 0 };
        case 'aggressive': return { attackStyleBonus: 0, strengthStyleBonus: 3, defenceStyleBonus: 0 };
        case 'controlled': return { attackStyleBonus: 1, strengthStyleBonus: 1, defenceStyleBonus: 1 };
        case 'defensive': return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 3 };
        default: return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 0 };

}

function getMeleeXPSkill(stance) {

function getPotionBonus(potionType, baseLevel) {

/**
 * Create empty equipment set
 */
function createEquipment() {
    const eq = {};
    for (const slot of EQUIPMENT_SLOTS) {
        eq[slot] = null; // null = empty, or { itemId }
    }
    return eq;
}
/**
 * Equip an item. Returns { equipped: true, unequipped: [] } or { equipped: false }
 * Handles 2H weapon / shield conflicts.
 */
function equipItem(equipment, itemData) {
    const slot = itemData.slot;
    if (!slot || !EQUIPMENT_SLOTS.includes(slot))
        return { equipped: false, unequipped: [] };
    const unequipped = [];
    // 2H weapon clears shield
    if (slot === 'weapon' && itemData.twoHanded) {
        if (equipment.shield) {
            unequipped.push(equipment.shield);
            equipment.shield = null;
        }
    }
    // Shield clears 2H weapon (need to check current weapon)
    if (slot === 'shield' && equipment.weapon) {
        // The caller must pass the current weapon's itemData to check twoHanded
        // For now we store a flag on the equipment entry
        if (equipment.weapon._twoHanded) {
            unequipped.push(equipment.weapon);
            equipment.weapon = null;
        }
    }
    // Unequip current item in this slot
    if (equipment[slot]) {
        unequipped.push(equipment[slot]);
    }
    equipment[slot] = {
        itemId: itemData.id,
        _twoHanded: itemData.twoHanded || false
    };
    return { equipped: true, unequipped };
}
/**
 * Unequip a slot. Returns the item that was removed (or null).
 */
function unequipSlot(equipment, slot) {
    const item = equipment[slot];
    equipment[slot] = null;
    return item;
}
/**
 * Aggregate equipment bonuses from all slots.
 * itemsData is the items.json lookup object.
 */
function getEquipmentBonuses(equipment, itemsData) {
    const bonuses = {
        attackBonus: { stab: 0, slash: 0, crush: 0, magic: 0, ranged: 0 },
        defenceBonus: { stab: 0, slash: 0, crush: 0, magic: 0, ranged: 0 },
        otherBonus: { meleeStrength: 0, rangedStrength: 0, magicDamage: 0 }
    };
    for (const slot of EQUIPMENT_SLOTS) {
        if (!equipment[slot])
            continue;
        const item = itemsData[equipment[slot].itemId];
        if (!item)
            continue;
        if (item.attackBonus) {
            for (const [k, v] of Object.entries(item.attackBonus)) {
                bonuses.attackBonus[k] = (bonuses.attackBonus[k] || 0) + v;
            }
        }
        if (item.defenceBonus) {
            for (const [k, v] of Object.entries(item.defenceBonus)) {
                bonuses.defenceBonus[k] = (bonuses.defenceBonus[k] || 0) + v;
            }
        }
        if (item.otherBonus) {
            for (const [k, v] of Object.entries(item.otherBonus)) {
                bonuses.otherBonus[k] = (bonuses.otherBonus[k] || 0) + v;
            }
        }
    }
    return bonuses;
}
/**
 * Get the attack speed of the equipped weapon (default 4 ticks unarmed)
 */
function getAttackSpeed(equipment, itemsData) {
    if (!equipment.weapon)
        return 4;
    const weapon = itemsData[equipment.weapon.itemId];
    return weapon?.attackSpeed || 4;
}
/**
 * Get the attack style of the equipped weapon
 */
function getAttackStyle(equipment, itemsData) {
    if (!equipment.weapon)
        return 'crush'; // unarmed
    const weapon = itemsData[equipment.weapon.itemId];
    return weapon?.attackStyle || 'crush';
}

/**
 * Create a fresh empty inventory (array of 28 slots)
 * Each slot is null (empty) or { itemId, quantity }
 */
function createInventory() {
    return new Array(INVENTORY_SIZE).fill(null);
}
/**
 * Count free slots
 */
function freeSlots(inventory) {
    return inventory.filter(s => s === null).length;
}
/**
 * Find the first slot containing a specific item
 */
function findItem(inventory, itemId) {
    return inventory.findIndex(s => s && s.itemId === itemId);
}
/**
 * Find all slots containing a specific item
 */
function findAllItems(inventory, itemId) {
    const slots = [];
    for (let i = 0; i < inventory.length; i++) {
        if (inventory[i] && inventory[i].itemId === itemId)
            slots.push(i);
    }
    return slots;
}
/**
 * Count total quantity of an item across all slots
 */
function countItem(inventory, itemId) {
    return inventory.reduce((sum, slot) => {
        if (slot && slot.itemId === itemId)
            return sum + slot.quantity;
        return sum;
    }, 0);
}
/**
 * Add item to inventory. Returns true if successful, false if full.
 * Stackable items go into existing stack or new slot.
 * Non-stackable items take one slot each.
 */
function addItem(inventory, itemId, quantity, stackable = false) {
    if (stackable) {
        const existing = findItem(inventory, itemId);
        if (existing !== -1) {
            inventory[existing] = { ...inventory[existing], quantity: inventory[existing].quantity + quantity };
            return true;
        }
    }
    if (stackable) {
        const empty = inventory.indexOf(null);
        if (empty === -1)
            return false;
        inventory[empty] = { itemId, quantity };
        return true;
    }
    // Non-stackable: need `quantity` free slots
    for (let q = 0; q < quantity; q++) {
        const empty = inventory.indexOf(null);
        if (empty === -1)
            return false;
        inventory[empty] = { itemId, quantity: 1 };
    }
    return true;
}
/**
 * Remove quantity of an item. Returns true if successful.
 */
function removeItem(inventory, itemId, quantity = 1) {
    if (countItem(inventory, itemId) < quantity)
        return false;
    let remaining = quantity;
    for (let i = 0; i < inventory.length && remaining > 0; i++) {
        if (inventory[i] && inventory[i].itemId === itemId) {
            const take = Math.min(inventory[i].quantity, remaining);
            inventory[i].quantity -= take;
            remaining -= take;
            if (inventory[i].quantity <= 0)
                inventory[i] = null;
        }
    }
    return true;
}
/**
 * Swap two inventory slots
 */
function swapSlots(inventory, slotA, slotB) {
    const temp = inventory[slotA];
    inventory[slotA] = inventory[slotB];
    inventory[slotB] = temp;
}

// ── engine/combat.js ──




/**
 * Create a new combat state
 */
function createCombatState(monster, combatType = 'melee', stance = 'accurate', spell = null) {
    return {
        active: true,
        monster: { ...monster, currentHP: monster.hitpoints },
        combatType, // 'melee', 'ranged', 'magic'
        stance, // 'accurate', 'aggressive', 'controlled', 'defensive', 'rapid', 'longrange'
        spell, // spell object for magic combat
        playerAttackTimer: 0,
        monsterAttackTimer: 0,
        eatCooldown: 0,
        potionCooldown: 0,
        log: [], // combat log entries
        tickCount: 0,
        xpGained: {}, // accumulated xp per skill
        loot: null // set on monster death
    };
}
/**
 * Process one combat tick.
 * Returns { combatState, events[] }
 * events: { type: 'playerHit'|'monsterHit'|'monsterDeath'|'playerDeath'|'xp'|'levelUp', ... }
 */
function processCombatTick(combatState, playerStats, equipment, itemsData) {
    const state = { ...combatState };
    const events = [];
    state.tickCount++;
    // Decrement cooldowns
    if (state.playerAttackTimer > 0)
        state.playerAttackTimer--;
    if (state.monsterAttackTimer > 0)
        state.monsterAttackTimer--;
    if (state.eatCooldown > 0)
        state.eatCooldown--;
    if (state.potionCooldown > 0)
        state.potionCooldown--;
    const bonuses = getEquipmentBonuses(equipment, itemsData);
    const weaponSpeed = getAttackSpeed(equipment, itemsData);
    const weaponStyle = getAttackStyle(equipment, itemsData);
    const monster = state.monster;
    // ── Player Attack ──
    if (state.playerAttackTimer <= 0 && state.eatCooldown <= 0) {
        let damage = 0;
        let xpSkills = {};
        if (state.combatType === 'melee') {
            const styleBonuses = getMeleeStyleBonuses(state.stance);
            const effStr = effectiveStrength(playerStats.strength, 0, 1.0, styleBonuses.strengthStyleBonus);
            const maxHit = meleeMaxHit(effStr, bonuses.otherBonus.meleeStrength);
            const effAtk = effectiveAttack(playerStats.attack, 0, 1.0, styleBonuses.attackStyleBonus);
            const atkRoll = maxAttackRoll(effAtk, bonuses.attackBonus[weaponStyle] || 0);
            const defRoll = maxDefenceRoll(monster.stats.defence, monster.defenceBonus[weaponStyle] || 0);
            const acc = hitChance(atkRoll, defRoll);
            damage = rollDamage(acc, maxHit);
            if (damage > 0) {
                const xpSkill = getMeleeXPSkill(state.stance);
                if (Array.isArray(xpSkill)) {
                    const per = Math.floor(damage * MELEE_XP_PER_DAMAGE / 3);
                    for (const s of xpSkill)
                        xpSkills[s] = per;
                }
                else {
                    xpSkills[xpSkill] = damage * MELEE_XP_PER_DAMAGE;
                }
                xpSkills.hitpoints = Math.floor(damage * HP_XP_PER_DAMAGE);
            }
        }
        else if (state.combatType === 'ranged') {
            const styleBonus = getRangedStyleBonus(state.stance);
            const effRng = effectiveRanged(playerStats.ranged, 0, 1.0, styleBonus);
            const maxHit = rangedMaxHit(effRng, bonuses.otherBonus.rangedStrength);
            const atkRoll = maxAttackRoll(effRng, bonuses.attackBonus.ranged || 0);
            const defRoll = maxDefenceRoll(monster.stats.defence, monster.defenceBonus.ranged || 0);
            const acc = hitChance(atkRoll, defRoll);
            damage = rollDamage(acc, maxHit);
            if (damage > 0) {
                xpSkills.ranged = damage * RANGED_XP_PER_DAMAGE;
                xpSkills.hitpoints = Math.floor(damage * HP_XP_PER_DAMAGE);
            }
        }
        else if (state.combatType === 'magic' && state.spell) {
            const effMag = effectiveMagic(playerStats.magic);
            const atkRoll = maxAttackRoll(effMag, bonuses.attackBonus.magic || 0);
            const defRoll = monsterMagicDefenceRoll(monster.stats.magic, monster.stats.defence, monster.defenceBonus.magic || 0);
            const acc = hitChance(atkRoll, defRoll);
            const maxHit = magicMaxHit(state.spell.baseDamage, bonuses.otherBonus.magicDamage);
            damage = rollDamage(acc, maxHit);
            // Magic always grants base spell XP on cast
            xpSkills.magic = (state.spell.baseXP || 0);
            if (damage > 0) {
                xpSkills.magic += damage * MAGIC_XP_PER_DAMAGE;
                xpSkills.hitpoints = Math.floor(damage * HP_XP_PER_DAMAGE);
            }
        }
        monster.currentHP -= damage;
        events.push({ type: 'playerHit', damage, monsterHP: monster.currentHP });
        // Accumulate XP
        for (const [skill, xp] of Object.entries(xpSkills)) {
            state.xpGained[skill] = (state.xpGained[skill] || 0) + xp;
        }
        // Reset attack timer
        let speed = weaponSpeed;
        if (state.combatType === 'ranged' && state.stance === 'rapid')
            speed = Math.max(1, speed - 1);
        state.playerAttackTimer = speed;
        // Check monster death
        if (monster.currentHP <= 0) {
            monster.currentHP = 0;
            state.active = false;
            // Roll drops
            state.loot = rollDrops(monster);
            events.push({ type: 'monsterDeath', loot: state.loot, xpGained: { ...state.xpGained } });
            return { combatState: state, events };
        }
    }
    // ── Monster Attack ──
    if (state.monsterAttackTimer <= 0) {
        const monsterEffAtk = (monster.stats.attack + 9);
        const monsterAtkRoll = monsterEffAtk * ((monster.attackBonus || 0) + 64);
        // Player defence
        const playerDefLevel = playerStats.defence;
        const styleBonuses = getMeleeStyleBonuses(state.stance);
        const effDef = Math.floor(playerDefLevel) + styleBonuses.defenceStyleBonus + 8;
        const defRoll = effDef * ((bonuses.defenceBonus[monster.attackStyle] || bonuses.defenceBonus.crush || 0) + 64);
        const acc = hitChance(monsterAtkRoll, defRoll);
        const monsterMaxHit = Math.floor(0.5 + (monster.stats.strength + 8) * ((monster.strengthBonus || 0) + 64) / 640);
        const damage = rollDamage(acc, monsterMaxHit);
        events.push({ type: 'monsterHit', damage, playerHP: playerStats.currentHP - damage });
        state.monsterAttackTimer = monster.attackSpeed || 4;
    }
    state.monster = monster;
    return { combatState: state, events };
}
/**
 * Roll monster drops
 */
function rollDrops(monster) {
    if (!monster.drops)
        return [];
    const loot = [];
    for (const drop of monster.drops) {
        if (Math.random() < drop.chance) {
            const qty = Array.isArray(drop.quantity)
                ? Math.floor(Math.random() * (drop.quantity[1] - drop.quantity[0] + 1)) + drop.quantity[0]
                : drop.quantity;
            loot.push({ itemId: drop.itemId, quantity: qty });
        }
    }
    return loot;
}
/**
 * Apply eat action — delays player attack by EAT_TICK_COST
 */
function applyEat(combatState) {
    return { ...combatState, eatCooldown: EAT_TICK_COST, playerAttackTimer: Math.max(combatState.playerAttackTimer, EAT_TICK_COST) };
}

// ── engine/skilling.js ──


/**
 * Create a skilling session state
 */
function createSkillingState(skill, action) {
    return {
        active: true,
        skill, // e.g. 'mining'
        action, // action object from skills data { id, name, level, ticks, xp, product, ... }
        ticksRemaining: action.ticks,
        totalActions: 0,
        totalXP: 0,
        stopped: false
    };
}
/**
 * Process one skilling tick.
 * Returns { skillingState, events[] }
 * events: { type: 'actionComplete'|'inventoryFull'|'xp'|'levelUp'|'burned', ... }
 */
function processSkillingTick(skillingState) {
    const state = { ...skillingState };
    const events = [];
    if (!state.active || state.stopped)
        return { skillingState: state, events };
    state.ticksRemaining--;
    if (state.ticksRemaining <= 0) {
        // Action completed
        state.totalActions++;
        state.totalXP += state.action.xp;
        events.push({
            type: 'actionComplete',
            skill: state.skill,
            action: state.action,
            xp: state.action.xp,
            product: state.action.product || null
        });
        // Reset for next action
        state.ticksRemaining = state.action.ticks;
    }
    return { skillingState: state, events };
}
/**
 * Check if player can perform this skilling action
 */
function canPerformAction(action, skillXP, inventory, itemsData) {
    const level = getLevelFromXP(skillXP);
    if (level < action.level)
        return { can: false, reason: `Requires ${action.skillName || 'skill'} level ${action.level}` };
    // Check required materials
    if (action.materials) {
        for (const [itemId, qty] of Object.entries(action.materials)) {
            const count = inventory.filter(s => s && s.itemId === itemId).reduce((sum, s) => sum + s.quantity, 0);
            if (count < qty) {
                const item = itemsData[itemId];
                return { can: false, reason: `Need ${qty} ${item?.name || itemId}` };
            }
        }
    }
    return { can: true };
}
/**
 * Check if food burns during cooking
 * Burn chance decreases linearly from base to 0 at burnStopLevel
 */
function checkBurn(cookingLevel, recipe) {
    if (!recipe.burnStopLevel)
        return false;
    if (cookingLevel >= recipe.burnStopLevel)
        return false;
    const range = recipe.burnStopLevel - recipe.level;
    const progress = cookingLevel - recipe.level;
    const burnChance = COOKING_BURN_BASE_CHANCE * (1 - progress / range);
    return Math.random() < burnChance;
}
/**
 * Get available actions for a skill at a given level
 */
function getAvailableActions(skillActions, skillXP) {
    const level = getLevelFromXP(skillXP);
    return skillActions.filter(a => a.level <= level);
}

// ── engine/tick.js ──

let tickInterval = null;
let tickCount = 0;
let listeners = [];
let paused = false;
/**
 * Register a tick listener. Called every game tick with the current tick count.
 * Returns an unsubscribe function.
 */
function onTick(callback) {
    listeners.push(callback);
    return () => {
        listeners = listeners.filter(l => l !== callback);
    };
}
/**
 * Start the tick loop
 */
function startTicks() {
    if (tickInterval)
        return;
    tickInterval = setInterval(() => {
        if (paused)
            return;
        tickCount++;
        for (const listener of listeners) {
            try {
                listener(tickCount);
            }
            catch (e) {
                console.error('Tick listener error:', e);
            }
        }
    }, TICK_DURATION);
}
/**
 * Stop the tick loop
 */
function stopTicks() {
    if (tickInterval) {
        clearInterval(tickInterval);
        tickInterval = null;
    }
}
/**
 * Pause/resume ticks (for background tab handling)
 */
function pauseTicks() { paused = true; }
function resumeTicks() { paused = false; }
/**
 * Get current tick count
 */
function getTickCount() { return tickCount; }
/**
 * Reset tick count (for new game)
 */
function resetTicks() { tickCount = 0; }

// ── db/database.js ──

const DB_NAME = 'PocketRPG';
const DB_VERSION = 1;
let dbInstance = null;
/**
 * Get or create the database instance.
 * Handles stale connections (e.g. iOS Safari kills background tabs).
 */
async function getDB() {
    // If we have an instance, do a quick health-check before returning it
    if (dbInstance) {
        try {
            // A lightweight read to confirm the connection is alive
            await dbInstance.get('settings', '__healthcheck__');
            return dbInstance;
        }
        catch (e) {
            // Connection is dead — clear it and reconnect
            console.warn('[PocketRPG] DB connection stale, reconnecting...', e);
            try {
                dbInstance.close();
            }
            catch (_) { }
            dbInstance = null;
        }
    }
    dbInstance = await openDB(DB_NAME, DB_VERSION, {
        upgrade(db, oldVersion) {
            // Version 1: initial schema
            if (oldVersion < 1) {
                db.createObjectStore('player'); // key: 'profile'
                db.createObjectStore('stats'); // key: skill name
                db.createObjectStore('inventory'); // key: slot index
                db.createObjectStore('bank'); // key: item ID
                db.createObjectStore('equipment'); // key: slot name
                db.createObjectStore('settings'); // key: setting key
                db.createObjectStore('shortcuts'); // key: shortcut index
            }
        }
    });
    return dbInstance;
}
/**
 * Force-close and clear the DB instance (call before re-opening after error)
 */
function closeDB() {
    if (dbInstance) {
        try {
            dbInstance.close();
        }
        catch (_) { }
        dbInstance = null;
    }
}
/**
 * Check if a save exists
 */
async function hasSave() {
    const db = await getDB();
    const profile = await db.get('player', 'profile');
    return !!profile;
}
/**
 * Delete the entire database
 */
async function deleteDB() {
    if (dbInstance) {
        dbInstance.close();
        dbInstance = null;
    }
    await indexedDB.deleteDatabase(DB_NAME);
}
/**
 * Get all data from a store
 */
async function getAllFromStore(storeName) {
    const db = await getDB();
    return db.getAll(storeName);
}
/**
 * Get all keys from a store
 */
async function getAllKeysFromStore(storeName) {
    const db = await getDB();
    return db.getAllKeys(storeName);
}

// ── Player Profile ──
async function getPlayer() {
    const db = await getDB();
    return db.get('player', 'profile');
}
async function savePlayer(profile) {
    const db = await getDB();
    return db.put('player', profile, 'profile');
}
// ── Stats ──
async function getStat(skill) {
    const db = await getDB();
    return db.get('stats', skill);
}
async function getAllStats() {
    const db = await getDB();
    const stats = {};
    for (const skill of ALL_SKILLS) {
        const data = await db.get('stats', skill);
        stats[skill] = data || { skill, xp: 0, level: 1 };
    }
    return stats;
}
async function saveStat(skill, data) {
    const db = await getDB();
    return db.put('stats', data, skill);
}
async function saveAllStats(stats) {
    const db = await getDB();
    const tx = db.transaction('stats', 'readwrite');
    for (const [skill, data] of Object.entries(stats)) {
        tx.store.put(data, skill);
    }
    await tx.done;
}
// ── Inventory ──
async function getInventory() {
    const db = await getDB();
    const inv = new Array(INVENTORY_SIZE).fill(null);
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        const item = await db.get('inventory', i);
        if (item)
            inv[i] = item;
    }
    return inv;
}
async function saveInventory(inventory) {
    const db = await getDB();
    const tx = db.transaction('inventory', 'readwrite');
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        if (inventory[i]) {
            tx.store.put(inventory[i], i);
        }
        else {
            tx.store.delete(i);
        }
    }
    await tx.done;
}
// ── Bank ──
async function getBank() {
    const db = await getDB();
    const keys = await db.getAllKeys('bank');
    const bank = {};
    for (const key of keys) {
        bank[key] = await db.get('bank', key);
    }
    return bank;
}
async function saveBank(bank) {
    const db = await getDB();
    const tx = db.transaction('bank', 'readwrite');
    await tx.store.clear();
    for (const [itemId, data] of Object.entries(bank)) {
        tx.store.put(data, itemId);
    }
    await tx.done;
}

// ── New Game Initialization ──
async function initNewGame(playerName) {
    const db = await getDB();
    // Player profile
    await db.put('player', {
        name: playerName,
        created: Date.now(),
        totalPlayTime: 0
    }, 'profile');
    // Initialize all skills
    const tx = db.transaction('stats', 'readwrite');
    for (const skill of ALL_SKILLS) {
        const xp = skill === 'hitpoints' ? HITPOINTS_START_XP : 0;
        const level = skill === 'hitpoints' ? 10 : 1;
        tx.store.put({ skill, xp, level }, skill);
    }
    await tx.done;
    // Empty inventory, bank, equipment
    await saveInventory(new Array(INVENTORY_SIZE).fill(null));
    await saveBank({});
    const eq = {};
    for (const s of EQUIPMENT_SLOTS)
        eq[s] = null;
    await saveEquipment(eq);
    // Give starter items
    const starterInv = new Array(INVENTORY_SIZE).fill(null);
    starterInv[0] = { itemId: 'bronze_dagger', quantity: 1 };
    starterInv[1] = { itemId: 'bronze_scimitar', quantity: 1 };
    starterInv[2] = { itemId: 'bronze_full_helm', quantity: 1 };
    starterInv[3] = { itemId: 'bronze_platebody', quantity: 1 };
    starterInv[4] = { itemId: 'bronze_platelegs', quantity: 1 };
    starterInv[5] = { itemId: 'bronze_kiteshield', quantity: 1 };
    starterInv[6] = { itemId: 'shrimp', quantity: 1 };
    starterInv[7] = { itemId: 'shrimp', quantity: 1 };
    starterInv[8] = { itemId: 'shrimp', quantity: 1 };
    starterInv[9] = { itemId: 'shrimp', quantity: 1 };
    starterInv[10] = { itemId: 'shrimp', quantity: 1 };
    starterInv[11] = { itemId: 'coins', quantity: 25 };
    await saveInventory(starterInv);
}

// ── db/saveload.js ──



const SAVE_VERSION = 1;
/**
 * Export entire game state to a downloadable file
 */
async function exportSave() {
    const db = await getDB();
    const data = {
        version: SAVE_VERSION,
        timestamp: Date.now(),
        player: await db.get('player', 'profile'),
        stats: {},
        inventory: [],
        bank: {},
        equipment: {},
        settings: {}
    };
    // Stats
    for (const skill of ALL_SKILLS) {
        data.stats[skill] = await db.get('stats', skill);
    }
    // Inventory
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        data.inventory[i] = await db.get('inventory', i) || null;
    }
    // Bank
    const bankKeys = await db.getAllKeys('bank');
    for (const key of bankKeys) {
        data.bank[key] = await db.get('bank', key);
    }
    // Equipment
    for (const slot of EQUIPMENT_SLOTS) {
        data.equipment[slot] = await db.get('equipment', slot) || null;
    }
    // Settings
    const settingKeys = await db.getAllKeys('settings');
    for (const key of settingKeys) {
        data.settings[key] = await db.get('settings', key);
    }
    const json = JSON.stringify(data);
    const hash = fnv1a(json);
    const payload = JSON.stringify({ hash, data: json });
    const encoded = btoa(payload);
    // Download
    const blob = new Blob([encoded], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pocketrpg_${data.player?.name || 'save'}_${Date.now()}.pocketrpg`;
    a.click();
    URL.revokeObjectURL(url);
}
/**
 * Import a save file
 */
async function importSave(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const decoded = atob(e.target.result);
                const { hash, data: json } = JSON.parse(decoded);
                // Verify integrity
                if (fnv1a(json) !== hash) {
                    reject(new Error('Save file integrity check failed'));
                    return;
                }
                const data = JSON.parse(json);
                // Wipe and recreate
                await deleteDB();
                // dynamic import removed — getDB is global
                const db = await getDB();
                // Restore player
                if (data.player)
                    await db.put('player', data.player, 'profile');
                // Restore stats
                const statsTx = db.transaction('stats', 'readwrite');
                for (const [skill, val] of Object.entries(data.stats)) {
                    if (val)
                        statsTx.store.put(val, skill);
                }
                await statsTx.done;
                // Restore inventory
                const invTx = db.transaction('inventory', 'readwrite');
                for (let i = 0; i < INVENTORY_SIZE; i++) {
                    if (data.inventory[i])
                        invTx.store.put(data.inventory[i], i);
                }
                await invTx.done;
                // Restore bank
                const bankTx = db.transaction('bank', 'readwrite');
                for (const [key, val] of Object.entries(data.bank)) {
                    bankTx.store.put(val, key);
                }
                await bankTx.done;
                // Restore equipment
                const eqTx = db.transaction('equipment', 'readwrite');
                for (const [slot, val] of Object.entries(data.equipment)) {
                    if (val)
                        eqTx.store.put(val, slot);
                }

const TYPE_EMOJIS = {
    weapon: '🗡️', armour: '🛡️', food: '🍖', resource: '📦', ammo: '🏹',
    currency: '🪙', junk: '🗑️', tool: '🔧'
};
function BankScreen() {
    const { bank, inventory, updateBank, updateInventory, addToast, itemsData } = useGame();
    const [selected, setSelected] = useState(null);
    const bankItems = Object.values(bank).filter(b => b && b.quantity > 0);
    const handleWithdraw = (itemId, qty = 1) => {
        const bankEntry = bank[itemId];
        if (!bankEntry || bankEntry.quantity < qty)
            return;
        const item = itemsData[itemId];
        const newInv = [...inventory];
        let actualWithdrawn = 0;
        if (item?.stackable) {
            const existing = newInv.findIndex(s => s && s.itemId === itemId);
            if (existing !== -1) {
                newInv[existing] = { ...newInv[existing], quantity: newInv[existing].quantity + qty };
                actualWithdrawn = qty;
            }
            else {
                const empty = newInv.indexOf(null);
                if (empty === -1) {
                    addToast('Inventory full', 'error');
                    return;
                }
                newInv[empty] = { itemId, quantity: qty };
                actualWithdrawn = qty;
            }
        }
        else {
            for (let i = 0; i < qty; i++) {
                const empty = newInv.indexOf(null);
                if (empty === -1)
                    break;
                newInv[empty] = { itemId, quantity: 1 };
                actualWithdrawn++;
            }
            if (actualWithdrawn === 0) {
                addToast('Inventory full', 'error');
                return;
            }
        }
        const newBank = { ...bank };
        newBank[itemId] = { ...bankEntry, quantity: bankEntry.quantity - actualWithdrawn };
        if (newBank[itemId].quantity <= 0)
            delete newBank[itemId];
        updateInventory(newInv);
        updateBank(newBank);
        setSelected(null);
    };
    return (h("div", { class: "h-full overflow-y-auto p-4" },
        h("h2", { class: "font-[var(--font-display)] text-sm font-bold text-[var(--color-parchment)] opacity-60 uppercase tracking-wider mb-3" },
            "Bank (",
            bankItems.length,
            ")"),
        bankItems.length === 0 ? (h("div", { class: "text-center py-12 text-[var(--color-parchment)] opacity-30 text-sm" }, "Your bank is empty")) : (h("div", { class: "grid grid-cols-4 gap-2" }, bankItems.map(entry => {
            const item = itemsData[entry.itemId];
            if (!item)
                return null;
            const emoji = TYPE_EMOJIS[item.type] || '📦';
            return (h("button", { key: entry.itemId, onClick: () => setSelected(entry), class: "flex flex-col items-center p-2 rounded-lg bg-[#1a1a1a] border border-[#2a2a2a] active:bg-[#222]" },
                h("span", { class: "text-lg" }, emoji),
                h("span", { class: "text-[8px] text-[var(--color-parchment)] opacity-60 truncate w-full text-center" }, item.name),
                h("span", { class: "text-[9px] font-[var(--font-mono)] font-bold text-[var(--color-gold)]" },
                    "\u00D7",
                    entry.quantity)));
        }))),
        selected && (h(Modal, { title: itemsData[selected.itemId]?.name || selected.itemId, onClose: () => setSelected(null) },
            h("div", { class: "space-y-3" },
                h("div", { class: "text-center text-sm text-[var(--color-parchment)] opacity-60" },
                    "In bank: ",
                    h("span", { class: "font-[var(--font-mono)] text-[var(--color-gold)]" }, selected.quantity)),
                h("div", { class: "grid grid-cols-3 gap-2" },
                    [1, 5, 10].map(qty => (h("button", { key: qty, onClick: () => handleWithdraw(selected.itemId, Math.min(qty, selected.quantity)), class: "py-2.5 rounded-lg bg-[var(--color-mana)] text-white font-semibold text-sm active:opacity-80" },
                        "Take ",
                        qty))),
                    h("button", { onClick: () => handleWithdraw(selected.itemId, selected.quantity), class: "py-2.5 rounded-lg bg-[var(--color-gold-dim)] text-white font-semibold text-sm active:opacity-80 col-span-3" },
                        "Take All (",
                        selected.quantity,
                        ")")))))));

    const [quantities, setQuantities] = useState({});
    const coins = countItem(inventory, 'coins');
    const getQty = (id) => quantities[id] || 1;
    const setQty = (id, val) => {
        const n = Math.max(1, Math.min(9999, parseInt(val) || 1));
        setQuantities(q => ({ ...q, [id]: n }));
    };
    const handleBuy = (storeItem) => {
        const qty = getQty(storeItem.id);
        const totalCost = storeItem.price * qty;
        if (coins < totalCost) {
            addToast(`You need ${totalCost} coins but only have ${coins}.`, 'error');
            return;
        }
        const newInv = [...inventory];
        // Check space for non-stackable items
        if (!storeItem.stackable) {
            const free = freeSlots(newInv);
            if (free < qty) {
                addToast(`Not enough inventory space. You need ${qty} free slot${qty > 1 ? 's' : ''}.`, 'error');
                return;
            }
        }
        else {
            // For stackable, need at least 1 free slot unless already in inventory
            const existing = countItem(newInv, storeItem.id);
            if (existing === 0 && freeSlots(newInv) === 0) {
                addToast('Not enough inventory space.', 'error');
                return;
            }
        }
        // Deduct coins
        removeItem(newInv, 'coins', totalCost);
        // Add purchased items
        for (let i = 0; i < qty; i++) {
            addItem(newInv, storeItem.id, 1, storeItem.stackable);

function getAutoBankSeconds(agilityLevel) {

    // 120s at 1, 10s at 99 — linear
    return Math.round(120 - (110 * (lvl - 1) / 98));
