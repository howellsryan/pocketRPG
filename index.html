<style>
:root {
  --color-parchment: #f5e6c8;
  --color-parchment-dark: #e8d5a8;
  --color-ink: #1a1a0e;
  --color-ink-light: #3d3a2e;
  --color-gold: #d4a017;
  --color-gold-light: #f0c040;
  --color-gold-dim: #8b6914;
  --color-blood: #8b1a1a;
  --color-blood-mid: #6b1414;
  --color-blood-light: #c0392b;
  --color-emerald: #1a6b3c;
  --color-emerald-mid: #1d7a44;
  --color-emerald-light: #27ae60;
  --color-mana: #2c5aa0;
  --color-mana-light: #3498db;
  --color-void: #0f0f0f;
  --color-void-light: #1a1a1a;
  --color-void-lighter: #252525;
  --color-void-border: #333;
  --color-xp-bar: #3cb043;
  --color-hp-green: #27ae60;
  --color-hp-yellow: #f39c12;
  --color-hp-red: #c0392b;
  --font-display: 'Cinzel', serif;
  --font-body: 'Nunito', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html, body, #app {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: var(--color-void);
  color: var(--color-parchment);
  font-family: var(--font-body);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--color-void-light); }
::-webkit-scrollbar-thumb { background: var(--color-void-border); border-radius: 2px; }

/* Toast animations */
@keyframes toast-in {
  from { transform: translateY(-100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes toast-out {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100%); opacity: 0; }
}
.toast-enter { animation: toast-in 0.3s ease-out forwards; }
.toast-exit { animation: toast-out 0.3s ease-in forwards; }

/* Progress bar animation */
@keyframes progress-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.progress-active { animation: progress-pulse 1.2s ease-in-out infinite; }

/* Combat hit flash */
@keyframes hit-flash {
  0% { background-color: rgba(192, 57, 43, 0.3); }
  100% { background-color: transparent; }
}
.hit-flash { animation: hit-flash 0.3s ease-out; }

/* Safe area */
.pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
.mb-safe { margin-bottom: env(safe-area-inset-bottom); }
</style>

// ── utils/helpers.js ──
/**
 * Random integer between min and max (inclusive)
 */
function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}
/**
 * Format a number with commas: 1234567 → "1,234,567"
 */
function formatNumber(n) {
    return n.toLocaleString('en-US');
}
/**
 * Format an item quantity for display.
 * >= 10,000,000 → e.g. "956M" (isM: true, shown in green)
 * >= 100,000    → e.g. "105k" (isM: false, shown in gold)
 * otherwise     → plain number string
 */
function formatQuantity(n) {
    if (n >= 10000000)
        return { text: `${Math.floor(n / 1000000)}M`, isM: true };
    if (n >= 100000)
        return { text: `${Math.floor(n / 1000)}k`, isM: false };
    return { text: String(n), isM: false };
}
/**
 * Format ticks to human-readable time
 */
function ticksToTime(ticks) {
    const seconds = (ticks * 0.6);
    if (seconds < 60)
        return `${seconds.toFixed(1)}s`;
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}m ${secs}s`;
}
/**
 * Clamp a value between min and max
 */
function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}
/**
 * Deep clone a plain object
 */
function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
}
/**
 * FNV-1a hash for save integrity
 */
function fnv1a(str) {
    let hash = 0x811c9dc5;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 0x01000193);
    }
    return (hash >>> 0).toString(16);
}
/**
 * Debounce a function
 */
function debounce(fn, ms) {
    let timer;
    return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), ms);
    };
}
/**
 * Calculate combat level from skills
 */
function calcCombatLevel(stats) {
    const base = 0.25 * (stats.defence + stats.hitpoints + Math.floor(stats.prayer / 2));
    const melee = 0.325 * (stats.attack + stats.strength);
    const range = 0.325 * Math.floor(stats.ranged * 1.5);
    const mage = 0.325 * Math.floor(stats.magic * 1.5);
    return Math.floor(base + Math.max(melee, range, mage));
}

// ── engine/experience.js ──

// Pre-compute XP table using exact level formula
// totalXP(L) = floor( sum(x=1 to L-1) of floor(x + 300 * 2^(x/7)) / 4 )
const XP_TABLE = new Array(MAX_LEVEL + 1);
XP_TABLE[1] = 0;
function buildXPTable() {
    let cumulative = 0;
    for (let level = 1; level < MAX_LEVEL; level++) {
        cumulative += Math.floor(level + 300 * Math.pow(2, level / 7));
        XP_TABLE[level + 1] = Math.floor(cumulative / 4);
    }
}
buildXPTable();
/**
 * Get total XP required for a given level
 */
function getXPForLevel(level) {
    if (level < 1)
        return 0;
    if (level > MAX_LEVEL)
        return XP_TABLE[MAX_LEVEL];
    return XP_TABLE[level];
}
/**
 * Get level from total XP (binary search)
 */
function getLevelFromXP(xp) {
    if (xp < 0)
        return 1;
    let lo = 1, hi = MAX_LEVEL;
    while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        if (XP_TABLE[mid] <= xp)
            lo = mid;
        else
            hi = mid - 1;
    }
    return lo;
}
/**
 * XP remaining to reach the next level
 */
function getXPToNextLevel(currentXP) {
    const level = getLevelFromXP(currentXP);
    if (level >= MAX_LEVEL)
        return 0;
    return XP_TABLE[level + 1] - currentXP;
}
/**
 * Progress fraction (0-1) toward next level
 */
function getLevelProgress(currentXP) {
    const level = getLevelFromXP(currentXP);
    if (level >= MAX_LEVEL)
        return 1;
    const thisLevelXP = XP_TABLE[level];
    const nextLevelXP = XP_TABLE[level + 1];
    return (currentXP - thisLevelXP) / (nextLevelXP - thisLevelXP);
}
/**
 * Clamp XP to max
 */
function clampXP(xp) {
    return Math.min(xp, MAX_XP);
}

// ── engine/formulas.js ──

/**
 * Calculate effective strength level for max hit
 */
function effectiveStrength(strengthLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
    return Math.floor((strengthLevel + potionBonus) * prayerMult) + styleBonus + 8;
}
/**
 * Calculate melee max hit
 */
function meleeMaxHit(effectiveStr, equipmentStrengthBonus, gearMult = 1.0) {
    const base = Math.floor(0.5 + effectiveStr * (equipmentStrengthBonus + 64) / 640);
    return Math.floor(base * gearMult);
}
/**
 * Calculate effective attack level for accuracy
 */
function effectiveAttack(attackLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
    return Math.floor((attackLevel + potionBonus) * prayerMult) + styleBonus + 8;
}
/**
 * Calculate max attack roll
 */
function maxAttackRoll(effectiveAtk, equipmentAttackBonus) {
    return effectiveAtk * (equipmentAttackBonus + 64);
}
/**
 * Calculate max defence roll (monster or player)
 */
function maxDefenceRoll(defenceLevel, styleDefenceBonus) {
    return (defenceLevel + 9) * (styleDefenceBonus + 64);
}
/**
 * Calculate hit chance (accuracy) from attack and defence rolls
 */
function hitChance(atkRoll, defRoll) {
    if (atkRoll > defRoll) {
        return 1 - (defRoll + 2) / (2 * (atkRoll + 1));
    }
    else {
        return atkRoll / (2 * (defRoll + 1));
    }
}
/**
 * Roll damage for an attack
 * Returns 0 for miss, 1-maxHit for hit
 */
function rollDamage(accuracy, maxHit) {
    if (Math.random() < accuracy) {
        return randInt(1, Math.max(1, maxHit));
    }
    return 0;
}

/**

    const t = (lvl - 1) / 98;
    return Math.round(AGILITY_BANK_DELAY_LV1_MS + t * (AGILITY_BANK_DELAY_LV99_MS - AGILITY_BANK_DELAY_LV1_MS));

/**

        combatType, // 'melee', 'ranged', 'magic'
        stance, // 'accurate', 'aggressive', 'controlled', 'defensive', 'rapid', 'longrange'
        spell, // spell object for magic combat

        monsterAttackTimer: 0,
        eatCooldown: 0,
        potionCooldown: 0,

        tickCount: 0,

    };

        state.eatCooldown--;

            const styleBonuses = getMeleeStyleBonuses(state.stance);
            const effStr = effectiveStrength(playerStats.strength, 0, 1.0, styleBonuses.strengthStyleBonus);
            const maxHit = meleeMaxHit(effStr, bonuses.otherBonus.meleeStrength);
            const effAtk = effectiveAttack(playerStats.attack, 0, 1.0, styleBonuses.attackStyleBonus);
            const atkRoll = maxAttackRoll(effAtk, bonuses.attackBonus[weaponStyle] || 0);

        else if (state.combatType === 'ranged') {
            const styleBonus = getRangedStyleBonus(state.stance);
            const effRng = effectiveRanged(playerStats.ranged, 0, 1.0, styleBonus);
            const maxHit = rangedMaxHit(effRng, bonuses.otherBonus.rangedStrength);
            const atkRoll = maxAttackRoll(effRng, bonuses.attackBonus.ranged || 0);
            const defRoll = maxDefenceRoll(monster.stats.defence, monster.defenceBonus.ranged || 0);

                    xpSkills.defence = damage * (RANGED_XP_PER_DAMAGE / 2);

                else {
                    xpSkills.ranged = damage * RANGED_XP_PER_DAMAGE;

                xpSkills.hitpoints = Math.floor(damage * HP_XP_PER_DAMAGE);

            damage = rollDamage(acc, maxHit);
            // Magic always grants base spell XP on cast
            xpSkills.magic = (state.spell.baseXP || 0);
            if (damage > 0) {
                xpSkills.magic += damage * MAGIC_XP_PER_DAMAGE;
                xpSkills.hitpoints = Math.floor(damage * HP_XP_PER_DAMAGE);
            }
        }
        const actualDamage = Math.min(damage, Math.max(0, monster.currentHP));
        monster.currentHP -= actualDamage;

                }

                    xpSkills[skill] = Math.floor(actualDamage * HP_XP_PER_DAMAGE);

/**
 * Returns the tick-speed multiplier for a skill given the equipped weapon.
 * Only applies when the weapon has a matching toolFor field AND the player meets
 * the skill-level requirement. Bronze tools return 1.0 (no reduction).
 *
 * @param {string} skill - e.g. 'woodcutting' or 'mining'
 * @param {object} equipment - equipment state object { weapon: { itemId } | null, ... }
 * @param {object} itemsData - items.json lookup
 * @param {object} stats - stats object, e.g. { woodcutting: { xp: 0 } }
 * @returns {number} multiplier, e.g. 0.9 means 10% faster (fewer ticks)

    if (!equipment?.weapon)
        return 1.0;
    const item = itemsData[equipment.weapon.itemId];

        return 1.0;
    // Check skill-level requirement on the tool (e.g. mithril axe needs wc 20)
    if (item.requirements) {
        const skillXP = stats[skill]?.xp || 0;
        const playerLevel = getLevelFromXP(skillXP);
        for (const [reqSkill, reqLevel] of Object.entries(item.requirements)) {

        ticksRemaining: action.ticks,
        totalActions: 0,
        totalXP: 0,

    state.ticksRemaining--;

            skill: state.skill,
            action: state.action,
            xp: state.action.xp,
            product: state.action.product || null

    // Check required materials (inventory + bank combined)

            const bankCount = bank[itemId]?.quantity || 0;

const TICK_MS = 600;

 * Format elapsed milliseconds into a human-readable duration string.
 * Only shows units that have a non-zero value, starting from the largest.
 */
function formatIdleTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    const parts = [];
    if (days > 0)
        parts.push(`${days}d`);
    if (hours > 0)
        parts.push(`${hours}h`);
    if (minutes > 0)
        parts.push(`${minutes}m`);
    if (seconds > 0 || parts.length === 0)
        parts.push(`${seconds}s`);
    return parts.join(' ');
}

    // Apply tool speed multiplier (e.g. mithril axe for woodcutting)
    const toolMult = getToolSpeedMultiplier(task.skill, equipment, itemsData, stats);

            const available = (bank && bank[itemId]) ? bank[itemId].quantity : 0;

            if (possible < maxFromMaterials)
                maxFromMaterials = possible;

            return null;

    // then resets to weaponSpeed. So hits land on ticks: 1, 1+W, 1+2W, ...
    // Hits needed to kill = ceil(hp / avgDmgPerHit)
    // Ticks to kill = 1 + (hitsNeeded - 1) * weaponSpeed
    // After kill: 1200ms respawn = 2 ticks, then playerAttackTimer resets to 0 (continueFight)
    // so next kill also starts with first hit on tick 1.
    const hitsNeeded = avgDmgPerHit > 0 ? Math.ceil(monster.hitpoints / avgDmgPerHit) : Infinity;
    const ticksPerKill = hitsNeeded < Infinity
        ? 1 + (hitsNeeded - 1) * weaponSpeed
        : Infinity;
    // 2 tick respawn gap between kills (1200ms / 600ms per tick)
    const RESPAWN_TICKS = 2;
    const ticksPerCycle = ticksPerKill < Infinity ? ticksPerKill + RESPAWN_TICKS : Infinity;
    if (ticksPerCycle === Infinity) {
        return { xpGained: {}, lootGained: {}, monstersKilled: 0, lootLost: {}, lootBanked: {} };
    }
    // Auto-bank setup
    const bankingEnabled = task.bankingEnabled || false;
    const bankDelayTicks = Math.ceil(getAgilityBankDelayFromStats(stats) / TICK_MS);
    // XP per kill (assumes player deals exactly monster.hitpoints damage per kill)
    const xpSkill = task.stance === 'aggressive' ? 'strength'
        : task.stance === 'defensive' ? 'defence'
            : 'attack';
    const xpPerKill = {
        [xpSkill]: Math.floor(monster.hitpoints * MELEE_XP_PER_DAMAGE),
        hitpoints: Math.floor(monster.hitpoints * HP_XP_PER_DAMAGE),
    };
    // Simulate kill-by-kill, tracking remaining time so bank trips can deduct time
    const newInv = [...inventory];
    const lootLost = {};
    const lootBanked = {};
    const xpGained = {};
    let monstersKilled = 0;
    let remainingTicks = totalTicks;
    while (remainingTicks >= ticksPerCycle) {
        remainingTicks -= ticksPerCycle;
        monstersKilled++;
        // XP for this kill
        for (const [skill, xp] of Object.entries(xpPerKill)) {
            xpGained[skill] = (xpGained[skill] || 0) + xp;
        }
        // Loot for this kill — place items into inventory, overflow to lost/banked
        for (const drop of idleRollDrops(monster)) {
            const item = itemsData[drop.itemId];
            const stackable = item?.stackable || false;
            if (stackable) {
                const existingIdx = newInv.findIndex(s => s && s.itemId === drop.itemId);
                if (existingIdx !== -1) {
                    newInv[existingIdx] = { ...newInv[existingIdx], quantity: newInv[existingIdx].quantity + drop.quantity };
                }
                else {
                    const emptyIdx = newInv.indexOf(null);
                    if (emptyIdx !== -1) {
                        newInv[emptyIdx] = { itemId: drop.itemId, quantity: drop.quantity };
                    }
                    else {
                        if (bankingEnabled)
                            lootBanked[drop.itemId] = (lootBanked[drop.itemId] || 0) + drop.quantity;
                        else
                            lootLost[drop.itemId] = (lootLost[drop.itemId] || 0) + drop.quantity;
                    }
                }
            }
            else {
                // Place non-stackable items one-by-one; track exact placed vs lost counts
                let addedQty = 0;
                for (let q = 0; q < drop.quantity; q++) {
                    const emptyIdx = newInv.indexOf(null);
                    if (emptyIdx !== -1) {
                        newInv[emptyIdx] = { itemId: drop.itemId, quantity: 1 };
                        addedQty++;
                    }
                    else {
                        break;
                    }
                }
                const lostQty = drop.quantity - addedQty;
                if (lostQty > 0) {
                    if (bankingEnabled)
                        lootBanked[drop.itemId] = (lootBanked[drop.itemId] || 0) + lostQty;
                    else
                        lootLost[drop.itemId] = (lootLost[drop.itemId] || 0) + lostQty;
                }
            }
        }
        // Auto-bank trip: if inventory is full and banking is enabled, deduct travel
        // time and clear inventory into lootBanked. Stop if no time remains.
        if (bankingEnabled && newInv.indexOf(null) === -1) {
            if (remainingTicks < bankDelayTicks)
                break;
            remainingTicks -= bankDelayTicks;
            for (let i = 0; i < newInv.length; i++) {
                if (!newInv[i])
                    continue;
                lootBanked[newInv[i].itemId] = (lootBanked[newInv[i].itemId] || 0) + newInv[i].quantity;
                newInv[i] = null;
            }
        }
    }
    // lootGained is whatever ended up in the final inventory (what the player carries home)
    const lootGained = {};
    for (const slot of newInv) {
        if (!slot)
            continue;
        lootGained[slot.itemId] = (lootGained[slot.itemId] || 0) + slot.quantity;
    }
    return { xpGained, lootGained, lootLost, lootBanked, monstersKilled, finalInventory: newInv };
}

let tickInterval = null;
let tickCount = 0;
let listeners = [];
let paused = false;
/**
 * Register a tick listener. Called every game tick with the current tick count.
 * Returns an unsubscribe function.
 */
function onTick(callback) {
    listeners.push(callback);
    return () => {
        listeners = listeners.filter(l => l !== callback);
    };
}
/**
 * Start the tick loop
 */
function startTicks() {
    if (tickInterval)
        return;
    tickInterval = setInterval(() => {
        if (paused)
            return;
        tickCount++;
        for (const listener of listeners) {
            try {
                listener(tickCount);
            }
            catch (e) {
                console.error('Tick listener error:', e);
            }
        }
    }, TICK_DURATION);
}
/**
 * Stop the tick loop
 */
function stopTicks() {
    if (tickInterval) {
        clearInterval(tickInterval);
        tickInterval = null;
    }
}
/**
 * Pause/resume ticks (for background tab handling)
 */
function pauseTicks() { paused = true; }
function resumeTicks() { paused = false; }
/**
 * Get current tick count
 */
function getTickCount() { return tickCount; }
/**
 * Reset tick count (for new game)
 */
function resetTicks() { tickCount = 0; }

const DB_NAME = 'PocketRPG';
const DB_VERSION = 1;
let dbInstance = null;
/**
 * Get or create the database instance.
 * Handles stale connections (e.g. iOS Safari kills background tabs).
 */
async function getDB() {
    // If we have an instance, do a quick health-check before returning it
    if (dbInstance) {
        try {
            // A lightweight read to confirm the connection is alive
            await dbInstance.get('settings', '__healthcheck__');
            return dbInstance;
        }
        catch (e) {
            // Connection is dead — clear it and reconnect
            console.warn('[PocketRPG] DB connection stale, reconnecting...', e);
            try {
                dbInstance.close();
            }
            catch (_) { }
            dbInstance = null;
        }
    }
    dbInstance = await openDB(DB_NAME, DB_VERSION, {
        upgrade(db, oldVersion) {
            // Version 1: initial schema
            if (oldVersion < 1) {
                db.createObjectStore('player'); // key: 'profile'
                db.createObjectStore('stats'); // key: skill name
                db.createObjectStore('inventory'); // key: slot index
                db.createObjectStore('bank'); // key: item ID
                db.createObjectStore('equipment'); // key: slot name
                db.createObjectStore('settings'); // key: setting key
                db.createObjectStore('shortcuts'); // key: shortcut index
            }
        }
    });
    return dbInstance;
}
/**
 * Force-close and clear the DB instance (call before re-opening after error)
 */
function closeDB() {
    if (dbInstance) {
        try {
            dbInstance.close();
        }
        catch (_) { }
        dbInstance = null;
    }
}
/**
 * Check if a save exists
 */
async function hasSave() {
    const db = await getDB();
    const profile = await db.get('player', 'profile');
    return !!profile;
}
/**
 * Delete the entire database
 */
async function deleteDB() {
    if (dbInstance) {
        dbInstance.close();
        dbInstance = null;
    }
    await indexedDB.deleteDatabase(DB_NAME);
}
/**
 * Get all data from a store
 */
async function getAllFromStore(storeName) {
    const db = await getDB();
    return db.getAll(storeName);
}
/**
 * Get all keys from a store
 */
async function getAllKeysFromStore(storeName) {
    const db = await getDB();
    return db.getAllKeys(storeName);
}

const SAVE_VERSION = 1;
/**
 * Export entire game state to a downloadable file
 */
async function exportSave() {
    const db = await getDB();
    const data = {
        version: SAVE_VERSION,
        timestamp: Date.now(),
        player: await db.get('player', 'profile'),
        stats: {},
        inventory: [],
        bank: {},
        equipment: {},
        settings: {}
    };
    // Stats
    for (const skill of ALL_SKILLS) {
        data.stats[skill] = await db.get('stats', skill);
    }
    // Inventory
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        data.inventory[i] = await db.get('inventory', i) || null;
    }
    // Bank
    const bankKeys = await db.getAllKeys('bank');
    for (const key of bankKeys) {
        data.bank[key] = await db.get('bank', key);
    }
    // Equipment
    for (const slot of EQUIPMENT_SLOTS) {
        data.equipment[slot] = await db.get('equipment', slot) || null;
    }
    // Settings
    const settingKeys = await db.getAllKeys('settings');
    for (const key of settingKeys) {
        data.settings[key] = await db.get('settings', key);
    }
    const json = JSON.stringify(data);
    const hash = fnv1a(json);
    const payload = JSON.stringify({ hash, data: json });
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    // Download
    const blob = new Blob([encoded], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pocketrpg_${data.player?.name || 'save'}_${Date.now()}.pocketrpg`;
    a.click();
    URL.revokeObjectURL(url);
}
/**
 * Import a save file
 */
async function importSave(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const decoded = decodeURIComponent(escape(atob(e.target.result)));
                const { hash, data: json } = JSON.parse(decoded);
                // Verify integrity
                if (fnv1a(json) !== hash) {
                    reject(new Error('Save file integrity check failed'));
                    return;
                }
                const data = JSON.parse(json);
                // Wipe and recreate
                await deleteDB();
                // dynamic import removed — getDB is global
                const db = await getDB();
                // Restore player
                if (data.player)
                    await db.put('player', data.player, 'profile');
                // Restore stats
                const statsTx = db.transaction('stats', 'readwrite');
                for (const [skill, val] of Object.entries(data.stats)) {
                    if (val)
                        statsTx.store.put(val, skill);
                }
                await statsTx.done;
                // Restore inventory
                const invTx = db.transaction('inventory', 'readwrite');
                for (let i = 0; i < INVENTORY_SIZE; i++) {
                    if (data.inventory[i])
                        invTx.store.put(data.inventory[i], i);
                }
                await invTx.done;
                // Restore bank
                const bankTx = db.transaction('bank', 'readwrite');
                for (const [key, val] of Object.entries(data.bank)) {
                    bankTx.store.put(val, key);
                }
                await bankTx.done;
                // Restore equipment
                const eqTx = db.transaction('equipment', 'readwrite');
                for (const [slot, val] of Object.entries(data.equipment)) {
                    if (val)
                        eqTx.store.put(val, slot);
                }
                await eqTx.done;
                // Restore settings
                const setTx = db.transaction('settings', 'readwrite');
                for (const [key, val] of Object.entries(data.settings)) {
                    setTx.store.put(val, key);
                }
                await setTx.done;
                resolve();
            }
            catch (err) {
                reject(err);
            }
        };
        reader.readAsText(file);
    });
}
/**
 * Snapshot live game state to localStorage as a base64+hash backup.
 * Called every ~100 ticks (60s) from App tick loop.
 * Takes live state objects — no IDB read needed.
 */
function snapshotToLocalStorage(player, stats, inventory, bank, equipment) {
    try {
        const data = {
            version: SAVE_VERSION,
            timestamp: Date.now(),
            player,
            stats,
            inventory,
            bank,
            equipment,
            settings: {}
        };
        // Capture active task and last tick from localStorage so idle engine
        // can calculate elapsed time after a full page close + reopen
        try {
            data.settings.activeTask = JSON.parse(localStorage.getItem('pocketrpg_activeTask'));
        }
        catch {
            data.settings.activeTask = null;
        }
        data.settings.lastTick = parseInt(localStorage.getItem('pocketrpg_lastTick'), 10) || data.timestamp;
        const json = JSON.stringify(data);
        const hash = fnv1a(json);
        const payload = JSON.stringify({ hash, data: json });
        // Use safe UTF-16→Latin1 encoding for btoa (TextEncoder round-trip)
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        localStorage.setItem('pocketrpg_backup', encoded);
        console.log('[PocketRPG] Snapshot saved to localStorage, size:', encoded.length);
    }
    catch (err) {
        // localStorage may be full or unavailable — fail silently
        console.warn('[PocketRPG] Backup snapshot failed:', err);
    }
}
/**
 * Restore game state from localStorage backup into IndexedDB.
 * Returns the restored data object on success, or null if no backup / integrity fail.
 */
async function restoreFromLocalStorage() {
    try {
        const encoded = localStorage.getItem('pocketrpg_backup');
        if (!encoded)
            return null;
        const decoded = decodeURIComponent(escape(atob(encoded)));
        const { hash, data: json } = JSON.parse(decoded);
        if (fnv1a(json) !== hash) {
            console.warn('[PocketRPG] Backup integrity check failed — discarding');
            return null;
        }
        const data = JSON.parse(json);
        // Wipe IDB and restore
        await deleteDB();
        const db = await getDB();
        if (data.player)
            await db.put('player', data.player, 'profile');
        const statsTx = db.transaction('stats', 'readwrite');
        for (const [skill, val] of Object.entries(data.stats || {})) {
            if (val)
                statsTx.store.put(val, skill);
        }
        await statsTx.done;
        const invTx = db.transaction('inventory', 'readwrite');
        for (let i = 0; i < INVENTORY_SIZE; i++) {
            if (data.inventory?.[i])
                invTx.store.put(data.inventory[i], i);
        }
        await invTx.done;
        const bankTx = db.transaction('bank', 'readwrite');
        for (const [key, val] of Object.entries(data.bank || {})) {
            bankTx.store.put(val, key);
        }
        await bankTx.done;
        const eqTx = db.transaction('equipment', 'readwrite');
        for (const [slot, val] of Object.entries(data.equipment || {})) {
            if (val)
                eqTx.store.put(val, slot);
        }
        await eqTx.done;
        // Restore settings to IDB if present
        if (data.settings) {
            const setTx = db.transaction('settings', 'readwrite');
            for (const [key, val] of Object.entries(data.settings)) {
                if (key !== 'activeTask' && key !== 'lastTick' && val != null) {
                    setTx.store.put({ key, value: val }, key);
                }
            }
            await setTx.done;
        }
        // ── CRITICAL: Restore localStorage keys so idle engine can calculate elapsed time ──
        // Use the snapshot's lastTick (or timestamp as fallback) so loadGame() sees
        // a valid elapsed-time window on the next startup.
        const savedLastTick = data.settings?.lastTick || data.timestamp;
        if (savedLastTick) {
            localStorage.setItem('pocketrpg_lastTick', String(savedLastTick));
        }
        if (data.settings?.activeTask) {
            localStorage.setItem('pocketrpg_activeTask', JSON.stringify(data.settings.activeTask));
        }
        console.log('[PocketRPG] Restored from localStorage backup, timestamp:', data.timestamp);
        return data;
    }
    catch (err) {
        console.warn('[PocketRPG] Restore from backup failed:', err);
        return null;
    }
}

                            const emptyIdx = currentInv.findIndex(s => s === null);
                            if (emptyIdx >= 0) {
                                currentInv[emptyIdx] = { itemId: 'coins', quantity: ev.coinReward };
                                updateInventory(currentInv);
                            }
                            else {

                        ...agilityRef.current,
                        totalLaps: (agilityRef.current.totalLaps || 0) + 1,
                        totalXP: (agilityRef.current.totalXP || 0) + ev.xp,

    if (selectedSkill === 'agility') {

    }
    // Tick listener
    useEffect(() => {
        if (!skilling || !skilling.active)
            return;

                return;

            skillingRef.current = skillingState;
            for (const ev of events) {
                if (ev.type === 'actionComplete') {
                    // Check materials
                    const action = ev.action;
                    const newInv = [...inventory];
                    if (action.materials) {
                        let hasMats = true;
                        for (const [matId, qty] of Object.entries(action.materials)) {
                            const invCount = countItem(newInv, matId);
                            const bankCount = bank[matId]?.quantity || 0;
                            if (invCount + bankCount < qty) {
                                hasMats = false;
                                break;
                            }
                        }
                        if (!hasMats) {
                            skillingRef.current = { ...skillingState, active: false, stopped: true };
                            setSkilling({ ...skillingState, active: false, stopped: true });
                            addToast('Out of materials!', 'error');
                            return;
                        }
                        // Remove materials — consume from inventory first, then bank
                        const bankUpdates = {};
                        for (const [matId, qty] of Object.entries(action.materials)) {
                            const invCount = countItem(newInv, matId);
                            const fromInv = Math.min(invCount, qty);
                            const fromBank = qty - fromInv;
                            if (fromInv > 0)
                                removeItem(newInv, matId, fromInv);
                            if (fromBank > 0)
                                bankUpdates[matId] = -fromBank;
                        }
                        if (Object.keys(bankUpdates).length > 0)
                            updateBankDirect(bankUpdates);
                    }
                    // Handle cooking burn
                    if (action.burnStopLevel) {
                        const cookLevel = getLevelFromXP(stats.cooking?.xp || 0);
                        if (checkBurn(cookLevel, { level: action.level, burnStopLevel: action.burnStopLevel })) {
                            addItem(newInv, 'burnt_food', 1, false);
                            updateInventory(newInv);
                            grantXP(state.skill, 1); // Tiny XP for burn
                            setSkilling({ ...skillingState });
                            return;
                        }
                    }
                    // Add product — goes to bank directly
                    if (action.product) {
                        const qty = action.productQty || 1;
                        updateBankDirect({ [action.product]: qty });
                    }
                    // Still update inventory if materials were consumed
                    if (action.materials)
                        updateInventory(newInv);
                    // Grant XP
                    grantXP(state.skill, ev.xp);
                }
            }
            setSkilling({ ...skillingRef.current });
        });
        return unsub;
    }, [skilling?.active, stats, inventory, bank]);
    const startSkilling = (action) => {
        const mult = getToolSpeedMultiplier(selectedSkill, equipment, itemsData, stats);
        const effectiveTicks = Math.max(1, Math.floor(action.ticks * mult));
        const adjustedAction = mult < 1.0 ? { ...action, ticks: effectiveTicks } : action;
        const state = { ...createSkillingState(selectedSkill, adjustedAction), startedAt: Date.now() };
        setSelectedAction(action);
        setSkilling(state);
        setActiveTask({ type: 'skill', skill: selectedSkill, action: adjustedAction });
    };
    const stopSkilling = () => {
        if (skillingRef.current) {

function GeneralStoreScreen() {
    const { inventory, updateInventory, addToast, getSkillLevel, unlockedFeatures, unlockFeature } = useGame();
    const [activeShop, setActiveShop] = useState('general');
    const [quantities, setQuantities] = useState({});
    const coins = countItem(inventory, 'coins');
    const isUnlocksTab = activeShop === 'unlocks';
    const shop = isUnlocksTab ? UNLOCK_TAB : SHOPS.find(s => s.id === activeShop);
    const getQty = (id) => quantities[id] || 1;
    const setQty = (id, val) => {
        const n = Math.max(1, Math.min(9999, parseInt(val) || 1));
        setQuantities(q => ({ ...q, [id]: n }));
    };
    const handleBuy = (storeItem) => {
        const qty = getQty(storeItem.id);
        const totalCost = storeItem.price * qty;
        if (storeItem.requiresSkill && storeItem.requiresLevel) {
            const playerLevel = getSkillLevel(storeItem.requiresSkill);
            if (playerLevel < storeItem.requiresLevel) {
                const skillName = storeItem.requiresSkill.charAt(0).toUpperCase() + storeItem.requiresSkill.slice(1);
                addToast(`Need ${skillName} level ${storeItem.requiresLevel} to buy this cape.`, 'error');
                return;
            }
        }
        if (coins < totalCost) {
            addToast(`Need ${totalCost.toLocaleString()} coins — you have ${coins.toLocaleString()}.`, 'error');
            return;
        }
        const newInv = [...inventory];
        if (!storeItem.stackable) {
            const free = freeSlots(newInv);
            if (free < qty) {
                addToast(`Need ${qty} free slot${qty > 1 ? 's' : ''} — only ${free} available.`, 'error');
                return;
            }
        }
        else {
            const existing = countItem(newInv, storeItem.id);
            if (existing === 0 && freeSlots(newInv) === 0) {
                addToast('Not enough inventory space.', 'error');
                return;
            }
        }
        removeItem(newInv, 'coins', totalCost);
        for (let i = 0; i < qty; i++) {
            addItem(newInv, storeItem.id, 1, storeItem.stackable);
        }
        updateInventory(newInv);
    };
    const handleUnlock = (unlock) => {
        if (unlockedFeatures.has(unlock.id)) {
            addToast('Already unlocked.', 'info');
            return;
        }
        if (coins < unlock.price) {
            addToast(`Need ${unlock.price.toLocaleString()} coins — you have ${coins.toLocaleString()}.`, 'error');
            return;
        }
        const newInv = [...inventory];
        removeItem(newInv, 'coins', unlock.price);
        updateInventory(newInv);
        unlockFeature(unlock.id);
        addToast(`${unlock.name} unlocked!`, 'info', unlock.icon);
    };
    return (h("div", { style: { height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' } },
        h("div", { style: { padding: '12px 16px 0', flexShrink: 0 } },
            h("div", { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '4px' } },
                h("h2", { style: { fontFamily: 'Cinzel, serif', fontSize: '15px', fontWeight: '700', color: '#d4af37', margin: 0 } }, shop.title),
                h("span", { style: { fontSize: '11px', color: '#d4af37', fontFamily: 'monospace' } },
                    "\uD83E\uDE99 ",
                    coins.toLocaleString())),
            h("p", { style: { fontSize: '10px', color: '#e8d5b0', opacity: 0.4, margin: '0 0 10px' } }, shop.desc),
            h("div", { style: {
                    display: 'flex',
                    gap: '4px',
                    overflowX: 'auto',
                    paddingBottom: '8px',
                    scrollbarWidth: 'none',
                } }, [...SHOPS, UNLOCK_TAB].map(s => (h("button", { key: s.id, onClick: () => setActiveShop(s.id), style: {
                    flexShrink: 0,
                    padding: '6px 12px',
                    borderRadius: '8px',
                    border: activeShop === s.id ? '1px solid #d4af37' : '1px solid #2a2a2a',
                    background: activeShop === s.id ? 'rgba(212,175,55,0.15)' : '#1a1a1a',
                    color: activeShop === s.id ? '#d4af37' : '#e8d5b0',
                    fontSize: '13px',
                    cursor: 'pointer',
                    fontWeight: activeShop === s.id ? '700' : '400',
                    opacity: activeShop === s.id ? 1 : 0.55,
                    transition: 'all 0.15s',
                } }, s.label))))),
        h("div", { style: { flex: 1, overflowY: 'auto', padding: '0 16px 80px' } },
            isUnlocksTab && (h("div", { style: { display: 'flex', flexDirection: 'column', gap: '8px' } }, UNLOCKS.map(unlock => {
                const owned = unlockedFeatures.has(unlock.id);
                const canAfford = coins >= unlock.price;
                return (h("div", { key: unlock.id, style: {
                        background: '#1a1a1a',
                        border: owned ? '1px solid rgba(212,175,55,0.4)' : '1px solid #2a2a2a',
                        borderRadius: '10px',
                        padding: '12px',
                    } },
                    h("div", { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' } },
                        h("span", { style: { fontSize: '26px', lineHeight: 1, flexShrink: 0 } }, unlock.icon),
                        h("div", { style: { flex: 1, minWidth: 0 } },
                            h("div", { style: { fontSize: '13px', fontWeight: '700', color: '#e8d5b0' } }, unlock.name),
                            h("div", { style: { fontSize: '10px', color: '#e8d5b0', opacity: 0.4, marginTop: '2px' } }, unlock.desc)),
                        h("div", { style: { textAlign: 'right', flexShrink: 0 } }, owned
                            ? h("div", { style: { fontSize: '11px', color: '#d4af37', fontWeight: '700' } }, "\u2713 Owned")
                            : h(Fragment, null,
                                h("div", { style: { fontSize: '12px', color: '#d4af37', fontFamily: 'monospace' } },
                                    unlock.price.toLocaleString(),
                                    " gp"),
                                h("div", { style: { fontSize: '9px', color: '#e8d5b0', opacity: 0.3 } }, "one-time")))),
                    h("button", { onClick: () => handleUnlock(unlock), disabled: owned, style: {
                            width: '100%',
                            padding: '8px',
                            borderRadius: '8px',
                            background: owned ? '#1a1a1a' : canAfford ? 'linear-gradient(135deg, #b8940e, #d4af37)' : '#222',
                            border: owned ? '1px solid #333' : 'none',
                            color: owned ? '#d4af37' : canAfford ? '#0f0f0f' : '#888',
                            fontSize: '12px',
                            fontWeight: '700',
                            cursor: owned || !canAfford ? 'not-allowed' : 'pointer',
                        } }, owned ? '✓ Unlocked' : canAfford ? `Unlock · ${unlock.price.toLocaleString()} gp` : `Need ${unlock.price.toLocaleString()} gp`)));
            }))),
            !isUnlocksTab && (h("div", { style: { display: 'flex', flexDirection: 'column', gap: '8px' } }, shop.items.map(item => {
                const qty = getQty(item.id);
                const totalCost = item.price * qty;
                const canAfford = coins >= totalCost;
                const skillLocked = item.requiresSkill
                    ? getSkillLevel(item.requiresSkill) < item.requiresLevel
                    : false;
                return (h("div", { key: item.id, style: {
                        background: '#1a1a1a',
                        border: '1px solid #2a2a2a',
                        borderRadius: '10px',
                        padding: '10px 12px',
                    } },
                    h("div", { style: { display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' } },
                        h("span", { style: { fontSize: '22px', lineHeight: 1, flexShrink: 0, opacity: skillLocked ? 0.4 : 1 } }, item.icon),
                        h("div", { style: { flex: 1, minWidth: 0 } },
                            h("div", { style: { fontSize: '13px', fontWeight: '600', color: skillLocked ? '#888' : '#e8d5b0', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, item.name),
                            h("div", { style: { fontSize: '10px', color: '#e8d5b0', opacity: 0.38, marginTop: '1px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, item.desc)),
                        h("div", { style: { textAlign: 'right', flexShrink: 0 } }, skillLocked
                            ? h("div", { style: { fontSize: '11px', color: '#888' } },
                                "\uD83D\uDD12 Lv ",
                                item.requiresLevel)
                            : h(Fragment, null,
                                h("div", { style: { fontSize: '12px', color: '#d4af37', fontFamily: 'monospace' } },
                                    item.price.toLocaleString(),
                                    " gp"),
                                h("div", { style: { fontSize: '9px', color: '#e8d5b0', opacity: 0.3 } }, "each")))),
                    h("div", { style: { display: 'flex', alignItems: 'center', gap: '6px' } },
                        h("button", { onClick: () => setQty(item.id, qty - 1), style: { width: '26px', height: '26px', borderRadius: '6px', background: '#222', border: '1px solid #333', color: '#e8d5b0', fontSize: '14px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } }, "\u2212"),
                        h("input", { type: "number", min: "1", max: "9999", value: qty, onInput: e => setQty(item.id, e.target.value), style: { width: '44px', height: '26px', borderRadius: '6px', background: '#111', border: '1px solid #333', color: '#e8d5b0', fontSize: '12px', fontFamily: 'monospace', textAlign: 'center', outline: 'none' } }),
                        h("button", { onClick: () => setQty(item.id, qty + 1), style: { width: '26px', height: '26px', borderRadius: '6px', background: '#222', border: '1px solid #333', color: '#e8d5b0', fontSize: '14px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } }, "+"),
                        [5, 10, 100].map(n => (h("button", { key: n, onClick: () => setQty(item.id, n), style: { height: '26px', padding: '0 7px', borderRadius: '6px', background: '#222', border: '1px solid #333', color: '#e8d5b0', fontSize: '10px', cursor: 'pointer', opacity: qty === n ? 1 : 0.45, flexShrink: 0 } }, n))),
                        h("div", { style: { flex: 1 } }),
                        h("button", { onClick: () => handleBuy(item), style: {
                                padding: '0 12px',
                                height: '28px',
                                borderRadius: '8px',
                                background: skillLocked ? '#222' : canAfford ? 'linear-gradient(135deg, #b8940e, #d4af37)' : '#222',
                                border: 'none',
                                color: skillLocked ? '#555' : canAfford ? '#0f0f0f' : '#888',
                                fontSize: '11px',
                                fontWeight: '700',
                                cursor: skillLocked || !canAfford ? 'not-allowed' : 'pointer',
                                whiteSpace: 'nowrap',
                                flexShrink: 0,
                            } }, skillLocked ? 'Locked' : `Buy · ${totalCost.toLocaleString()} gp`))));
            }))))));

const EQ_SLOT_NAMES = {
    head: 'Head', cape: 'Cape', neck: 'Neck', ammo: 'Ammo',
    weapon: 'Weapon', body: 'Body', shield: 'Shield',
    legs: 'Legs', gloves: 'Gloves', boots: 'Boots', ring: 'Ring'
};
/**
 * Renders a single equipment slot in the paperdoll grid.
 */
function EquipSlot({ slotName, equipment, itemsData, onSelect }) {
    const entry = equipment[slotName];
    const item = entry ? itemsData[entry.itemId] : null;
    const isEmpty = !item;
    return (h("button", { onClick: () => { if (item)
            onSelect(slotName, item); }, style: {
            width: '56px', height: '56px', borderRadius: '10px',
            background: isEmpty ? '#111' : '#1a1a1a',
            border: `1px solid ${isEmpty ? '#222' : '#444'}`,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            cursor: item ? 'pointer' : 'default', position: 'relative',
            opacity: isEmpty ? 0.4 : 1,
        } },
        h("span", { style: { fontSize: item ? '18px' : '14px' } }, item ? (item.icon || '📦') : EQ_SLOT_LABELS[slotName]),
        h("span", { style: {
                fontSize: '7px', color: item ? '#e8d5b0' : '#555',
                textAlign: 'center', marginTop: '2px', fontWeight: item ? '600' : '400',
                maxWidth: '52px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'

            const snap = getSnapshot();
            if (snap.player) {
                snapshotToLocalStorage(snap.player, snap.stats, snap.inventory, snap.bank, snap.equipment);

            return () => stopTicks();
        }
    }, [gameReady]);
    // Keep a ref to activeTask so the tick closure always sees the latest value
    const activeTaskRef = useRef(activeTask);
    useEffect(() => { activeTaskRef.current = activeTask; }, [activeTask]);
    // Keep refs to stats/equipment/inventory for visibility handler (avoids stale closures)
    const statsRef = useRef(stats);
    const equipmentRef = useRef(equipment);
    const inventoryRef = useRef(inventory);
    const itemsDataRef = useRef(itemsData);
    useEffect(() => { statsRef.current = stats; }, [stats]);
    useEffect(() => { equipmentRef.current = equipment; }, [equipment]);
    useEffect(() => { inventoryRef.current = inventory; }, [inventory]);
    // visibilitychange: stamp on hide, run idle on return
    useEffect(() => {
        if (!gameReady)
            return;
        const handleVisibility = async () => {
            if (document.hidden) {
                // Page going to background — stamp the hide time separately from tick heartbeat
                const now = Date.now();
                hiddenAtPerfRef.current = performance.now(); // monotonic — not affected by clock changes
                localStorage.setItem('pocketrpg_hiddenAt', String(now));
                localStorage.setItem('pocketrpg_activeTask', JSON.stringify(activeTaskRef.current));
            }
            else {
                // Page returning to foreground — prefer performance.now() diff (monotonic) over wall-clock
                // to prevent system-time manipulation from granting fake idle progress.
                try {
                    const rawHiddenAt = localStorage.getItem('pocketrpg_hiddenAt');
                    const savedTask = (() => { try {
                        return JSON.parse(localStorage.getItem('pocketrpg_activeTask'));
                    }
                    catch {
                        return null;
                    } })();
                    if (!rawHiddenAt)
                        return;
                    const hiddenAt = parseInt(rawHiddenAt, 10);
                    const perfNow = performance.now();
                    let elapsedMs;
                    if (hiddenAtPerfRef.current !== null && perfNow >= hiddenAtPerfRef.current) {
                        // Same session: use monotonic clock — immune to system time changes
                        elapsedMs = Math.floor(perfNow - hiddenAtPerfRef.current);
                    }
                    else {
                        // New session (page reloaded while hidden): fall back to wall-clock, capped at 24h
                        elapsedMs = Math.min(Date.now() - hiddenAt, 24 * 60 * 60 * 1000);
                    }
                    hiddenAtPerfRef.current = null;
                    if (elapsedMs < 2000)
                        return;

                    localStorage.removeItem('pocketrpg_hiddenAt');

                    if (!savedTask) {
                        setIdleResult({ elapsedMs, task: null });
                        return;
                    }
                    // Re-read latest stats/equipment/inventory/bank from DB to avoid stale state
                    const [freshStats, freshInv, freshEq, freshBank] = await Promise.all([
                        getAllStats(),
                        getInventory(),
                        getEquipment(),
                        getBank(),
                    ]);
                    let sim = null;
                    if (savedTask.type === 'skill')
                        sim = simulateIdleSkilling(savedTask, elapsedMs, freshBank);
                    if (savedTask.type === 'gather')
                        sim = simulateIdleGather(savedTask, elapsedMs);
                    if (savedTask.type === 'combat')
                        sim = simulateIdleCombat(savedTask, elapsedMs, freshStats, freshEq, freshInv, itemsDataRef.current);
                    if (savedTask.type === 'agility')
                        sim = simulateIdleAgility(savedTask, elapsedMs);

                        }

                    // Apply items
                    if (savedTask.type === 'combat' && sim.finalInventory) {

                        if (sim.lootBanked && Object.keys(sim.lootBanked).length > 0) {
                            updateBankDirect(sim.lootBanked);
                        }
                    }
                    else if (sim.itemsGained) {
                        updateBankDirect(sim.itemsGained);
                    }
                    // Apply agility coin reward directly to bank
                    if (savedTask.type === 'agility' && sim.coinsGained > 0) {
                        updateBankDirect({ coins: sim.coinsGained });
                    }
                    // Deduct consumed materials from bank
                    if (sim.itemsConsumed && Object.keys(sim.itemsConsumed).length > 0) {
                        const negated = {};
                        for (const [itemId, qty] of Object.entries(sim.itemsConsumed)) {
                            negated[itemId] = -qty;

                        updateBankDirect(negated);
                    }
                    setIdleResult({ elapsedMs, task: savedTask, ...sim });
                }
                catch (err) {

            case SCREENS.COMBAT: return h(CombatScreen, { onNavigate: navigate, initialMonsterId: actionData?.monsterId, onSkipHour: handleSkipHour, skipHourUnlocked: unlockedFeatures?.has('skip_hour') });
            case SCREENS.SKILLS: return h(SkillingScreen, { initialSkillId: actionData?.skillId, initialActionId: actionData?.actionId, idleResult: idleResult, onSkipHour: handleSkipHour, skipHourUnlocked: unlockedFeatures?.has('skip_hour') });
            case SCREENS.GATHER: return h(GatherScreen, { initialTaskId: actionData?.gatherTaskId, idleResult: idleResult, onSkipHour: handleSkipHour, skipHourUnlocked: unlockedFeatures?.has('skip_hour') });
            case SCREENS.AGILITY: return h(AgilityScreen, { initialActionId: actionData?.actionId });
            case SCREENS.STORE: return h(GeneralStoreScreen, null);
            default: return h(HomeScreen, { onNavigate: navigate, onSaveMenu: () => setShowSaveMenu(true) });
        }
    };
    return (h("div", { style: { height: '100%', display: 'flex', flexDirection: 'column' } },
        h(Header, { activity: activity }),
        h(ToastContainer, null),
        h("main", { style: { flex: 1, overflow: 'hidden' } }, renderScreen()),
        h(BottomNav, { active: screen, onNavigate: (s) => navigate(s) }),
        idleResult && (h("div", { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' } },
            h("div", { style: { width: '100%', maxWidth: '380px', background: '#1a1a1a', borderRadius: '20px', border: '1px solid #333', overflow: 'hidden' } },
                h("div", { style: { background: 'linear-gradient(135deg, #1d3a2a, #2a1a0a)', padding: '20px 20px 16px', borderBottom: '1px solid #333' } },
                    h("div", { style: { fontSize: '28px', textAlign: 'center', marginBottom: '6px' } }, "\uD83D\uDCA4"),
                    h("h2", { style: { fontFamily: 'Cinzel, serif', fontSize: '17px', color: '#d4af37', textAlign: 'center', marginBottom: '4px' } }, "Welcome Back!"),
                    h("p", { style: { fontSize: '12px', color: '#c8a96e', textAlign: 'center', opacity: 0.8 } },
                        "Away for ",
                        formatIdleTime(idleResult.elapsedMs)),
                    idleResult.task && (h("p", { style: { fontSize: '11px', color: '#e8d5b0', textAlign: 'center', opacity: 0.5, marginTop: '4px' } }, idleResult.task.type === 'combat' ? `Fighting ${idleResult.task.monster?.name}` :
                        idleResult.task.type === 'skill' ? `Training ${idleResult.task.skill}` :
                            idleResult.task.type === 'gather' ? idleResult.task.gatherTask?.name : ''))),
                h("div", { style: { padding: '16px', maxHeight: '55vh', overflowY: 'auto' } }, (() => {
                    const hrs = idleResult.elapsedMs / 3600000;
                    const perHr = (n) => hrs > 0 ? Math.round(n / hrs).toLocaleString() : '—';
                    return (h(Fragment, null,
                        idleResult.monstersKilled > 0 && (h("div", { style: { marginBottom: '12px', padding: '10px', background: '#111', borderRadius: '10px' } },
                            h("div", { style: { fontSize: '11px', color: '#e8d5b0', opacity: 0.5, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: '700', marginBottom: '6px' } }, "\u2694\uFE0F Combat"),
                            h("div", { style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', color: '#e8d5b0', marginBottom: '3px' } },
                                h("span", null, "Kills"),
                                h("span", { style: { color: '#d4af37', fontFamily: 'monospace', fontWeight: 'bold' } }, idleResult.monstersKilled.toLocaleString())),
                            h("div", { style: { display: 'flex', justifyContent: 'space-between', fontSize: '12px', color: '#e8d5b0', opacity: 0.55 } },
                                h("span", null, "Kills/hr"),
                                h("span", { style: { fontFamily: 'monospace' } }, perHr(idleResult.monstersKilled))))),
                        idleResult.xpGained && Object.keys(idleResult.xpGained).length > 0 && (h("div", { style: { marginBottom: '12px', padding: '10px', background: '#111', borderRadius: '10px' } },
                            h("div", { style: { fontSize: '11px', color: '#e8d5b0', opacity: 0.5, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: '700', marginBottom: '6px' } }, "\u2B50 XP Gained"),
                            Object.entries(idleResult.xpGained).filter(([, xp]) => xp > 0).map(([skill, xp]) => (h("div", { key: skill, style: { marginBottom: '4px' } },
                                h("div", { style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', color: '#e8d5b0' } },
                                    h("span", { style: { textTransform: 'capitalize' } }, skill),
                                    h("span", { style: { color: '#d4af37', fontFamily: 'monospace', fontWeight: 'bold' } },
                                        "+",
                                        xp.toLocaleString(),
                                        " xp")),
                                h("div", { style: { display: 'flex', justifyContent: 'space-between', fontSize: '11px', color: '#e8d5b0', opacity: 0.45 } },
                                    h("span", null, "XP/hr"),
                                    h("span", { style: { fontFamily: 'monospace' } }, perHr(xp)))))))),
                        (() => {
                            const items = idleResult.itemsGained || idleResult.lootGained || {};
                            const entries = Object.entries(items).filter(([, q]) => q > 0);
                            const totalItems = entries.reduce((s, [, q]) => s + q, 0);
                            return entries.length > 0 ? (h("div", { style: { marginBottom: '12px', padding: '10px', background: '#111', borderRadius: '10px' } },
                                h("div", { style: { fontSize: '11px', color: '#e8d5b0', opacity: 0.5, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: '700', marginBottom: '6px' } }, idleResult.task?.type === 'combat' ? '🎒 Loot (Inventory)' : '🏦 Items (Banked)'),
                                entries.map(([itemId, qty]) => (h("div", { key: itemId, style: { marginBottom: '4px' } },
                                    h("div", { style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', color: '#e8d5b0' } },
                                        h("span", { style: { textTransform: 'capitalize' } }, itemId.replace(/_/g, ' ')),
                                        h("span", { style: { color: '#d4af37', fontFamily: 'monospace', fontWeight: 'bold' } },
                                            "\u00D7",
                                            qty.toLocaleString())),
                                    h("div", { style: { display: 'flex', justifyContent: 'space-between', fontSize: '11px', color: '#e8d5b0', opacity: 0.45 } },
                                        h("span", null, "/hr"),
                                        h("span", { style: { fontFamily: 'monospace' } }, perHr(qty)))))))) : null;
                        })(),
                        idleResult.lootBanked && Object.keys(idleResult.lootBanked).length > 0 && (h("div", { style: { marginBottom: '12px', padding: '10px', background: '#0f1a0f', borderRadius: '10px', border: '1px solid #1a3a1a' } },
                            h("div", { style: { fontSize: '11px', color: '#81c784', opacity: 0.9, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: '700', marginBottom: '6px' } }, "\uD83C\uDFE6 Auto-Banked"),
                            Object.entries(idleResult.lootBanked).map(([itemId, qty]) => (h("div", { key: itemId, style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', color: '#81c784', marginBottom: '3px', opacity: 0.85 } },
                                h("span", { style: { textTransform: 'capitalize' } }, itemId.replace(/_/g, ' ')),
                                h("span", { style: { fontFamily: 'monospace' } },
                                    "\u00D7",
                                    qty.toLocaleString())))))),
                        idleResult.lootLost && Object.keys(idleResult.lootLost).length > 0 && (h("div", { style: { marginBottom: '12px', padding: '10px', background: '#1a0f0f', borderRadius: '10px', border: '1px solid #3a1a1a' } },
                            h("div", { style: { fontSize: '11px', color: '#e57373', opacity: 0.8, textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: '700', marginBottom: '6px' } }, "\u26A0\uFE0F Lost (Inventory Full)"),
                            Object.entries(idleResult.lootLost).map(([itemId, qty]) => (h("div", { key: itemId, style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', color: '#e57373', marginBottom: '3px', opacity: 0.8 } },
                                h("span", { style: { textTransform: 'capitalize' } }, itemId.replace(/_/g, ' ')),
                                h("span", { style: { fontFamily: 'monospace' } },
                                    "\u00D7",
                                    qty.toLocaleString()))))))));
                })()),
                h("div", { style: { padding: '12px 16px', borderTop: '1px solid #222' } },
                    h("button", { onClick: () => setIdleResult(null), style: { width: '100%', padding: '13px', borderRadius: '12px', background: 'linear-gradient(135deg, #b8940e, #d4af37)', color: '#0f0f0f', fontFamily: 'Cinzel, serif', fontWeight: 'bold', fontSize: '14px', border: 'none', cursor: 'pointer' } }, "Continue Adventure"))))),
        showSaveMenu && (h("div", { onClick: () => setShowSaveMenu(false), style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 100, display: 'flex', alignItems: 'flex-end' } },
            h("div", { onClick: e => e.stopPropagation(), style: { width: '100%', background: '#1a1a1a', borderRadius: '20px 20px 0 0', padding: '20px', border: '1px solid #333', borderBottom: 'none' } },
                h("div", { style: { width: '40px', height: '4px', background: '#333', borderRadius: '2px', margin: '0 auto 20px' } }),
                h("h3", { style: { fontFamily: 'Cinzel, serif', fontSize: '15px', color: '#d4af37', textAlign: 'center', marginBottom: '16px' } }, "Save & Load"),
                h("button", { onClick: handleExport, style: { width: '100%', padding: '14px', borderRadius: '12px', background: '#2a2a2a', border: '1px solid #3a3a3a', color: '#e8d5b0', fontSize: '14px', fontWeight: '600', marginBottom: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', cursor: 'pointer' } }, "\uD83D\uDCE4 Export Save File"),
                h("label", { style: { display: 'block', width: '100%', padding: '14px', borderRadius: '12px', background: '#2a2a2a', border: '1px solid #3a3a3a', color: '#7bb3f0', fontSize: '14px', fontWeight: '600', marginBottom: '10px', textAlign: 'center', cursor: 'pointer', boxSizing: 'border-box' } },
                    "\uD83D\uDCE5 Import Save File",
                    h("input", { type: "file", accept: ".pocketrpg", onChange: handleImport, style: { display: 'none' } })),
                h("button", { onClick: () => setShowSaveMenu(false), style: { width: '100%', padding: '12px', borderRadius: '12px', background: 'transparent', border: '1px solid #2a2a2a', color: '#e8d5b0', opacity: 0.5, fontSize: '13px', cursor: 'pointer' } }, "Cancel"))))));
}
function App() {
    return (h(GameProvider, null,
        h(GameApp, null)));
}



// ── Bootstrap ──
render(h(App, null), document.getElementById('app'));
</script>
</body>
</html>
