<style>
:root {
  --color-parchment: #f5e6c8;
  --color-parchment-dark: #e8d5a8;
  --color-ink: #1a1a0e;
  --color-ink-light: #3d3a2e;
  --color-gold: #d4a017;
  --color-gold-light: #f0c040;
  --color-gold-dim: #8b6914;
  --color-blood: #8b1a1a;
  --color-blood-mid: #6b1414;
  --color-blood-light: #c0392b;
  --color-emerald: #1a6b3c;
  --color-emerald-mid: #1d7a44;
  --color-emerald-light: #27ae60;
  --color-mana: #2c5aa0;
  --color-mana-light: #3498db;
  --color-void: #0f0f0f;
  --color-void-light: #1a1a1a;
  --color-void-lighter: #252525;
  --color-void-border: #333;
  --color-xp-bar: #3cb043;
  --color-hp-green: #27ae60;
  --color-hp-yellow: #f39c12;
  --color-hp-red: #c0392b;
  --font-display: 'Cinzel', serif;
  --font-body: 'Nunito', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html, body, #app {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: var(--color-void);
  color: var(--color-parchment);
  font-family: var(--font-body);
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--color-void-light); }
::-webkit-scrollbar-thumb { background: var(--color-void-border); border-radius: 2px; }

/* Toast animations */
@keyframes toast-in {
  from { transform: translateY(-100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes toast-out {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100%); opacity: 0; }
}
.toast-enter { animation: toast-in 0.3s ease-out forwards; }
.toast-exit { animation: toast-out 0.3s ease-in forwards; }

/* Progress bar animation */
@keyframes progress-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.progress-active { animation: progress-pulse 1.2s ease-in-out infinite; }

/* Combat hit flash */
@keyframes hit-flash {
  0% { background-color: rgba(192, 57, 43, 0.3); }
  100% { background-color: transparent; }
}
.hit-flash { animation: hit-flash 0.3s ease-out; }

/* Safe area */
.pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
.mb-safe { margin-bottom: env(safe-area-inset-bottom); }
</style>

// Pre-compute XP table using exact level formula

/**

    const t = (lvl - 1) / 98;

    const secs = totalSeconds % 60;

function processAgilityTick(agilityState) {
    const state = { ...agilityState };
    const events = [];
    state.tickCount++;
    state.ticksRemaining--;
    if (state.ticksRemaining <= 0) {
        events.push({
            type: 'courseComplete',
            xp: state.action.xp,
            coinReward: state.action.coinReward || 0,
            actionName: state.action.name

        state.ticksRemaining = state.action.ticks;

function simulateIdleAgility(task, elapsedMs) {

    const TICK_MS = 600;
    const totalTicks = Math.floor(elapsedMs / TICK_MS);
    const laps = Math.floor(totalTicks / task.action.ticks);
    if (laps <= 0)

    const xpGained = { agility: task.action.xp * laps };
    const coinsGained = (task.action.coinReward || 0) * laps;
    return { xpGained, coinsGained, laps, skill: 'agility', actionName: task.action.name };

const DB_NAME = 'PocketRPG';
const DB_VERSION = 1;
let dbInstance = null;
/**
 * Get or create the database instance.
 * Handles stale connections (e.g. iOS Safari kills background tabs).
 */
async function getDB() {
    // If we have an instance, do a quick health-check before returning it
    if (dbInstance) {
        try {
            // A lightweight read to confirm the connection is alive
            await dbInstance.get('settings', '__healthcheck__');
            return dbInstance;
        }
        catch (e) {
            // Connection is dead — clear it and reconnect
            console.warn('[PocketRPG] DB connection stale, reconnecting...', e);
            try {
                dbInstance.close();
            }
            catch (_) { }
            dbInstance = null;
        }
    }
    dbInstance = await openDB(DB_NAME, DB_VERSION, {
        upgrade(db, oldVersion) {
            // Version 1: initial schema
            if (oldVersion < 1) {
                db.createObjectStore('player'); // key: 'profile'
                db.createObjectStore('stats'); // key: skill name
                db.createObjectStore('inventory'); // key: slot index
                db.createObjectStore('bank'); // key: item ID
                db.createObjectStore('equipment'); // key: slot name
                db.createObjectStore('settings'); // key: setting key
                db.createObjectStore('shortcuts'); // key: shortcut index
            }
        }
    });
    return dbInstance;
}
/**
 * Force-close and clear the DB instance (call before re-opening after error)
 */
function closeDB() {
    if (dbInstance) {
        try {
            dbInstance.close();
        }
        catch (_) { }
        dbInstance = null;
    }
}

 * Check if a save exists

async function hasSave() {
    const db = await getDB();
    const profile = await db.get('player', 'profile');
    return !!profile;
}

 * Delete the entire database
 */
async function deleteDB() {
    if (dbInstance) {
        dbInstance.close();
        dbInstance = null;
    }
    await indexedDB.deleteDatabase(DB_NAME);
}

const SAVE_VERSION = 1;
/**
 * Export entire game state to a downloadable file
 */
async function exportSave() {
    const db = await getDB();
    const data = {
        version: SAVE_VERSION,
        timestamp: Date.now(),
        player: await db.get('player', 'profile'),
        stats: {},
        inventory: [],
        bank: {},
        equipment: {},
        settings: {}
    };
    // Stats
    for (const skill of ALL_SKILLS) {
        data.stats[skill] = await db.get('stats', skill);
    }
    // Inventory
    for (let i = 0; i < INVENTORY_SIZE; i++) {
        data.inventory[i] = await db.get('inventory', i) || null;
    }
    // Bank
    const bankKeys = await db.getAllKeys('bank');
    for (const key of bankKeys) {
        data.bank[key] = await db.get('bank', key);
    }
    // Equipment
    for (const slot of EQUIPMENT_SLOTS) {
        data.equipment[slot] = await db.get('equipment', slot) || null;
    }
    // Settings
    const settingKeys = await db.getAllKeys('settings');
    for (const key of settingKeys) {
        data.settings[key] = await db.get('settings', key);
    }
    const json = JSON.stringify(data);
    const hash = fnv1a(json);
    const payload = JSON.stringify({ hash, data: json });
    const encoded = btoa(unescape(encodeURIComponent(payload)));
    // Download
    const blob = new Blob([encoded], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pocketrpg_${data.player?.name || 'save'}_${Date.now()}.pocketrpg`;
    a.click();
    URL.revokeObjectURL(url);
}
/**
 * Import a save file
 */
async function importSave(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const decoded = decodeURIComponent(escape(atob(e.target.result)));
                const { hash, data: json } = JSON.parse(decoded);
                // Verify integrity
                if (fnv1a(json) !== hash) {
                    reject(new Error('Save file integrity check failed'));
                    return;
                }
                const data = JSON.parse(json);
                // Wipe and recreate
                await deleteDB();
                // dynamic import removed — getDB is global
                const db = await getDB();
                // Restore player
                if (data.player)
                    await db.put('player', data.player, 'profile');
                // Restore stats
                const statsTx = db.transaction('stats', 'readwrite');
                for (const [skill, val] of Object.entries(data.stats)) {
                    if (val)
                        statsTx.store.put(val, skill);
                }
                await statsTx.done;
                // Restore inventory
                const invTx = db.transaction('inventory', 'readwrite');
                for (let i = 0; i < INVENTORY_SIZE; i++) {
                    if (data.inventory[i])
                        invTx.store.put(data.inventory[i], i);
                }
                await invTx.done;
                // Restore bank
                const bankTx = db.transaction('bank', 'readwrite');
                for (const [key, val] of Object.entries(data.bank)) {
                    bankTx.store.put(val, key);
                }
                await bankTx.done;
                // Restore equipment
                const eqTx = db.transaction('equipment', 'readwrite');
                for (const [slot, val] of Object.entries(data.equipment)) {
                    if (val)
                        eqTx.store.put(val, slot);
                }
                await eqTx.done;
                // Restore settings
                const setTx = db.transaction('settings', 'readwrite');
                for (const [key, val] of Object.entries(data.settings)) {
                    setTx.store.put(val, key);
                }
                await setTx.done;
                resolve();
            }
            catch (err) {
                reject(err);
            }
        };
        reader.readAsText(file);
    });
}
/**
 * Snapshot live game state to localStorage as a base64+hash backup.
 * Called every ~100 ticks (60s) from App tick loop.
 * Takes live state objects — no IDB read needed.
 */
function snapshotToLocalStorage(player, stats, inventory, bank, equipment) {
    try {
        const data = {
            version: SAVE_VERSION,
            timestamp: Date.now(),
            player,
            stats,
            inventory,
            bank,
            equipment,
            settings: {}
        };
        // Capture active task and last tick from localStorage so idle engine
        // can calculate elapsed time after a full page close + reopen
        try {
            data.settings.activeTask = JSON.parse(localStorage.getItem('pocketrpg_activeTask'));
        }
        catch {
            data.settings.activeTask = null;
        }
        data.settings.lastTick = parseInt(localStorage.getItem('pocketrpg_lastTick'), 10) || data.timestamp;
        const json = JSON.stringify(data);
        const hash = fnv1a(json);
        const payload = JSON.stringify({ hash, data: json });
        // Use safe UTF-16→Latin1 encoding for btoa (TextEncoder round-trip)
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        localStorage.setItem('pocketrpg_backup', encoded);
        console.log('[PocketRPG] Snapshot saved to localStorage, size:', encoded.length);
    }
    catch (err) {
        // localStorage may be full or unavailable — fail silently
        console.warn('[PocketRPG] Backup snapshot failed:', err);
    }
}
/**
 * Restore game state from localStorage backup into IndexedDB.
 * Returns the restored data object on success, or null if no backup / integrity fail.
 */
async function restoreFromLocalStorage() {
    try {
        const encoded = localStorage.getItem('pocketrpg_backup');
        if (!encoded)
            return null;
        const decoded = decodeURIComponent(escape(atob(encoded)));
        const { hash, data: json } = JSON.parse(decoded);
        if (fnv1a(json) !== hash) {
            console.warn('[PocketRPG] Backup integrity check failed — discarding');
            return null;
        }
        const data = JSON.parse(json);
        // Wipe IDB and restore
        await deleteDB();
        const db = await getDB();
        if (data.player)
            await db.put('player', data.player, 'profile');
        const statsTx = db.transaction('stats', 'readwrite');
        for (const [skill, val] of Object.entries(data.stats || {})) {
            if (val)
                statsTx.store.put(val, skill);
        }
        await statsTx.done;
        const invTx = db.transaction('inventory', 'readwrite');
        for (let i = 0; i < INVENTORY_SIZE; i++) {
            if (data.inventory?.[i])
                invTx.store.put(data.inventory[i], i);
        }
        await invTx.done;
        const bankTx = db.transaction('bank', 'readwrite');
        for (const [key, val] of Object.entries(data.bank || {})) {
            bankTx.store.put(val, key);
        }
        await bankTx.done;
        const eqTx = db.transaction('equipment', 'readwrite');
        for (const [slot, val] of Object.entries(data.equipment || {})) {
            if (val)
                eqTx.store.put(val, slot);
        }
        await eqTx.done;
        // Restore settings to IDB if present
        if (data.settings) {
            const setTx = db.transaction('settings', 'readwrite');
            for (const [key, val] of Object.entries(data.settings)) {
                if (key !== 'activeTask' && key !== 'lastTick' && val != null) {
                    setTx.store.put({ key, value: val }, key);
                }
            }
            await setTx.done;
        }
        // ── CRITICAL: Restore localStorage keys so idle engine can calculate elapsed time ──
        // Use the snapshot's lastTick (or timestamp as fallback) so loadGame() sees
        // a valid elapsed-time window on the next startup.
        const savedLastTick = data.settings?.lastTick || data.timestamp;
        if (savedLastTick) {
            localStorage.setItem('pocketrpg_lastTick', String(savedLastTick));
        }
        if (data.settings?.activeTask) {
            localStorage.setItem('pocketrpg_activeTask', JSON.stringify(data.settings.activeTask));
        }
        console.log('[PocketRPG] Restored from localStorage backup, timestamp:', data.timestamp);
        return data;
    }
    catch (err) {
        console.warn('[PocketRPG] Restore from backup failed:', err);
        return null;
    }
}

function getPlayerCombatLevel(stats) {
    const atk = getLevelFromXP(stats.attack?.xp || 0);
    const str = getLevelFromXP(stats.strength?.xp || 0);
    const def = getLevelFromXP(stats.defence?.xp || 0);
    const hp = getLevelFromXP(stats.hitpoints?.xp || 0);
    const prayer = getLevelFromXP(stats.prayer?.xp || 0);
    const ranged = getLevelFromXP(stats.ranged?.xp || 0);
    const magic = getLevelFromXP(stats.magic?.xp || 0);
    const base = Math.floor((def + hp + Math.floor(prayer / 2)) / 4);
    const melee = Math.floor((atk + str) * 13 / 40);
    const rangedCB = Math.floor(Math.floor(ranged * 3 / 2) * 13 / 40);
    const magicCB = Math.floor(Math.floor(magic * 3 / 2) * 13 / 40);
    return base + Math.max(melee, rangedCB, magicCB);
}

    const activeTaskRef = useRef(activeTask);

    const statsRef = useRef(stats);
    const equipmentRef = useRef(equipment);
    const inventoryRef = useRef(inventory);
    const itemsDataRef = useRef(itemsData);
    useEffect(() => { statsRef.current = stats; }, [stats]);
    useEffect(() => { equipmentRef.current = equipment; }, [equipment]);
    useEffect(() => { inventoryRef.current = inventory; }, [inventory]);
    // visibilitychange: stamp on hide, run idle on return
    useEffect(() => {
        if (!gameReady)
            return;
        const handleVisibility = async () => {
            if (document.hidden) {
                // Page going to background — stamp the hide time separately from tick heartbeat
                const now = Date.now();
                hiddenAtPerfRef.current = performance.now(); // monotonic — not affected by clock changes
                localStorage.setItem('pocketrpg_hiddenAt', String(now));
                localStorage.setItem('pocketrpg_activeTask', JSON.stringify(activeTaskRef.current));
            }
            else {
                // Page returning to foreground — prefer performance.now() diff (monotonic) over wall-clock
                // to prevent system-time manipulation from granting fake idle progress.
                try {

                    const savedTask = (() => { try {
                        return JSON.parse(localStorage.getItem('pocketrpg_activeTask'));
                    }
                    catch {
                        return null;
                    } })();
                    if (!rawHiddenAt)
                        return;
                    const hiddenAt = parseInt(rawHiddenAt, 10);
                    const perfNow = performance.now();
                    let elapsedMs;
                    if (hiddenAtPerfRef.current !== null && perfNow >= hiddenAtPerfRef.current) {
                        // Same session: use monotonic clock — immune to system time changes
                        elapsedMs = Math.floor(perfNow - hiddenAtPerfRef.current);
                    }
                    else {
                        // New session (page reloaded while hidden): fall back to wall-clock, capped at 24h
