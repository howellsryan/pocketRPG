<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PocketRPG Test Suite</title>
<style>
  body { background: #0d0d0d; color: #e8dcc8; font-family: monospace; padding: 16px; margin: 0; }
  h1 { color: #c9a84c; font-size: 18px; margin: 0 0 4px; }
  .subtitle { color: #888; font-size: 11px; margin-bottom: 16px; }
  .summary { background: #111; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: flex; gap: 24px; }
  .stat { text-align: center; }
  .stat-num { font-size: 24px; font-weight: bold; }
  .stat-label { font-size: 10px; color: #888; }
  .pass-num { color: #4ade80; }
  .fail-num { color: #f87171; }
  .group { background: #111; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .group-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .group-name { font-size: 13px; font-weight: bold; color: #e8dcc8; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: bold; }
  .badge-pass { background: #14532d; color: #4ade80; }
  .badge-fail { background: #450a0a; color: #f87171; }
  .tests { margin-top: 8px; border-top: 1px solid #1e1e1e; padding-top: 8px; display: none; }
  .group.open .tests { display: block; }
  .test { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .dot-pass { background: #4ade80; }
  .dot-fail { background: #f87171; }
  .test-name { font-size: 11px; }
  .test-detail { font-size: 10px; color: #888; margin-left: 16px; }
  .section-title { font-size: 10px; color: #c9a84c; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px; }
  .preview-card { background: #111; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .preview-label { font-size: 10px; color: #888; margin-bottom: 8px; }
  .toggle-wrap { display: flex; align-items: center; gap: 12px; }
  .toggle-track { position: relative; width: 48px; height: 28px; border-radius: 14px; cursor: pointer; transition: background 0.2s; }
  .toggle-track.off { background: #333; }
  .toggle-track.on { background: #9a7c2e; }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: white; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,.4); transition: transform 0.2s; }
  .toggle-track.on .toggle-thumb { transform: translateX(20px); }
  .toggle-label { font-size: 12px; }
  .course-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e1e1e; font-size: 11px; }
  .course-row:last-child { border: none; }
  .gold { color: #c9a84c; }
</style>
</head>

  }
  for (const slot of EQUIPMENT_SLOTS) {
    if (!equipment[slot]) continue
    const item = itemsData[equipment[slot].itemId]
    if (!item) continue
    if (item.attackBonus) for (const [k,v] of Object.entries(item.attackBonus)) bonuses.attackBonus[k] = (bonuses.attackBonus[k]||0)+v
    if (item.defenceBonus) for (const [k,v] of Object.entries(item.defenceBonus)) bonuses.defenceBonus[k] = (bonuses.defenceBonus[k]||0)+v
    if (item.otherBonus) for (const [k,v] of Object.entries(item.otherBonus)) bonuses.otherBonus[k] = (bonuses.otherBonus[k]||0)+v
  }
  return bonuses
}
function getAttackSpeed(equipment, itemsData) {
  if (!equipment.weapon) return 4
  const weapon = itemsData[equipment.weapon.itemId]
  return weapon?.attackSpeed || 4
}
function getAttackStyle(equipment, itemsData) {
  if (!equipment.weapon) return 'crush'
  const weapon = itemsData[equipment.weapon.itemId]
  return weapon?.attackStyle || 'crush'
}

function createInventory() { return new Array(INVENTORY_SIZE).fill(null) }
function freeSlots(inventory) { return inventory.filter(s => s === null).length }
function findItem(inventory, itemId) { return inventory.findIndex(s => s && s.itemId === itemId) }
function countItem(inventory, itemId) {
  return inventory.reduce((sum,slot) => slot && slot.itemId===itemId ? sum+slot.quantity : sum, 0)
}
function addItem(inventory, itemId, quantity, stackable=false) {
  if (stackable) {
    const existing = findItem(inventory, itemId)
    if (existing !== -1) { inventory[existing] = { ...inventory[existing], quantity: inventory[existing].quantity + quantity }; return true }
    const empty = inventory.indexOf(null)
    if (empty === -1) return false
    inventory[empty] = { itemId, quantity }
    return true
  }
  for (let q = 0; q < quantity; q++) {
    const empty = inventory.indexOf(null)
    if (empty === -1) return false
    inventory[empty] = { itemId, quantity: 1 }
  }
  return true
}

function formatIdleTime(ms) {
  const totalSeconds = Math.floor(ms / 1000)
  const days    = Math.floor(totalSeconds / 86400)
  const hours   = Math.floor((totalSeconds % 86400) / 3600)
  const minutes = Math.floor((totalSeconds % 3600) / 60)
  const seconds = totalSeconds % 60
  const parts = []
  if (days > 0)    parts.push(`${days}d`)
  if (hours > 0)   parts.push(`${hours}h`)
  if (minutes > 0) parts.push(`${minutes}m`)
  if (seconds > 0 || parts.length === 0) parts.push(`${seconds}s`)
  return parts.join(' ')
}

function simulateIdleSkilling(task, elapsedMs, bank, equipment=null, stats={}, itemsData={}) {
  if (!task || !task.action) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  let toolMult = 1.0
  if (equipment?.weapon) {
    const item = itemsData[equipment.weapon.itemId]
    if (item && item.toolFor === task.skill) toolMult = item.speedMultiplier ?? 1.0
  }
  const actionTicks = Math.max(1, Math.floor(task.action.ticks * toolMult))
  let actions = Math.floor(totalTicks / actionTicks)
  if (actions <= 0) return null
  const itemsConsumed = {}
  if (task.action.materials) {
    let maxFromMaterials = Infinity
    for (const [itemId, qtyPer] of Object.entries(task.action.materials)) {
      const available = (bank && bank[itemId]) ? bank[itemId].quantity : 0
      const possible = Math.floor(available / qtyPer)
      if (possible < maxFromMaterials) maxFromMaterials = possible
    }
    if (maxFromMaterials === 0) return null
    actions = Math.min(actions, maxFromMaterials)
    for (const [itemId, qtyPer] of Object.entries(task.action.materials)) {
      itemsConsumed[itemId] = qtyPer * actions
    }
  }
  const xpGained = {}
  const itemsGained = {}
  if ((task.action.xp||0) > 0 && task.skill) xpGained[task.skill] = task.action.xp * actions
  if (task.action.product) {
    const qty = (task.action.productQty||1) * actions
    itemsGained[task.action.product] = (itemsGained[task.action.product]||0) + qty
  }
  return { xpGained, itemsGained, itemsConsumed, actions, skill: task.skill, actionName: task.action.name }
}

function simulateIdleGather(task, elapsedMs) {
  if (!task || !task.gatherTask) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  const actions = Math.floor(totalTicks / task.gatherTask.ticks)
  if (actions <= 0) return null
  const itemsGained = {}
  const qty = (task.gatherTask.qty||1) * actions
  itemsGained[task.gatherTask.product] = (itemsGained[task.gatherTask.product]||0) + qty
  return { itemsGained, actions, actionName: task.gatherTask.name }
}

function avgHitStats_test(playerStats, equipment, monster, stance, itemsData) {
  const bonuses = getEquipmentBonuses(equipment, itemsData)
  const weaponStyle = getAttackStyle(equipment, itemsData)
  const weaponSpeed = getAttackSpeed(equipment, itemsData)
  const styleBonuses = getMeleeStyleBonuses(stance)
  const effStr = effectiveStrength(playerStats.strength, 0, 1.0, styleBonuses.strengthStyleBonus)
  const maxHit = meleeMaxHit(effStr, bonuses.otherBonus.meleeStrength)
  const effAtk = effectiveAttack(playerStats.attack, 0, 1.0, styleBonuses.attackStyleBonus)
  const atkRoll = maxAttackRoll(effAtk, bonuses.attackBonus[weaponStyle]||0)
  const defRoll = maxDefenceRoll(monster.stats.defence, monster.defenceBonus?.[weaponStyle]||0)
  const acc = hitChance(atkRoll, defRoll)
  const avgDmgPerHit = acc * (maxHit / 2)
  return { avgDmgPerHit, weaponSpeed, acc }
}

function simulateIdleCombat(task, elapsedMs, stats, equipment, inventory, itemsData) {
  if (!task || !task.monster) return null
  const monster = task.monster
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  if (totalTicks <= 0) return null
  const playerStats = {
    attack:   getLevelFromXP(stats.attack?.xp   || 0),
    strength: getLevelFromXP(stats.strength?.xp || 0),
    defence:  getLevelFromXP(stats.defence?.xp  || 0),
  }
  const { avgDmgPerHit, weaponSpeed } = avgHitStats_test(playerStats, equipment, monster, task.stance||'accurate', itemsData)
  const hitsNeeded = avgDmgPerHit > 0 ? Math.ceil(monster.hitpoints / avgDmgPerHit) : Infinity
  const ticksPerKill = hitsNeeded < Infinity ? 1 + (hitsNeeded-1)*weaponSpeed : Infinity
  const RESPAWN_TICKS = 2
  const ticksPerCycle = ticksPerKill < Infinity ? ticksPerKill + RESPAWN_TICKS : Infinity
  const monstersKilled = ticksPerCycle < Infinity ? Math.floor(totalTicks / ticksPerCycle) : 0
  if (monstersKilled <= 0) return { xpGained:{}, lootGained:{}, monstersKilled:0, lootLost:{} }
  const xpSkill = task.stance==='aggressive'?'strength':task.stance==='defensive'?'defence':'attack'
  const dmgDealt = monster.hitpoints
  const xpGained = {}
  xpGained[xpSkill] = Math.floor(dmgDealt * MELEE_XP_PER_DAMAGE) * monstersKilled
  xpGained.hitpoints = Math.floor(dmgDealt * HP_XP_PER_DAMAGE) * monstersKilled
  const newInv = [...inventory]
  const lootGained = {}
  const lootLost = {}
  for (let k = 0; k < monstersKilled; k++) {
    for (const drop of (monster.drops||[])) {
      if (Math.random() < drop.chance) {
        const qty = Array.isArray(drop.quantity)
          ? Math.floor(Math.random()*(drop.quantity[1]-drop.quantity[0]+1))+drop.quantity[0]
          : drop.quantity
        const item = itemsData[drop.itemId]
        const stackable = item?.stackable||false
        let added = false
        if (stackable) {
          const eIdx = newInv.findIndex(s => s && s.itemId===drop.itemId)
          if (eIdx!==-1) { newInv[eIdx]={...newInv[eIdx],quantity:newInv[eIdx].quantity+qty}; added=true }
          else { const ei=newInv.indexOf(null); if(ei!==-1){newInv[ei]={itemId:drop.itemId,quantity:qty};added=true} }
        } else {
          for (let q=0;q<qty;q++){const ei=newInv.indexOf(null);if(ei!==-1){newInv[ei]={itemId:drop.itemId,quantity:1};added=true}else{lootLost[drop.itemId]=(lootLost[drop.itemId]||0)+(qty-q);break}}
        }
        if (added) lootGained[drop.itemId]=(lootGained[drop.itemId]||0)+qty
        else lootLost[drop.itemId]=(lootLost[drop.itemId]||0)+qty
      }
    }
  }
  return { xpGained, lootGained, lootLost, monstersKilled, finalInventory: newInv }
}

// RENDER RESULTS
// ─────────────────────────────────────────────
function renderResults() {
  runAll()
  let totalPass = 0, totalFail = 0
  const container = document.getElementById('results')

  for (const grp of allTests) {
    const pass = grp.tests.filter(t => t.pass).length
    const fail = grp.tests.length - pass
    totalPass += pass
    totalFail += fail

    const div = document.createElement('div')
    div.className = 'group' + (fail > 0 ? ' open' : '')
    div.innerHTML = `
      <div class="group-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="group-name">${grp.name}</span>
        <span class="badge ${fail===0?'badge-pass':'badge-fail'}">${fail===0?`✓ ${pass}`:`✗ ${fail} fail`}</span>
      </div>
      <div class="tests">
        ${grp.tests.map(t => `
          <div class="test">
            <div class="dot ${t.pass?'dot-pass':'dot-fail'}"></div>
            <div>
              <div class="test-name" style="color:${t.pass?'#e8dcc8':'#f87171'}">${t.name}</div>
              ${t.detail ? `<div class="test-detail">${t.detail}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `
    container.appendChild(div)
  }

  document.getElementById('total-pass').textContent = totalPass
  document.getElementById('total-fail').textContent = totalFail
  document.getElementById('total-tests').textContent = totalPass + totalFail
}

// ─────────────────────────────────────────────
// RENDER UI PREVIEWS
// ─────────────────────────────────────────────
function renderModalPreview() {
  const container = document.getElementById('previews')

  // Toggle preview (fixed UX)
  const toggleCard = document.createElement('div')
  toggleCard.className = 'preview-card'
  let toggleOn = false
  toggleCard.innerHTML = `
    <div class="preview-label">Auto-Bank Loot Toggle — fixed UX (click to toggle)</div>
    <div style="background:#1a1a1a;border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;max-width:340px">
      <div>
        <div style="font-size:13px;font-weight:600;color:#e8dcc8">🏦 Auto-Bank Loot</div>
        <div id="toggle-sub" style="font-size:11px;color:#888;margin-top:2px">Off — loot stays in inventory</div>
      </div>
      <div class="toggle-track off" id="toggle-demo">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  `
  container.appendChild(toggleCard)
  setTimeout(() => {
    document.getElementById('toggle-demo').addEventListener('click', function() {
      toggleOn = !toggleOn
      this.className = 'toggle-track ' + (toggleOn ? 'on' : 'off')
      document.getElementById('toggle-sub').textContent = toggleOn
        ? '5m delay (Agility lv 1)'
        : 'Off — loot stays in inventory'
    })
  }, 0)

  // Agility course rates
  const agilityCard = document.createElement('div')
  agilityCard.className = 'preview-card'
  agilityCard.innerHTML = `
    <div class="preview-label">Agility Course Rates (buffed ticks)</div>
    <div style="max-width:340px">
      ${AGILITY_ACTIONS.map(a => {
        const secPerLap = (a.ticks * 0.6).toFixed(0)
        const lapsPerHr = Math.floor(3600 / (a.ticks * 0.6))
        const xpPerHr = Math.floor(lapsPerHr * a.xp).toLocaleString()
        return `<div class="course-row">
          <span style="color:#e8dcc8">Lv ${a.level} ${a.name.split(' ')[0]}</span>
          <span class="gold">${secPerLap}s · ${lapsPerHr}/hr · ${xpPerHr} xp/hr</span>
        </div>`
      }).join('')}
    </div>
  `
  container.appendChild(agilityCard)
}

renderResults()
renderModalPreview()
</script>
