<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const MAX_LEVEL = 99
const MAX_XP = 200_000_000
const INVENTORY_SIZE = 28
const TICK_MS = 600
const MELEE_XP_PER_DAMAGE = 4
const HP_XP_PER_DAMAGE = 1.33
const AGILITY_BANK_DELAY_LV1_MS = 5 * 60 * 1000
const AGILITY_BANK_DELAY_LV99_MS = 10 * 1000
const EQUIPMENT_SLOTS = ['head','body','legs','weapon','shield','gloves','boots','cape','neck','ring','ammo']

// ─────────────────────────────────────────────
// INLINED ENGINE: experience.js
// ─────────────────────────────────────────────
const XP_TABLE = new Array(MAX_LEVEL + 1)
XP_TABLE[1] = 0
;(function buildXPTable() {
  let cumulative = 0
  for (let level = 1; level < MAX_LEVEL; level++) {
    cumulative += Math.floor(level + 300 * Math.pow(2, level / 7))
    XP_TABLE[level + 1] = Math.floor(cumulative / 4)
  }
})()

function getXPForLevel(level) {
  if (level < 1) return 0
  if (level > MAX_LEVEL) return XP_TABLE[MAX_LEVEL]
  return XP_TABLE[level]
}
function getLevelFromXP(xp) {
  if (xp < 0) return 1
  let lo = 1, hi = MAX_LEVEL
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2)
    if (XP_TABLE[mid] <= xp) lo = mid
    else hi = mid - 1
  }
  return lo
}
function getXPToNextLevel(currentXP) {
  const level = getLevelFromXP(currentXP)
  if (level >= MAX_LEVEL) return 0
  return XP_TABLE[level + 1] - currentXP
}
function getLevelProgress(currentXP) {
  const level = getLevelFromXP(currentXP)
  if (level >= MAX_LEVEL) return 1
  const thisLevelXP = XP_TABLE[level]
  const nextLevelXP = XP_TABLE[level + 1]
  return (currentXP - thisLevelXP) / (nextLevelXP - thisLevelXP)
}

// ─────────────────────────────────────────────
// INLINED ENGINE: helpers.js
// ─────────────────────────────────────────────
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min }
function fnv1a(str) {
  let hash = 0x811c9dc5
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i)
    hash = Math.imul(hash, 0x01000193)
  }
  return (hash >>> 0).toString(16)
}
function calcCombatLevel(stats) {
  const base = 0.25 * (stats.defence + stats.hitpoints + Math.floor(stats.prayer / 2))
  const melee = 0.325 * (stats.attack + stats.strength)
  const range = 0.325 * Math.floor(stats.ranged * 1.5)
  const mage = 0.325 * Math.floor(stats.magic * 1.5)
  return Math.floor(base + Math.max(melee, range, mage))
}
function formatNumber(n) { return n.toLocaleString('en-US') }

// ─────────────────────────────────────────────
// INLINED ENGINE: agility.js
// ─────────────────────────────────────────────
function getAgilityBankDelayMs(agilityLevel) {
  const lvl = Math.max(1, Math.min(99, agilityLevel))
  const t = (lvl - 1) / 98
  return Math.round(AGILITY_BANK_DELAY_LV1_MS + t * (AGILITY_BANK_DELAY_LV99_MS - AGILITY_BANK_DELAY_LV1_MS))
}
function getAgilityBankDelayFromStats(stats) {
  const agilityXP = stats?.agility?.xp || 0
  const agilityLevel = getLevelFromXP(agilityXP)
  return getAgilityBankDelayMs(agilityLevel)
}
function formatBankDelay(ms) {
  const totalSeconds = Math.round(ms / 1000)
  const mins = Math.floor(totalSeconds / 60)
  const secs = totalSeconds % 60
  if (mins > 0 && secs > 0) return `${mins}m ${secs}s`
  if (mins > 0) return `${mins}m`
  return `${secs}s`
}
function simulateIdleAgility(task, elapsedMs) {
  if (!task || !task.action) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  const laps = Math.floor(totalTicks / task.action.ticks)
  if (laps <= 0) return null
  const xpGained = { agility: task.action.xp * laps }
  const coinsGained = (task.action.coinReward || 0) * laps
  return { xpGained, coinsGained, laps, skill: 'agility', actionName: task.action.name }
}

// ─────────────────────────────────────────────
// INLINED ENGINE: formulas.js
// ─────────────────────────────────────────────
function effectiveStrength(strengthLevel, potionBonus=0, prayerMult=1.0, styleBonus=0) {
  return Math.floor((strengthLevel + potionBonus) * prayerMult) + styleBonus + 8
}
function meleeMaxHit(effectiveStr, equipmentStrengthBonus, gearMult=1.0) {
  const base = Math.floor(0.5 + effectiveStr * (equipmentStrengthBonus + 64) / 640)
  return Math.floor(base * gearMult)
}
function effectiveAttack(attackLevel, potionBonus=0, prayerMult=1.0, styleBonus=0) {
  return Math.floor((attackLevel + potionBonus) * prayerMult) + styleBonus + 8
}
function maxAttackRoll(effectiveAtk, equipmentAttackBonus) { return effectiveAtk * (equipmentAttackBonus + 64) }
function maxDefenceRoll(defenceLevel, styleDefenceBonus) { return (defenceLevel + 9) * (styleDefenceBonus + 64) }
function hitChance(atkRoll, defRoll) {
  if (atkRoll > defRoll) return 1 - (defRoll + 2) / (2 * (atkRoll + 1))
  else return atkRoll / (2 * (defRoll + 1))
}
function getMeleeStyleBonuses(stance) {
  switch (stance) {
    case 'accurate':   return { attackStyleBonus: 3, strengthStyleBonus: 0, defenceStyleBonus: 0 }
    case 'aggressive': return { attackStyleBonus: 0, strengthStyleBonus: 3, defenceStyleBonus: 0 }
    case 'controlled': return { attackStyleBonus: 1, strengthStyleBonus: 1, defenceStyleBonus: 1 }
    case 'defensive':  return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 3 }
    default:           return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 0 }
  }
}

// ─────────────────────────────────────────────
// INLINED ENGINE: equipment.js
// ─────────────────────────────────────────────
function createEquipment() {
  const eq = {}
  for (const slot of EQUIPMENT_SLOTS) eq[slot] = null
  return eq
}
function getEquipmentBonuses(equipment, itemsData) {
  const bonuses = {
    attackBonus: { stab:0,slash:0,crush:0,magic:0,ranged:0 },
    defenceBonus: { stab:0,slash:0,crush:0,magic:0,ranged:0 },
    otherBonus: { meleeStrength:0,rangedStrength:0,magicDamage:0 }
  }
  for (const slot of EQUIPMENT_SLOTS) {
    if (!equipment[slot]) continue
    const item = itemsData[equipment[slot].itemId]
    if (!item) continue
    if (item.attackBonus) for (const [k,v] of Object.entries(item.attackBonus)) bonuses.attackBonus[k] = (bonuses.attackBonus[k]||0)+v
    if (item.defenceBonus) for (const [k,v] of Object.entries(item.defenceBonus)) bonuses.defenceBonus[k] = (bonuses.defenceBonus[k]||0)+v
    if (item.otherBonus) for (const [k,v] of Object.entries(item.otherBonus)) bonuses.otherBonus[k] = (bonuses.otherBonus[k]||0)+v
  }
  return bonuses
}
function getAttackSpeed(equipment, itemsData) {
  if (!equipment.weapon) return 4
  const weapon = itemsData[equipment.weapon.itemId]
  return weapon?.attackSpeed || 4
}
function getAttackStyle(equipment, itemsData) {
  if (!equipment.weapon) return 'crush'
  const weapon = itemsData[equipment.weapon.itemId]
  return weapon?.attackStyle || 'crush'
}

// ─────────────────────────────────────────────
// INLINED ENGINE: inventory.js
// ─────────────────────────────────────────────
function createInventory() { return new Array(INVENTORY_SIZE).fill(null) }
function freeSlots(inventory) { return inventory.filter(s => s === null).length }
function findItem(inventory, itemId) { return inventory.findIndex(s => s && s.itemId === itemId) }
function countItem(inventory, itemId) {
  return inventory.reduce((sum,slot) => slot && slot.itemId===itemId ? sum+slot.quantity : sum, 0)
}
function addItem(inventory, itemId, quantity, stackable=false) {
  if (stackable) {
    const existing = findItem(inventory, itemId)
    if (existing !== -1) { inventory[existing] = { ...inventory[existing], quantity: inventory[existing].quantity + quantity }; return true }
    const empty = inventory.indexOf(null)
    if (empty === -1) return false
    inventory[empty] = { itemId, quantity }
    return true
  }
  for (let q = 0; q < quantity; q++) {
    const empty = inventory.indexOf(null)
    if (empty === -1) return false
    inventory[empty] = { itemId, quantity: 1 }
  }
  return true
}

// ─────────────────────────────────────────────
// INLINED ENGINE: idleEngine.js (partial)
// ─────────────────────────────────────────────
function formatIdleTime(ms) {
  const totalSeconds = Math.floor(ms / 1000)
  const days    = Math.floor(totalSeconds / 86400)
  const hours   = Math.floor((totalSeconds % 86400) / 3600)
  const minutes = Math.floor((totalSeconds % 3600) / 60)
  const seconds = totalSeconds % 60
  const parts = []
  if (days > 0)    parts.push(`${days}d`)
  if (hours > 0)   parts.push(`${hours}h`)
  if (minutes > 0) parts.push(`${minutes}m`)
  if (seconds > 0 || parts.length === 0) parts.push(`${seconds}s`)
  return parts.join(' ')
}

function simulateIdleSkilling(task, elapsedMs, bank, equipment=null, stats={}, itemsData={}) {
  if (!task || !task.action) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  let toolMult = 1.0
  if (equipment?.weapon) {
    const item = itemsData[equipment.weapon.itemId]
    if (item && item.toolFor === task.skill) toolMult = item.speedMultiplier ?? 1.0
  }
  const actionTicks = Math.max(1, Math.floor(task.action.ticks * toolMult))
  let actions = Math.floor(totalTicks / actionTicks)
  if (actions <= 0) return null
  const itemsConsumed = {}
  if (task.action.materials) {
    let maxFromMaterials = Infinity
    for (const [itemId, qtyPer] of Object.entries(task.action.materials)) {
      const available = (bank && bank[itemId]) ? bank[itemId].quantity : 0
      const possible = Math.floor(available / qtyPer)
      if (possible < maxFromMaterials) maxFromMaterials = possible
    }
    if (maxFromMaterials === 0) return null
    actions = Math.min(actions, maxFromMaterials)
    for (const [itemId, qtyPer] of Object.entries(task.action.materials)) {
      itemsConsumed[itemId] = qtyPer * actions
    }
  }
  const xpGained = {}
  const itemsGained = {}
  if ((task.action.xp||0) > 0 && task.skill) xpGained[task.skill] = task.action.xp * actions
  if (task.action.product) {
    const qty = (task.action.productQty||1) * actions
    itemsGained[task.action.product] = (itemsGained[task.action.product]||0) + qty
  }
  return { xpGained, itemsGained, itemsConsumed, actions, skill: task.skill, actionName: task.action.name }
}

function simulateIdleGather(task, elapsedMs) {
  if (!task || !task.gatherTask) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  const actions = Math.floor(totalTicks / task.gatherTask.ticks)
  if (actions <= 0) return null
  const itemsGained = {}
  const qty = (task.gatherTask.qty||1) * actions
  itemsGained[task.gatherTask.product] = (itemsGained[task.gatherTask.product]||0) + qty
  return { itemsGained, actions, actionName: task.gatherTask.name }
}

function avgHitStats_test(playerStats, equipment, monster, stance, itemsData) {
  const bonuses = getEquipmentBonuses(equipment, itemsData)
  const weaponStyle = getAttackStyle(equipment, itemsData)
  const weaponSpeed = getAttackSpeed(equipment, itemsData)
  const styleBonuses = getMeleeStyleBonuses(stance)
  const effStr = effectiveStrength(playerStats.strength, 0, 1.0, styleBonuses.strengthStyleBonus)
  const maxHit = meleeMaxHit(effStr, bonuses.otherBonus.meleeStrength)
  const effAtk = effectiveAttack(playerStats.attack, 0, 1.0, styleBonuses.attackStyleBonus)
  const atkRoll = maxAttackRoll(effAtk, bonuses.attackBonus[weaponStyle]||0)
  const defRoll = maxDefenceRoll(monster.stats.defence, monster.defenceBonus?.[weaponStyle]||0)
  const acc = hitChance(atkRoll, defRoll)
  const avgDmgPerHit = acc * (maxHit / 2)
  return { avgDmgPerHit, weaponSpeed, acc }
}

function simulateIdleCombat(task, elapsedMs, stats, equipment, inventory, itemsData) {
  if (!task || !task.monster) return null
  const monster = task.monster
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  if (totalTicks <= 0) return null
  const playerStats = {
    attack:   getLevelFromXP(stats.attack?.xp   || 0),
    strength: getLevelFromXP(stats.strength?.xp || 0),
    defence:  getLevelFromXP(stats.defence?.xp  || 0),
  }
  const { avgDmgPerHit, weaponSpeed } = avgHitStats_test(playerStats, equipment, monster, task.stance||'accurate', itemsData)
  const hitsNeeded = avgDmgPerHit > 0 ? Math.ceil(monster.hitpoints / avgDmgPerHit) : Infinity
  const ticksPerKill = hitsNeeded < Infinity ? 1 + (hitsNeeded-1)*weaponSpeed : Infinity
  const RESPAWN_TICKS = 2
  const ticksPerCycle = ticksPerKill < Infinity ? ticksPerKill + RESPAWN_TICKS : Infinity
  const monstersKilled = ticksPerCycle < Infinity ? Math.floor(totalTicks / ticksPerCycle) : 0
  if (monstersKilled <= 0) return { xpGained:{}, lootGained:{}, monstersKilled:0, lootLost:{} }
  const xpSkill = task.stance==='aggressive'?'strength':task.stance==='defensive'?'defence':'attack'
  const dmgDealt = monster.hitpoints
  const xpGained = {}
  xpGained[xpSkill] = Math.floor(dmgDealt * MELEE_XP_PER_DAMAGE) * monstersKilled
  xpGained.hitpoints = Math.floor(dmgDealt * HP_XP_PER_DAMAGE) * monstersKilled
  const newInv = [...inventory]
  const lootGained = {}
  const lootLost = {}
  for (let k = 0; k < monstersKilled; k++) {
    for (const drop of (monster.drops||[])) {
      if (Math.random() < drop.chance) {
        const qty = Array.isArray(drop.quantity)
          ? Math.floor(Math.random()*(drop.quantity[1]-drop.quantity[0]+1))+drop.quantity[0]
          : drop.quantity
        const item = itemsData[drop.itemId]
        const stackable = item?.stackable||false
        let added = false
        if (stackable) {
          const eIdx = newInv.findIndex(s => s && s.itemId===drop.itemId)
          if (eIdx!==-1) { newInv[eIdx]={...newInv[eIdx],quantity:newInv[eIdx].quantity+qty}; added=true }
          else { const ei=newInv.indexOf(null); if(ei!==-1){newInv[ei]={itemId:drop.itemId,quantity:qty};added=true} }
        } else {
          for (let q=0;q<qty;q++){const ei=newInv.indexOf(null);if(ei!==-1){newInv[ei]={itemId:drop.itemId,quantity:1};added=true}else{lootLost[drop.itemId]=(lootLost[drop.itemId]||0)+(qty-q);break}}
        }
        if (added) lootGained[drop.itemId]=(lootGained[drop.itemId]||0)+qty
        else lootLost[drop.itemId]=(lootLost[drop.itemId]||0)+qty
      }
    }
  }
  return { xpGained, lootGained, lootLost, monstersKilled, finalInventory: newInv }
}

// ─────────────────────────────────────────────
// TEST HARNESS
// ─────────────────────────────────────────────
const allTests = []
let currentGroup = null

function group(name) {
  currentGroup = { name, tests: [] }
  allTests.push(currentGroup)
}

function assert(name, condition, detail='') {
  currentGroup.tests.push({ name, pass: !!condition, detail })
}

// ─────────────────────────────────────────────
// AGILITY DATA (buffed ticks from session 3)
// ─────────────────────────────────────────────
const AGILITY_ACTIONS = [
  { id:'gnome_stronghold', name:'Gnome Stronghold Course', level:1,  ticks:40, xp:86,  coinReward:10  },
  { id:'draynor_village',  name:'Draynor Village Rooftop',  level:10, ticks:38, xp:120, coinReward:25  },
  { id:'al_kharid',        name:'Al Kharid Rooftop',        level:20, ticks:35, xp:180, coinReward:50  },
  { id:'varrock',          name:'Varrock Rooftop',           level:30, ticks:33, xp:238, coinReward:90  },
  { id:'canifis',          name:'Canifis Rooftop',           level:40, ticks:30, xp:240, coinReward:140 },
  { id:'falador',          name:'Falador Rooftop',           level:50, ticks:28, xp:440, coinReward:200 },
  { id:'seers_village',    name:"Seers' Village Rooftop",    level:60, ticks:25, xp:570, coinReward:300 },
  { id:'pollnivneach',     name:'Pollnivneach Rooftop',      level:70, ticks:23, xp:890, coinReward:420 },
  { id:'rellekka',         name:'Rellekka Rooftop',          level:80, ticks:20, xp:780, coinReward:560 },
  { id:'ardougne',         name:'Ardougne Rooftop',          level:90, ticks:18, xp:793, coinReward:750 },
]

// ─────────────────────────────────────────────
// RUN ALL TESTS
// ─────────────────────────────────────────────
function runAll() {

  // ── GROUP 1: XP & Leveling ──
  group('XP & Leveling')
  assert('Level 1 needs 0 XP', getXPForLevel(1) === 0)
  assert('Level 2 XP > 0', getXPForLevel(2) > 0)
  assert('Level 10 XP = 1154', getXPForLevel(10) === 1154, `got ${getXPForLevel(10)}`)
  assert('Level 99 XP < MAX_XP', getXPForLevel(99) < MAX_XP)
  assert('Level table monotone increasing', (() => {
    for (let i = 2; i <= 99; i++) if (getXPForLevel(i) <= getXPForLevel(i-1)) return false
    return true
  })())
  assert('getLevelFromXP(0) = 1', getLevelFromXP(0) === 1)
  assert('getLevelFromXP(1154) = 10', getLevelFromXP(1154) === 10, `got ${getLevelFromXP(1154)}`)
  assert('getLevelFromXP(1153) = 9', getLevelFromXP(1153) === 9, `got ${getLevelFromXP(1153)}`)
  assert('getLevelFromXP(MAX_XP) = 99', getLevelFromXP(MAX_XP) === 99)
  assert('getLevelFromXP negative = 1', getLevelFromXP(-100) === 1)
  assert('getXPToNextLevel at 99 = 0', getXPToNextLevel(getXPForLevel(99)) === 0)
  assert('getXPToNextLevel at 1 > 0', getXPToNextLevel(0) > 0)
  assert('getLevelProgress at midpoint ≈ 0.5', (() => {
    const l1 = getXPForLevel(5), l2 = getXPForLevel(6)
    const mid = Math.floor((l1 + l2) / 2)
    const p = getLevelProgress(mid)
    return p > 0.4 && p < 0.6
  })(), 'progress should be near 0.5 at midpoint')
  assert('getLevelProgress at level cap = 1', getLevelProgress(MAX_XP) === 1)
  assert('XP table has 100 entries', XP_TABLE.length === 100, `got ${XP_TABLE.length}`)
  assert('Level 50 XP in range', getXPForLevel(50) > 100000 && getXPForLevel(50) < 2000000)
  assert('Level from just-above threshold', getLevelFromXP(getXPForLevel(20)) === 20)

  // ── GROUP 2: Combat Formulas ──
  group('Combat Formulas')
  assert('effectiveStrength base', effectiveStrength(1) === 9, `got ${effectiveStrength(1)}`)
  assert('effectiveStrength with style', effectiveStrength(10, 0, 1.0, 3) === 21, `got ${effectiveStrength(10,0,1.0,3)}`)
  assert('meleeMaxHit unarmed lv1', meleeMaxHit(effectiveStrength(1), 0) > 0)
  assert('hitChance perfect acc', hitChance(10000, 1) > 0.99)
  assert('hitChance zero atk', hitChance(0, 100) === 0)
  assert('hitChance equal rolls < 0.5', hitChance(100, 100) < 0.5)
  assert('hitChance atk > def > 0.5', hitChance(200, 100) > 0.5)
  assert('maxAttackRoll scales', maxAttackRoll(20, 0) === 20*64, `got ${maxAttackRoll(20,0)}`)
  assert('maxDefenceRoll base', maxDefenceRoll(1, 0) === 10*64, `got ${maxDefenceRoll(1,0)}`)
  assert('getMeleeStyleBonuses accurate', getMeleeStyleBonuses('accurate').attackStyleBonus === 3)
  assert('getMeleeStyleBonuses aggressive', getMeleeStyleBonuses('aggressive').strengthStyleBonus === 3)
  assert('getMeleeStyleBonuses defensive', getMeleeStyleBonuses('defensive').defenceStyleBonus === 3)
  assert('getMeleeStyleBonuses controlled all 1', (() => {
    const b = getMeleeStyleBonuses('controlled')
    return b.attackStyleBonus===1 && b.strengthStyleBonus===1 && b.defenceStyleBonus===1
  })())

  // ── GROUP 3: Equipment Bonuses ──
  group('Equipment Bonuses')
  const emptyEq = createEquipment()
  const testItems = {
    'bronze_sword': { id:'bronze_sword', slot:'weapon', attackBonus:{slash:4}, otherBonus:{meleeStrength:3}, attackSpeed:4, attackStyle:'slash' },
    'iron_helm': { id:'iron_helm', slot:'head', defenceBonus:{slash:5,stab:4,crush:3} }
  }
  const equippedEq = { ...emptyEq, weapon:{ itemId:'bronze_sword' }, head:{ itemId:'iron_helm' } }
  const bonuses = getEquipmentBonuses(equippedEq, testItems)
  assert('Equipment slash attack', bonuses.attackBonus.slash === 4, `got ${bonuses.attackBonus.slash}`)
  assert('Equipment melee strength', bonuses.otherBonus.meleeStrength === 3, `got ${bonuses.otherBonus.meleeStrength}`)
  assert('Equipment helm def slash', bonuses.defenceBonus.slash === 5, `got ${bonuses.defenceBonus.slash}`)
  assert('Empty equipment zeroes', getEquipmentBonuses(emptyEq, {}).attackBonus.slash === 0)
  assert('getAttackSpeed default', getAttackSpeed(emptyEq, {}) === 4)
  assert('getAttackSpeed with weapon', getAttackSpeed(equippedEq, testItems) === 4)
  assert('getAttackStyle default', getAttackStyle(emptyEq, {}) === 'crush')
  assert('getAttackStyle with weapon', getAttackStyle(equippedEq, testItems) === 'slash')

  // ── GROUP 4: Inventory ──
  group('Inventory')
  const inv = createInventory()
  assert('Fresh inventory 28 slots', inv.length === 28)
  assert('Fresh inventory all null', inv.every(s => s === null))
  assert('freeSlots fresh = 28', freeSlots(inv) === 28)
  addItem(inv, 'logs', 1, false)
  assert('addItem non-stackable', inv[0]?.itemId === 'logs')
  assert('freeSlots after add = 27', freeSlots(inv) === 27)
  const inv2 = createInventory()
  addItem(inv2, 'coins', 100, true)
  addItem(inv2, 'coins', 50, true)
  assert('addItem stackable stacks', countItem(inv2, 'coins') === 150, `got ${countItem(inv2,'coins')}`)
  assert('Stackable uses 1 slot', freeSlots(inv2) === 27)
  const fullInv = new Array(28).fill({ itemId:'logs', quantity:1 })
  assert('addItem to full inv returns false', addItem(fullInv, 'ore', 1, false) === false)

  // ── GROUP 5: formatIdleTime ──
  group('formatIdleTime')
  assert('0ms = 0s', formatIdleTime(0) === '0s')
  assert('1000ms = 1s', formatIdleTime(1000) === '1s')
  assert('60000ms = 1m', formatIdleTime(60000) === '1m')
  assert('61000ms = 1m 1s', formatIdleTime(61000) === '1m 1s')
  assert('3600000ms = 1h', formatIdleTime(3600000) === '1h')
  assert('3661000ms = 1h 1m 1s', formatIdleTime(3661000) === '1h 1m 1s')
  assert('86400000ms = 1d', formatIdleTime(86400000) === '1d')
  assert('90061000ms = 1d 1h 1m 1s', formatIdleTime(90061000) === '1d 1h 1m 1s')
  assert('999ms = 0s', formatIdleTime(999) === '0s')
  assert('1800000ms = 30m', formatIdleTime(1800000) === '30m')

  // ── GROUP 6: simulateIdleSkilling ──
  group('simulateIdleSkilling')
  const woodTask = { skill:'woodcutting', action:{ name:'Chop Normal Logs', ticks:4, xp:25, product:'logs' } }
  const woodResult = simulateIdleSkilling(woodTask, 60000, {})
  assert('Skilling returns result', woodResult !== null)
  assert('Skilling actions count', woodResult.actions === Math.floor(60000/TICK_MS/4), `got ${woodResult.actions}`)
  assert('Skilling XP correct', woodResult.xpGained.woodcutting === woodResult.actions * 25)
  assert('Skilling product correct', woodResult.itemsGained.logs === woodResult.actions)
  assert('Skilling 0ms returns null', simulateIdleSkilling(woodTask, 0, {}) === null)
  const smithTask = { skill:'smithing', action:{ name:'Smelt Bronze', ticks:3, xp:6.2, product:'bronze_bar', materials:{ copper_ore:1, tin_ore:1 } } }
  const bank = { copper_ore:{ itemId:'copper_ore', quantity:10 }, tin_ore:{ itemId:'tin_ore', quantity:5 } }
  const smithResult = simulateIdleSkilling(smithTask, 600000, bank)
  assert('Skilling capped by materials', smithResult.actions <= 5, `got ${smithResult.actions}`)
  assert('Skilling no materials returns null', simulateIdleSkilling(smithTask, 60000, {}) === null)

  // ── GROUP 7: simulateIdleGather ──
  group('simulateIdleGather')
  const gatherTask = { gatherTask:{ name:'Pick Flax', ticks:3, product:'flax', qty:1 } }
  const gResult = simulateIdleGather(gatherTask, 60000)
  assert('Gather returns result', gResult !== null)
  assert('Gather actions correct', gResult.actions === Math.floor(60000/TICK_MS/3))
  assert('Gather items correct', gResult.itemsGained.flax === gResult.actions)
  assert('Gather 0ms returns null', simulateIdleGather(gatherTask, 0) === null)
  assert('Gather null task returns null', simulateIdleGather(null, 60000) === null)
  assert('Gather actionName correct', gResult.actionName === 'Pick Flax')
  assert('Gather multi-qty', (() => {
    const t = { gatherTask:{ name:'Collect Sand', ticks:2, product:'sand', qty:3 } }
    const r = simulateIdleGather(t, 6000)
    return r.itemsGained.sand === r.actions * 3
  })())

  // ── GROUP 8: simulateIdleCombat / chickens ──
  group('simulateIdleCombat / chickens')
  const chicken = {
    id:'chicken', name:'Chicken', hitpoints:3, combatLevel:1,
    stats:{ attack:1, strength:1, defence:1 }, attackSpeed:4,
    drops:[{ itemId:'raw_chicken', quantity:1, chance:1.0 },{ itemId:'feather', quantity:5, chance:1.0 }]
  }
  const testItemsD = {
    raw_chicken:{ id:'raw_chicken', stackable:false },
    feather:{ id:'feather', stackable:true }
  }
  const combatStats = { attack:{ xp:getXPForLevel(10) }, strength:{ xp:getXPForLevel(10) }, defence:{ xp:0 } }
  const combatResult = simulateIdleCombat({ monster:chicken, stance:'accurate' }, 3600000, combatStats, emptyEq, createInventory(), testItemsD)
  assert('Combat returns result', combatResult !== null)
  assert('Chickens killed > 0', combatResult.monstersKilled > 0, `got ${combatResult.monstersKilled}`)
  assert('Attack XP gained', (combatResult.xpGained.attack||0) > 0)
  assert('HP XP gained', (combatResult.xpGained.hitpoints||0) > 0)
  assert('Final inventory populated', combatResult.finalInventory.some(s => s !== null))
  assert('Feathers stackable in inv', (() => {
    const featherSlots = combatResult.finalInventory.filter(s => s?.itemId==='feather')
    return featherSlots.length === 1
  })(), 'feathers should stack into one slot')
  assert('Raw chicken not stacked', (() => {
    // raw chicken is unstackable, so each kill should have its own slot
    return combatResult.finalInventory.filter(s => s?.itemId==='raw_chicken').length > 1 ||
           combatResult.monstersKilled === 1 ||
           combatResult.lootLost.raw_chicken > 0
  })())
  assert('XP = dmg * multiplier', (() => {
    const expected = Math.floor(chicken.hitpoints * MELEE_XP_PER_DAMAGE) * combatResult.monstersKilled
    return combatResult.xpGained.attack === expected
  })())
  assert('HP XP correct', (() => {
    const expected = Math.floor(chicken.hitpoints * HP_XP_PER_DAMAGE) * combatResult.monstersKilled
    return combatResult.xpGained.hitpoints === expected
  })())
  assert('lootGained or lootLost for raw chicken', (() => {
    const gained = combatResult.lootGained.raw_chicken || 0
    const lost = combatResult.lootLost.raw_chicken || 0
    return gained + lost === combatResult.monstersKilled
  })(), 'every kill should account for raw chicken')
  assert('No negative inventory slots', combatResult.finalInventory.every(s => s===null||s.quantity>0))
  assert('finalInventory length 28', combatResult.finalInventory.length === 28)

  // ── GROUP 9: simulateIdleCombat / aggressive ──
  group('simulateIdleCombat / aggressive')
  const aggressiveResult = simulateIdleCombat({ monster:chicken, stance:'aggressive' }, 3600000, combatStats, emptyEq, createInventory(), testItemsD)
  assert('Aggressive grants strength XP', (aggressiveResult.xpGained.strength||0) > 0)
  assert('Aggressive no attack XP', !aggressiveResult.xpGained.attack)
  assert('Aggressive kills > 0', aggressiveResult.monstersKilled > 0)

  // ── GROUP 10: simulateIdleCombat / full-inv ──
  group('simulateIdleCombat / full-inv')
  const fullInventory = new Array(28).fill({ itemId:'logs', quantity:1 })
  const fullInvResult = simulateIdleCombat({ monster:chicken, stance:'accurate' }, 3600000, combatStats, emptyEq, fullInventory, testItemsD)
  assert('Full inv result not null', fullInvResult !== null)
  assert('Full inv loot goes to lostLoot', Object.keys(fullInvResult.lootLost).length > 0 || fullInvResult.monstersKilled === 0)
  assert('Full inv kills > 0', fullInvResult.monstersKilled > 0)

  // ── GROUP 11: Combat Level ──
  group('Combat Level')
  assert('Lv1 character CB ~3', calcCombatLevel({attack:1,strength:1,defence:1,hitpoints:10,ranged:1,magic:1,prayer:1}) > 0)
  assert('High stat = high CB', (() => {
    const low = calcCombatLevel({attack:1,strength:1,defence:1,hitpoints:10,ranged:1,magic:1,prayer:1})
    const high = calcCombatLevel({attack:99,strength:99,defence:99,hitpoints:99,ranged:99,magic:99,prayer:99})
    return high > low
  })())
  assert('CB = 126 at 99 all', (() => {
    const cb = calcCombatLevel({attack:99,strength:99,defence:99,hitpoints:99,ranged:99,magic:99,prayer:99})
    return cb === 126
  })(), `got ${calcCombatLevel({attack:99,strength:99,defence:99,hitpoints:99,ranged:99,magic:99,prayer:99})}`)

  // ── GROUP 12: FNV-1a Hash ──
  group('FNV-1a Hash')
  assert('Hash non-empty string', fnv1a('hello').length > 0)
  assert('Hash deterministic', fnv1a('test') === fnv1a('test'))
  assert('Hash different strings differ', fnv1a('abc') !== fnv1a('def'))
  assert('Hash empty string', fnv1a('') !== fnv1a('a'))
  assert('Hash hex only', /^[0-9a-f]+$/.test(fnv1a('pocketrpg')))

  // ── GROUP 13: Auto-bank Delay ──
  group('Auto-bank Delay')
  assert('Lv1 delay = 5m', getAgilityBankDelayMs(1) === AGILITY_BANK_DELAY_LV1_MS, `got ${getAgilityBankDelayMs(1)}`)
  assert('Lv99 delay = 10s', getAgilityBankDelayMs(99) === AGILITY_BANK_DELAY_LV99_MS, `got ${getAgilityBankDelayMs(99)}`)
  assert('Delay decreases with level', getAgilityBankDelayMs(50) < getAgilityBankDelayMs(1))
  assert('Delay clamps below 1', getAgilityBankDelayMs(0) === AGILITY_BANK_DELAY_LV1_MS)
  assert('formatBankDelay 5m', formatBankDelay(300000) === '5m')
  assert('formatBankDelay 10s', formatBankDelay(10000) === '10s')
  assert('formatBankDelay mixed', formatBankDelay(90000) === '1m 30s')

  // ── GROUP 14: Agility Buff (new ticks) ──
  group('Agility Buff — ticks')
  assert('Gnome lv1 ticks = 40', AGILITY_ACTIONS[0].ticks === 40, `got ${AGILITY_ACTIONS[0].ticks}`)
  assert('Gnome lap time = 24s', (AGILITY_ACTIONS[0].ticks * 0.6) === 24, `got ${AGILITY_ACTIONS[0].ticks * 0.6}s`)
  assert('Ardougne ticks = 18', AGILITY_ACTIONS[9].ticks === 18, `got ${AGILITY_ACTIONS[9].ticks}`)
  assert('All courses ≤ 40 ticks', AGILITY_ACTIONS.every(a => a.ticks <= 40))
  assert('Ticks generally decrease by level', (() => {
    for (let i = 1; i < AGILITY_ACTIONS.length; i++) {
      if (AGILITY_ACTIONS[i].ticks > AGILITY_ACTIONS[i-1].ticks) return false
    }
    return true
  })(), 'higher level courses should be faster or equal')

  // ── GROUP 15: Agility XP rates (buffed) ──
  group('Agility XP rates')
  const gnomeAction = AGILITY_ACTIONS[0]
  const gnomeSim = simulateIdleAgility({ action: gnomeAction }, 3600000) // 1 hour
  assert('Gnome sim not null', gnomeSim !== null)
  assert('Gnome laps per hour > 80', gnomeSim.laps > 80, `got ${gnomeSim.laps} laps/hr`)
  assert('Gnome XP per hour > 7000', gnomeSim.xpGained.agility > 7000, `got ${gnomeSim.xpGained.agility} xp/hr`)
  assert('Gnome coins per hour > 800', gnomeSim.coinsGained > 800, `got ${gnomeSim.coinsGained} coins/hr`)

  // Old ticks were 100, new are 40 — verify at least 2x more laps
  const oldLapsPerHour = Math.floor(Math.floor(3600000/TICK_MS) / 100)
  assert('Gnome laps ≥ 2× old rate', gnomeSim.laps >= oldLapsPerHour * 2, `new:${gnomeSim.laps} old:${oldLapsPerHour}`)

  // ── GROUP 16: Agility coins to inventory ──
  group('Agility coins → inventory')
  const invForCoins = createInventory()
  // Simulate adding coins to inventory (the new behavior)
  const coinsIdx = invForCoins.findIndex(s => s && s.itemId === 'coins')
  const emptyIdx = invForCoins.findIndex(s => s === null)
  if (coinsIdx >= 0) {
    invForCoins[coinsIdx] = { ...invForCoins[coinsIdx], quantity: invForCoins[coinsIdx].quantity + 100 }
  } else if (emptyIdx >= 0) {
    invForCoins[emptyIdx] = { itemId: 'coins', quantity: 100 }
  }
  assert('Coins added to inventory slot', invForCoins.some(s => s?.itemId === 'coins'))
  assert('Coins amount correct', countItem(invForCoins, 'coins') === 100, `got ${countItem(invForCoins,'coins')}`)
  // Stacking: add more coins
  const coinsIdx2 = invForCoins.findIndex(s => s && s.itemId === 'coins')
  if (coinsIdx2 >= 0) invForCoins[coinsIdx2] = { ...invForCoins[coinsIdx2], quantity: invForCoins[coinsIdx2].quantity + 50 }
  assert('Coins stack (150 total)', countItem(invForCoins, 'coins') === 150, `got ${countItem(invForCoins,'coins')}`)
  assert('Coins take only 1 slot', invForCoins.filter(s => s?.itemId === 'coins').length === 1)
  // Full inventory fallback
  const fullInv2 = new Array(28).fill({ itemId:'logs', quantity:1 })
  const fullCoinsIdx = fullInv2.findIndex(s => s && s.itemId === 'coins')
  const fullEmpty = fullInv2.findIndex(s => s === null)
  const wouldGoToBank = fullCoinsIdx === -1 && fullEmpty === -1
  assert('Full inv falls back to bank', wouldGoToBank)

  // ── GROUP 17: XP Table Integrity ──
  group('XP Table Integrity')
  assert('XP table length = 100', XP_TABLE.length === 100)
  assert('XP[1] = 0', XP_TABLE[1] === 0)
  assert('XP monotone increase lv1-99', (() => {
    for (let i = 2; i <= 99; i++) if (XP_TABLE[i] <= XP_TABLE[i-1]) return false
    return true
  })())

  // ── GROUP 18: Stackable Items ──
  group('Stackable Items')
  const stackInv = createInventory()
  addItem(stackInv, 'arrow', 100, true)
  assert('Stack created', countItem(stackInv,'arrow') === 100)
  addItem(stackInv, 'arrow', 50, true)
  assert('Stack merged', countItem(stackInv,'arrow') === 150)
  assert('Stack one slot', stackInv.filter(s=>s?.itemId==='arrow').length === 1)
  addItem(stackInv, 'bolt', 200, true)
  assert('Two stackables two slots', freeSlots(stackInv) === 26)
  assert('countItem correct', countItem(stackInv,'bolt') === 200)

  // ── GROUP 19: simulateIdleCombat / cows ──
  group('simulateIdleCombat / cows')
  const cow = {
    id:'cow', name:'Cow', hitpoints:8, combatLevel:2,
    stats:{ attack:1, strength:1, defence:1 }, attackSpeed:4,
    drops:[{ itemId:'cowhide', quantity:1, chance:1.0 },{ itemId:'raw_beef', quantity:1, chance:1.0 }]
  }
  const cowItems = { cowhide:{ stackable:false }, raw_beef:{ stackable:false } }
  const cowResult = simulateIdleCombat({ monster:cow, stance:'accurate' }, 3600000, combatStats, emptyEq, createInventory(), cowItems)
  assert('Cows killed > 0', cowResult.monstersKilled > 0)
  assert('Cowhide or lostLoot', (cowResult.lootGained.cowhide||0) + (cowResult.lootLost.cowhide||0) === cowResult.monstersKilled)
  assert('Raw beef or lostLoot', (cowResult.lootGained.raw_beef||0) + (cowResult.lootLost.raw_beef||0) === cowResult.monstersKilled)
}

// ─────────────────────────────────────────────
// RENDER RESULTS
// ─────────────────────────────────────────────
function renderResults() {
  runAll()
  let totalPass = 0, totalFail = 0
  const container = document.getElementById('results')

  for (const grp of allTests) {
    const pass = grp.tests.filter(t => t.pass).length
    const fail = grp.tests.length - pass
    totalPass += pass
    totalFail += fail

    const div = document.createElement('div')
    div.className = 'group' + (fail > 0 ? ' open' : '')
    div.innerHTML = `
      <div class="group-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="group-name">${grp.name}</span>
        <span class="badge ${fail===0?'badge-pass':'badge-fail'}">${fail===0?`✓ ${pass}`:`✗ ${fail} fail`}</span>
      </div>
      <div class="tests">
        ${grp.tests.map(t => `
          <div class="test">
            <div class="dot ${t.pass?'dot-pass':'dot-fail'}"></div>
            <div>
              <div class="test-name" style="color:${t.pass?'#e8dcc8':'#f87171'}">${t.name}</div>
              ${t.detail ? `<div class="test-detail">${t.detail}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `
    container.appendChild(div)
  }

  document.getElementById('total-pass').textContent = totalPass
  document.getElementById('total-fail').textContent = totalFail
  document.getElementById('total-tests').textContent = totalPass + totalFail
}

// ─────────────────────────────────────────────
// RENDER UI PREVIEWS
// ─────────────────────────────────────────────
function renderModalPreview() {
  const container = document.getElementById('previews')

  // Toggle preview (fixed UX)
  const toggleCard = document.createElement('div')
  toggleCard.className = 'preview-card'
  let toggleOn = false
  toggleCard.innerHTML = `
    <div class="preview-label">Auto-Bank Loot Toggle — fixed UX (click to toggle)</div>
    <div style="background:#1a1a1a;border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;max-width:340px">
      <div>
        <div style="font-size:13px;font-weight:600;color:#e8dcc8">🏦 Auto-Bank Loot</div>
        <div id="toggle-sub" style="font-size:11px;color:#888;margin-top:2px">Off — loot stays in inventory</div>
      </div>
      <div class="toggle-track off" id="toggle-demo">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  `
  container.appendChild(toggleCard)
  setTimeout(() => {
    document.getElementById('toggle-demo').addEventListener('click', function() {
      toggleOn = !toggleOn
      this.className = 'toggle-track ' + (toggleOn ? 'on' : 'off')
      document.getElementById('toggle-sub').textContent = toggleOn
        ? '5m delay (Agility lv 1)'
        : 'Off — loot stays in inventory'
    })
  }, 0)

  // Agility course rates
  const agilityCard = document.createElement('div')
  agilityCard.className = 'preview-card'
  agilityCard.innerHTML = `
    <div class="preview-label">Agility Course Rates (buffed ticks)</div>
    <div style="max-width:340px">
      ${AGILITY_ACTIONS.map(a => {
        const secPerLap = (a.ticks * 0.6).toFixed(0)
        const lapsPerHr = Math.floor(3600 / (a.ticks * 0.6))
        const xpPerHr = Math.floor(lapsPerHr * a.xp).toLocaleString()
        return `<div class="course-row">
          <span style="color:#e8dcc8">Lv ${a.level} ${a.name.split(' ')[0]}</span>
          <span class="gold">${secPerLap}s · ${lapsPerHr}/hr · ${xpPerHr} xp/hr</span>
        </div>`
      }).join('')}
    </div>
  `
  container.appendChild(agilityCard)
}

renderResults()
renderModalPreview()
</script>
