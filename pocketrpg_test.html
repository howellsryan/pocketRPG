<body>
<h1>🧪 PocketRPG Test Suite</h1>
<div class="subtitle">Standalone test runner — no build required. Open in any browser.</div>
<div id="summary" class="summary"></div>
<div id="results"></div>
<div id="modal-preview"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// INLINED CONSTANTS
// ═══════════════════════════════════════════════════════════════════
const TICK_DURATION = 600;
const INVENTORY_SIZE = 28;
const EQUIPMENT_SLOTS = ['head', 'body', 'legs', 'weapon', 'shield', 'gloves', 'boots', 'cape', 'neck', 'ring', 'ammo'];
const MAX_XP = 200_000_000;
const MAX_LEVEL = 99;
const HITPOINTS_START_XP = 1154;
const MELEE_XP_PER_DAMAGE = 4;
const HP_XP_PER_DAMAGE = 1.33;
const COMBAT_SKILLS = ['attack', 'strength', 'defence', 'hitpoints', 'ranged', 'magic', 'prayer'];
const GATHERING_SKILLS = ['mining', 'woodcutting', 'fishing', 'farming', 'hunter'];
const PRODUCTION_SKILLS = ['smithing', 'cooking', 'crafting', 'fletching', 'herblore', 'runecraft'];
const UTILITY_SKILLS = ['agility', 'thieving', 'slayer', 'firemaking', 'construction'];
const ALL_SKILLS = [...COMBAT_SKILLS, ...GATHERING_SKILLS, ...PRODUCTION_SKILLS, ...UTILITY_SKILLS];
const SAVE_VERSION = 1;

// ═══════════════════════════════════════════════════════════════════
// INLINED HELPERS
// ═══════════════════════════════════════════════════════════════════
function fnv1a(str) {
  let hash = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 0x01000193);
  }
  return (hash >>> 0).toString(16);
}

function calcCombatLevel(stats) {
  const base = 0.25 * (stats.defence + stats.hitpoints + Math.floor(stats.prayer / 2));
  const melee = 0.325 * (stats.attack + stats.strength);
  const range = 0.325 * Math.floor(stats.ranged * 1.5);
  const mage = 0.325 * Math.floor(stats.magic * 1.5);
  return Math.floor(base + Math.max(melee, range, mage));
}

// ═══════════════════════════════════════════════════════════════════
// INLINED ENGINE: experience.js
// ═══════════════════════════════════════════════════════════════════
const XP_TABLE = new Array(MAX_LEVEL + 1);
XP_TABLE[1] = 0;
(function buildXPTable() {
  let cumulative = 0;
  for (let level = 1; level < MAX_LEVEL; level++) {
    cumulative += Math.floor(level + 300 * Math.pow(2, level / 7));
    XP_TABLE[level + 1] = Math.floor(cumulative / 4);
  }
})();

function getXPForLevel(level) {
  if (level < 1) return 0;
  if (level > MAX_LEVEL) return XP_TABLE[MAX_LEVEL];
  return XP_TABLE[level];
}

function getLevelFromXP(xp) {
  if (xp < 0) return 1;
  let lo = 1, hi = MAX_LEVEL;
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2);
    if (XP_TABLE[mid] <= xp) lo = mid;
    else hi = mid - 1;
  }
  return lo;
}

function getXPToNextLevel(currentXP) {
  const level = getLevelFromXP(currentXP);
  if (level >= MAX_LEVEL) return 0;
  return XP_TABLE[level + 1] - currentXP;
}

function getLevelProgress(currentXP) {
  const level = getLevelFromXP(currentXP);
  if (level >= MAX_LEVEL) return 1;
  const thisLevelXP = XP_TABLE[level];
  const nextLevelXP = XP_TABLE[level + 1];
  return (currentXP - thisLevelXP) / (nextLevelXP - thisLevelXP);
}

function clampXP(xp) { return Math.min(xp, MAX_XP); }

// ═══════════════════════════════════════════════════════════════════
// INLINED ENGINE: formulas.js
// ═══════════════════════════════════════════════════════════════════
function effectiveStrength(strengthLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
  return Math.floor((strengthLevel + potionBonus) * prayerMult) + styleBonus + 8;
}

function meleeMaxHit(effectiveStr, equipmentStrengthBonus, gearMult = 1.0) {
  const base = Math.floor(0.5 + effectiveStr * (equipmentStrengthBonus + 64) / 640);
  return Math.floor(base * gearMult);
}

function effectiveAttack(attackLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
  return Math.floor((attackLevel + potionBonus) * prayerMult) + styleBonus + 8;
}

function maxAttackRoll(effectiveAtk, equipmentAttackBonus) {
  return effectiveAtk * (equipmentAttackBonus + 64);
}

function maxDefenceRoll(defenceLevel, styleDefenceBonus) {
  return (defenceLevel + 9) * (styleDefenceBonus + 64);
}

function hitChance(atkRoll, defRoll) {
  if (atkRoll > defRoll) return 1 - (defRoll + 2) / (2 * (atkRoll + 1));
  return atkRoll / (2 * (defRoll + 1));
}

function getMeleeStyleBonuses(stance) {
  switch (stance) {
    case 'accurate':   return { attackStyleBonus: 3, strengthStyleBonus: 0, defenceStyleBonus: 0 };
    case 'aggressive': return { attackStyleBonus: 0, strengthStyleBonus: 3, defenceStyleBonus: 0 };
    case 'controlled': return { attackStyleBonus: 1, strengthStyleBonus: 1, defenceStyleBonus: 1 };
    case 'defensive':  return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 3 };
    default:           return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 0 };
  }
}

// ═══════════════════════════════════════════════════════════════════
// INLINED ENGINE: equipment.js
// ═══════════════════════════════════════════════════════════════════
function getEquipmentBonuses(equipment, itemsData) {
  const bonuses = {
    attackBonus: { stab: 0, slash: 0, crush: 0, magic: 0, ranged: 0 },
    defenceBonus: { stab: 0, slash: 0, crush: 0, magic: 0, ranged: 0 },
    otherBonus: { meleeStrength: 0, rangedStrength: 0, magicDamage: 0 }
  };
  for (const slot of EQUIPMENT_SLOTS) {
    if (!equipment[slot]) continue;
    const item = itemsData[equipment[slot].itemId];
    if (!item) continue;
    if (item.attackBonus) for (const [k, v] of Object.entries(item.attackBonus)) bonuses.attackBonus[k] = (bonuses.attackBonus[k] || 0) + v;
    if (item.defenceBonus) for (const [k, v] of Object.entries(item.defenceBonus)) bonuses.defenceBonus[k] = (bonuses.defenceBonus[k] || 0) + v;
    if (item.otherBonus) for (const [k, v] of Object.entries(item.otherBonus)) bonuses.otherBonus[k] = (bonuses.otherBonus[k] || 0) + v;
  }
  return bonuses;
}

function getAttackSpeed(equipment, itemsData) {
  if (!equipment.weapon) return 4;
  const weapon = itemsData[equipment.weapon.itemId];
  return weapon?.attackSpeed || 4;
}

function getAttackStyle(equipment, itemsData) {
  if (!equipment.weapon) return 'crush';
  const weapon = itemsData[equipment.weapon.itemId];
  return weapon?.attackStyle || 'crush';
}

// ═══════════════════════════════════════════════════════════════════
// INLINED ENGINE: inventory.js
// ═══════════════════════════════════════════════════════════════════
function freeSlots(inventory) { return inventory.filter(s => s === null).length; }

function addItem(inventory, itemId, quantity, stackable = false) {
  if (stackable) {
    const existing = inventory.findIndex(s => s && s.itemId === itemId);
    if (existing !== -1) {
      inventory[existing] = { ...inventory[existing], quantity: inventory[existing].quantity + quantity };
      return true;
    }
    const empty = inventory.indexOf(null);
    if (empty === -1) return false;
    inventory[empty] = { itemId, quantity };
    return true;
  }
  for (let q = 0; q < quantity; q++) {
    const empty = inventory.indexOf(null);
    if (empty === -1) return false;
    inventory[empty] = { itemId, quantity: 1 };
  }
  return true;
}

function countItem(inventory, itemId) {
  return inventory.reduce((sum, slot) => (slot && slot.itemId === itemId) ? sum + slot.quantity : sum, 0);
}

function removeItem(inventory, itemId, quantity = 1) {
  if (countItem(inventory, itemId) < quantity) return false;
  let remaining = quantity;
  for (let i = 0; i < inventory.length && remaining > 0; i++) {
    if (inventory[i] && inventory[i].itemId === itemId) {
      const take = Math.min(inventory[i].quantity, remaining);
      inventory[i].quantity -= take;
      remaining -= take;
      if (inventory[i].quantity <= 0) inventory[i] = null;
    }
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════════
// INLINED ENGINE: idleEngine.js
// ═══════════════════════════════════════════════════════════════════
const TICK_MS = 600;

function formatIdleTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const days    = Math.floor(totalSeconds / 86400);
  const hours   = Math.floor((totalSeconds % 86400) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  const parts = [];
  if (days > 0)    parts.push(`${days}d`);
  if (hours > 0)   parts.push(`${hours}h`);
  if (minutes > 0) parts.push(`${minutes}m`);
  if (seconds > 0 || parts.length === 0) parts.push(`${seconds}s`);
  return parts.join(' ');
}

function simulateIdleSkilling(task, elapsedMs) {
  if (!task || !task.action) return null;
  const totalTicks = Math.floor(elapsedMs / TICK_MS);
  const actionTicks = task.action.ticks;
  const actions = Math.floor(totalTicks / actionTicks);
  if (actions <= 0) return null;
  const xpGained = {};
  const itemsGained = {};
  const xpPer = task.action.xp || 0;
  if (xpPer > 0 && task.skill) xpGained[task.skill] = xpPer * actions;
  if (task.action.product) {
    const qty = (task.action.productQty || 1) * actions;
    itemsGained[task.action.product] = (itemsGained[task.action.product] || 0) + qty;
  }
  return { xpGained, itemsGained, actions, skill: task.skill, actionName: task.action.name };
}

function simulateIdleGather(task, elapsedMs) {
  if (!task || !task.gatherTask) return null;
  const totalTicks = Math.floor(elapsedMs / TICK_MS);
  const actionTicks = task.gatherTask.ticks;
  const actions = Math.floor(totalTicks / actionTicks);
  if (actions <= 0) return null;
  const itemsGained = {};
  const qty = (task.gatherTask.qty || 1) * actions;
  itemsGained[task.gatherTask.product] = (itemsGained[task.gatherTask.product] || 0) + qty;
  return { itemsGained, actions, actionName: task.gatherTask.name };
}

function simulateIdleCombat(task, elapsedMs, stats, equipment, inventory, itemsData) {
  if (!task || !task.monster) return null;
  const monster = task.monster;
  const totalTicks = Math.floor(elapsedMs / TICK_MS);
  if (totalTicks <= 0) return null;
  const playerStats = {
    attack:   getLevelFromXP(stats.attack?.xp   || 0),
    strength: getLevelFromXP(stats.strength?.xp || 0),
    defence:  getLevelFromXP(stats.defence?.xp  || 0),
  };
  // Inline avgDpsVsMonster
  const bonuses = getEquipmentBonuses(equipment, itemsData);
  const weaponStyle = getAttackStyle(equipment, itemsData);
  const weaponSpeed = getAttackSpeed(equipment, itemsData);
  const styleBonuses = getMeleeStyleBonuses(task.stance || 'accurate');
  const effStr = effectiveStrength(playerStats.strength, 0, 1.0, styleBonuses.strengthStyleBonus);
  const maxHit = meleeMaxHit(effStr, bonuses.otherBonus.meleeStrength);
  const effAtk = effectiveAttack(playerStats.attack, 0, 1.0, styleBonuses.attackStyleBonus);
  const atkRoll = maxAttackRoll(effAtk, bonuses.attackBonus[weaponStyle] || 0);
  const defRoll = maxDefenceRoll(monster.stats.defence, monster.defenceBonus?.[weaponStyle] || 0);
  const acc = hitChance(atkRoll, defRoll);
  const avgDmgPerHit = acc * (maxHit / 2);
  const dpsPerTick = avgDmgPerHit / weaponSpeed;

  const ticksPerKill = dpsPerTick > 0 ? Math.max(1, Math.ceil(monster.hitpoints / dpsPerTick)) : Infinity;
  const ticksPerCycle = ticksPerKill + 2;
  const monstersKilled = ticksPerCycle < Infinity ? Math.floor(totalTicks / ticksPerCycle) : 0;
  if (monstersKilled <= 0) return { xpGained: {}, lootGained: {}, monstersKilled: 0, lootLost: {} };

  const xpSkill = task.stance === 'aggressive' ? 'strength' : task.stance === 'defensive' ? 'defence' : 'attack';
  const dmgDealt = monster.hitpoints;
  const xpGained = {};
  xpGained[xpSkill] = Math.floor(dmgDealt * MELEE_XP_PER_DAMAGE) * monstersKilled;
  xpGained.hitpoints = Math.floor(dmgDealt * HP_XP_PER_DAMAGE) * monstersKilled;

  const newInv = [...inventory];
  const lootGained = {};
  const lootLost = {};

  for (let k = 0; k < monstersKilled; k++) {
    const drops = [];
    for (const drop of (monster.drops || [])) {
      if (Math.random() < drop.chance) {
        const qty = Array.isArray(drop.quantity)
          ? Math.floor(Math.random() * (drop.quantity[1] - drop.quantity[0] + 1)) + drop.quantity[0]
          : drop.quantity;
        drops.push({ itemId: drop.itemId, quantity: qty });
      }
    }
    for (const drop of drops) {
      const item = itemsData[drop.itemId];
      const stackable = item?.stackable || false;
      let added = false;
      if (stackable) {
        const existingIdx = newInv.findIndex(s => s && s.itemId === drop.itemId);
        if (existingIdx !== -1) {
          newInv[existingIdx] = { ...newInv[existingIdx], quantity: newInv[existingIdx].quantity + drop.quantity };
          added = true;
        } else {
          const emptyIdx = newInv.indexOf(null);
          if (emptyIdx !== -1) { newInv[emptyIdx] = { itemId: drop.itemId, quantity: drop.quantity }; added = true; }
        }
      } else {
        for (let q = 0; q < drop.quantity; q++) {
          const emptyIdx = newInv.indexOf(null);
          if (emptyIdx !== -1) { newInv[emptyIdx] = { itemId: drop.itemId, quantity: 1 }; added = true; }
          else { lootLost[drop.itemId] = (lootLost[drop.itemId] || 0) + (drop.quantity - q); break; }
        }
        if (!added && newInv.indexOf(null) === -1) { lootLost[drop.itemId] = (lootLost[drop.itemId] || 0) + drop.quantity; continue; }
      }
      if (added) lootGained[drop.itemId] = (lootGained[drop.itemId] || 0) + drop.quantity;
      else lootLost[drop.itemId] = (lootLost[drop.itemId] || 0) + drop.quantity;
    }
  }
  return { xpGained, lootGained, lootLost, monstersKilled, finalInventory: newInv };
}

// ═══════════════════════════════════════════════════════════════════
// INLINED ENGINE: saveload helpers (snapshot + restore)
// ═══════════════════════════════════════════════════════════════════
function snapshotToLocalStorage(player, stats, inventory, bank, equipment) {
  const data = {
    version: SAVE_VERSION,
    timestamp: Date.now(),
    player, stats, inventory, bank, equipment,
    settings: {}
  };
  try { data.settings.activeTask = JSON.parse(localStorage.getItem('pocketrpg_activeTask')); } catch { data.settings.activeTask = null; }
  data.settings.lastTick = parseInt(localStorage.getItem('pocketrpg_lastTick'), 10) || data.timestamp;

  const json = JSON.stringify(data);
  const hash = fnv1a(json);
  const payload = JSON.stringify({ hash, data: json });
  const encoded = btoa(unescape(encodeURIComponent(payload)));
  localStorage.setItem('pocketrpg_backup', encoded);
  return encoded;
}

function decodeBackup(encoded) {
  const decoded = decodeURIComponent(escape(atob(encoded)));
  const { hash, data: json } = JSON.parse(decoded);
  if (fnv1a(json) !== hash) return null;
  return JSON.parse(json);
}

// ═══════════════════════════════════════════════════════════════════
// MINIMAL ITEMS DATA (for tests)
// ═══════════════════════════════════════════════════════════════════
const TEST_ITEMS = {
  bones: { id: 'bones', name: 'Bones', type: 'resource', stackable: false, shopValue: 2 },
  raw_chicken: { id: 'raw_chicken', name: 'Raw Chicken', type: 'food', stackable: false, shopValue: 4 },

  tin_ore: { id: 'tin_ore', name: 'Tin Ore', type: 'resource', stackable: false, shopValue: 1 },

const TEST_CHICKEN = {

const TEST_GOBLIN = {
  id: 'goblin', name: 'Goblin', combatLevel: 5, hitpoints: 5,
  stats: { attack: 1, strength: 1, defence: 1, magic: 1, ranged: 1 },
  attackSpeed: 4, attackStyle: 'crush', attackBonus: 0, strengthBonus: 0,

// ═══════════════════════════════════════════════════════════════════
// TEST FRAMEWORK
// ═══════════════════════════════════════════════════════════════════
const results = [];
let currentGroup = '';

function group(name) { currentGroup = name; }

function assert(name, condition, detail) {
  results.push({ group: currentGroup, name, pass: !!condition, detail: detail || '' });
}

function assertEq(name, actual, expected, detail) {
  const pass = actual === expected;
  assert(name, pass, detail || `expected ${expected}, got ${actual}`);
}

function assertApprox(name, actual, expected, tolerance, detail) {
  const pass = Math.abs(actual - expected) <= tolerance;
  assert(name, pass, detail || `expected ~${expected}±${tolerance}, got ${actual}`);
}

function assertGt(name, actual, threshold, detail) {
  assert(name, actual > threshold, detail || `expected >${threshold}, got ${actual}`);
}

function assertGte(name, actual, threshold, detail) {
  assert(name, actual >= threshold, detail || `expected >=${threshold}, got ${actual}`);
}

// ═══════════════════════════════════════════════════════════════════
// RUN ALL TESTS
// ═══════════════════════════════════════════════════════════════════
function runAll() {

  // ── GROUP 1: XP & Leveling ──
  group('XP & Leveling');
  assertEq('Level 1 = 0 XP', getXPForLevel(1), 0);
  assertEq('Level 2 = 83 XP', getXPForLevel(2), 83);
  assertEq('Level 10 = 1154 XP', getXPForLevel(10), 1154);
  assertEq('Level 92 ≈ halfway to 99', getXPForLevel(92) >= 6000000, true, `Level 92 XP = ${getXPForLevel(92)}`);
  assertEq('Level 99 = 13034431', getXPForLevel(99), 13034431);
  assertEq('getLevelFromXP(0) = 1', getLevelFromXP(0), 1);
  assertEq('getLevelFromXP(82) = 1', getLevelFromXP(82), 1);
  assertEq('getLevelFromXP(83) = 2', getLevelFromXP(83), 2);
  assertEq('getLevelFromXP(1154) = 10', getLevelFromXP(1154), 10);
  assertEq('getLevelFromXP(13034431) = 99', getLevelFromXP(13034431), 99);
  assertEq('getLevelFromXP(200M) = 99', getLevelFromXP(200000000), 99);
  assertEq('getLevelFromXP(-1) = 1', getLevelFromXP(-1), 1);
  assertEq('clampXP caps at 200M', clampXP(300000000), 200000000);
  assertEq('clampXP passes through valid', clampXP(5000), 5000);
  assertEq('getXPToNextLevel at 99 = 0', getXPToNextLevel(13034431), 0);
  assertGt('getXPToNextLevel at 0 > 0', getXPToNextLevel(0), 0);
  const prog = getLevelProgress(Math.floor((getXPForLevel(50) + getXPForLevel(51)) / 2));
  assert('getLevelProgress ~0.5 at midpoint', prog > 0.4 && prog < 0.6, `progress = ${prog.toFixed(3)}`);

  // ── GROUP 2: Combat Formulas ──
  group('Combat Formulas');
  const es = effectiveStrength(1, 0, 1.0, 0);

// ═══════════════════════════════════════════════════════════════════
// RENDER RESULTS
// ═══════════════════════════════════════════════════════════════════
function renderResults() {
  runAll();

  const groups = {};
  for (const r of results) {
    if (!groups[r.group]) groups[r.group] = [];
    groups[r.group].push(r);
  }

  const totalPass = results.filter(r => r.pass).length;
  const totalFail = results.filter(r => !r.pass).length;

  document.getElementById('summary').innerHTML = `
    <span class="total">${results.length} tests</span>
    <span class="pass">✅ ${totalPass} passed</span>
    ${totalFail > 0 ? `<span class="fail">❌ ${totalFail} failed</span>` : ''}
  `;

  let html = '';
  for (const [name, tests] of Object.entries(groups)) {
    const allPass = tests.every(t => t.pass);
    const failCount = tests.filter(t => !t.pass).length;
    // Auto-open groups with failures
    html += `<div class="group ${allPass ? '' : 'open'}">`;
    html += `<div class="group-header" onclick="this.parentElement.classList.toggle('open')">`;
    html += `<h3>${name} (${tests.length})</h3>`;
    html += `<span class="group-badge ${allPass ? 'pass' : 'fail'}">${allPass ? '✅ PASS' : `❌ ${failCount} FAIL`}</span>`;
    html += `</div><div class="group-body">`;
    for (const t of tests) {
      html += `<div class="test-row ${t.pass ? 'pass' : 'fail'}">`;
      html += `<span class="icon">${t.pass ? '✓' : '✗'}</span>`;
      html += `<div><div class="name">${t.name}</div>`;
      if (t.detail) html += `<div class="detail">${t.detail}</div>`;
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }

  document.getElementById('results').innerHTML = html;
}

  EQUIPMENT_SLOTS.forEach(s => combatEq[s] = null);
  const chickenTask = { type: 'combat', monster: TEST_CHICKEN, stance: 'accurate' };
  const sim = simulateIdleCombat(chickenTask, 300000, combatStats, combatEq, new Array(28).fill(null), TEST_ITEMS);

  if (!sim) return;

  const elapsed = formatIdleTime(300000);
  let html = `<div class="modal-preview">`;
  html += `<h3>💤 Welcome Back! Modal Preview</h3>`;
  html += `<div style="font-size:12px;color:#c8a96e;margin-bottom:8px">Away for ${elapsed} — Fighting Chicken (accurate)</div>`;

  if (sim.monstersKilled > 0) {
    html += `<div style="padding:8px;background:#111;border-radius:8px;margin-bottom:8px">`;
    html += `<div style="font-size:11px;color:#888;margin-bottom:4px">⚔️ COMBAT</div>`;
    html += `<div style="font-size:13px">${sim.monstersKilled} kills</div></div>`;
  }

  if (sim.xpGained && Object.keys(sim.xpGained).length > 0) {
    html += `<div style="padding:8px;background:#111;border-radius:8px;margin-bottom:8px">`;
    html += `<div style="font-size:11px;color:#888;margin-bottom:4px">⭐ XP GAINED</div>`;
    for (const [skill, xp] of Object.entries(sim.xpGained)) {
      if (xp > 0) html += `<div style="display:flex;justify-content:space-between;font-size:13px"><span>${skill}</span><span style="color:#d4af37;font-family:monospace">+${xp.toLocaleString()} xp</span></div>`;
    }
    html += `</div>`;
  }

  const items = sim.lootGained || {};
  if (Object.keys(items).length > 0) {
    html += `<div style="padding:8px;background:#111;border-radius:8px;margin-bottom:8px">`;
    html += `<div style="font-size:11px;color:#888;margin-bottom:4px">🎒 LOOT (Inventory)</div>`;
    for (const [itemId, qty] of Object.entries(items)) {
      html += `<div style="display:flex;justify-content:space-between;font-size:13px"><span>${itemId.replace(/_/g, ' ')}</span><span style="color:#d4af37;font-family:monospace">×${qty}</span></div>`;
    }
    html += `</div>`;
  }

  if (sim.lootLost && Object.keys(sim.lootLost).length > 0) {
    html += `<div style="padding:8px;background:#1a0f0f;border:1px solid #3a1a1a;border-radius:8px">`;
    html += `<div style="font-size:11px;color:#e57373;margin-bottom:4px">⚠️ LOST (Inventory Full)</div>`;
    for (const [itemId, qty] of Object.entries(sim.lootLost)) {
      html += `<div style="display:flex;justify-content:space-between;font-size:13px;color:#e57373"><span>${itemId.replace(/_/g, ' ')}</span><span style="font-family:monospace">×${qty}</span></div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('modal-preview').innerHTML = html;
}

// Run on load
renderResults();
renderModalPreview();
</script>
</body>
</html>
