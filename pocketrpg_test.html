<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PocketRPG Test Suite</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e8d5b0; font-family: 'Segoe UI', sans-serif; font-size: 13px; padding: 16px; }
  h1 { font-family: serif; color: #d4af37; font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #e8d5b0; opacity: 0.4; font-size: 11px; margin-bottom: 16px; }
  .summary { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .summary-box { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 16px; text-align: center; }
  .summary-box .num { font-size: 22px; font-weight: bold; font-family: monospace; }
  .summary-box .lbl { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .pass { color: #4caf50; } .fail { color: #e57373; } .warn { color: #ffb74d; }
  .group { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .group-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .group-header:hover { background: #222; }
  .group-title { font-weight: bold; font-size: 13px; }
  .badge { font-size: 10px; font-family: monospace; padding: 2px 8px; border-radius: 99px; font-weight: bold; }
  .badge-pass { background: #1a3a1a; color: #4caf50; }
  .badge-fail { background: #3a1a1a; color: #e57373; }
  .group-body { padding: 0 14px 10px; display: none; }
  .group-body.open { display: block; }
  .test { padding: 5px 0; border-bottom: 1px solid #222; }
  .test:last-child { border-bottom: none; }
  .test-name { display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-pass { background: #4caf50; }
  .dot-fail { background: #e57373; }
  .test-detail { font-size: 10px; color: #e8d5b0; opacity: 0.45; margin-left: 13px; font-family: monospace; margin-top: 2px; }
  .section-title { font-family: serif; color: #d4af37; font-size: 15px; margin: 20px 0 10px; }
  .modal-preview { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; margin-bottom: 12px; max-width: 380px; }
  .modal-preview h3 { font-size: 12px; color: #d4af37; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
<h1>PocketRPG Test Suite</h1>
<div class="subtitle" id="subtitle">Running tests…</div>
<div class="summary" id="summary"></div>
<div id="results"></div>
<div class="section-title">Modal / UI Previews</div>
<div id="previews"></div>

<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const MAX_LEVEL = 99
const MAX_XP = 200_000_000
const TICK_MS = 600
const INVENTORY_SIZE = 28
const MELEE_XP_PER_DAMAGE = 4
const HP_XP_PER_DAMAGE = 1.33
const AGILITY_BANK_DELAY_LV1_MS = 5 * 60 * 1000  // 300000 ms
const AGILITY_BANK_DELAY_LV99_MS = 10 * 1000       // 10000 ms

// ─────────────────────────────────────────────
// INLINED ENGINE: experience
// ─────────────────────────────────────────────
const XP_TABLE = new Array(MAX_LEVEL + 1)
XP_TABLE[1] = 0
function buildXPTable() {
  let cumulative = 0
  for (let level = 1; level < MAX_LEVEL; level++) {
    cumulative += Math.floor(level + 300 * Math.pow(2, level / 7))
    XP_TABLE[level + 1] = Math.floor(cumulative / 4)
  }
}
buildXPTable()

function getXPForLevel(level) {
  if (level < 1) return 0
  if (level > MAX_LEVEL) return XP_TABLE[MAX_LEVEL]
  return XP_TABLE[level]
}

function getLevelFromXP(xp) {
  if (xp < 0) return 1
  let lo = 1, hi = MAX_LEVEL
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2)
    if (XP_TABLE[mid] <= xp) lo = mid
    else hi = mid - 1
  }
  return lo
}

// ─────────────────────────────────────────────
// INLINED ENGINE: formulas
// ─────────────────────────────────────────────
function effectiveStrength(strengthLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
  return Math.floor((strengthLevel + potionBonus) * prayerMult) + styleBonus + 8
}
function meleeMaxHit(effectiveStr, equipmentStrengthBonus, gearMult = 1.0) {
  const base = Math.floor(0.5 + effectiveStr * (equipmentStrengthBonus + 64) / 640)
  return Math.floor(base * gearMult)
}
function effectiveAttack(attackLevel, potionBonus = 0, prayerMult = 1.0, styleBonus = 0) {
  return Math.floor((attackLevel + potionBonus) * prayerMult) + styleBonus + 8
}
function maxAttackRoll(effectiveAtk, equipmentAttackBonus) {
  return effectiveAtk * (equipmentAttackBonus + 64)
}
function maxDefenceRoll(defenceLevel, styleDefenceBonus) {
  return (defenceLevel + 9) * (styleDefenceBonus + 64)
}
function hitChance(atkRoll, defRoll) {
  if (atkRoll > defRoll) return 1 - (defRoll + 2) / (2 * (atkRoll + 1))
  return atkRoll / (2 * (defRoll + 1))
}
function getMeleeStyleBonuses(stance) {
  switch (stance) {
    case 'accurate':   return { attackStyleBonus: 3, strengthStyleBonus: 0, defenceStyleBonus: 0 }
    case 'aggressive': return { attackStyleBonus: 0, strengthStyleBonus: 3, defenceStyleBonus: 0 }
    case 'controlled': return { attackStyleBonus: 1, strengthStyleBonus: 1, defenceStyleBonus: 1 }
    case 'defensive':  return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 3 }
    default:           return { attackStyleBonus: 0, strengthStyleBonus: 0, defenceStyleBonus: 0 }
  }
}

// ─────────────────────────────────────────────
// INLINED ENGINE: equipment
// ─────────────────────────────────────────────
const EQUIPMENT_SLOTS = ['head', 'body', 'legs', 'weapon', 'shield', 'gloves', 'boots', 'cape', 'neck', 'ring', 'ammo']
function getEquipmentBonuses(equipment, itemsData) {
  const bonuses = {
    attackBonus: { stab: 0, slash: 0, crush: 0, magic: 0, ranged: 0 },
    defenceBonus: { stab: 0, slash: 0, crush: 0, magic: 0, ranged: 0 },
    otherBonus: { meleeStrength: 0, rangedStrength: 0, magicDamage: 0 }
  }
  for (const slot of EQUIPMENT_SLOTS) {
    if (!equipment[slot]) continue
    const item = itemsData[equipment[slot].itemId]
    if (!item) continue
    if (item.attackBonus) for (const [k, v] of Object.entries(item.attackBonus)) bonuses.attackBonus[k] = (bonuses.attackBonus[k] || 0) + v
    if (item.defenceBonus) for (const [k, v] of Object.entries(item.defenceBonus)) bonuses.defenceBonus[k] = (bonuses.defenceBonus[k] || 0) + v
    if (item.otherBonus) for (const [k, v] of Object.entries(item.otherBonus)) bonuses.otherBonus[k] = (bonuses.otherBonus[k] || 0) + v
  }
  return bonuses
}
function getAttackSpeed(equipment, itemsData) {
  if (!equipment.weapon) return 4
  const weapon = itemsData[equipment.weapon.itemId]
  return weapon?.attackSpeed || 4
}
function getAttackStyle(equipment, itemsData) {
  if (!equipment.weapon) return 'crush'
  const weapon = itemsData[equipment.weapon.itemId]
  return weapon?.attackStyle || 'crush'
}

// ─────────────────────────────────────────────
// INLINED ENGINE: inventory
// ─────────────────────────────────────────────
function freeSlots(inventory) { return inventory.filter(s => s === null).length }
function findItem(inventory, itemId) { return inventory.findIndex(s => s && s.itemId === itemId) }
function countItem(inventory, itemId) {
  return inventory.reduce((sum, slot) => { if (slot && slot.itemId === itemId) return sum + slot.quantity; return sum }, 0)
}
function addItem(inventory, itemId, quantity, stackable = false) {
  if (stackable) {
    const existing = findItem(inventory, itemId)
    if (existing !== -1) { inventory[existing] = { ...inventory[existing], quantity: inventory[existing].quantity + quantity }; return true }
    const empty = inventory.indexOf(null)
    if (empty === -1) return false
    inventory[empty] = { itemId, quantity }
    return true
  }
  for (let q = 0; q < quantity; q++) {
    const empty = inventory.indexOf(null)
    if (empty === -1) return false
    inventory[empty] = { itemId, quantity: 1 }
  }
  return true
}
function removeItem(inventory, itemId, quantity = 1) {
  if (countItem(inventory, itemId) < quantity) return false
  let remaining = quantity
  for (let i = 0; i < inventory.length && remaining > 0; i++) {
    if (inventory[i] && inventory[i].itemId === itemId) {
      const take = Math.min(inventory[i].quantity, remaining)
      inventory[i].quantity -= take
      remaining -= take
      if (inventory[i].quantity <= 0) inventory[i] = null
    }
  }
  return true
}

// ─────────────────────────────────────────────
// INLINED ENGINE: helpers
// ─────────────────────────────────────────────
function formatIdleTime(ms) {
  const totalSeconds = Math.floor(ms / 1000)
  const days    = Math.floor(totalSeconds / 86400)
  const hours   = Math.floor((totalSeconds % 86400) / 3600)
  const minutes = Math.floor((totalSeconds % 3600) / 60)
  const seconds = totalSeconds % 60
  const parts = []
  if (days > 0) parts.push(`${days}d`)
  if (hours > 0) parts.push(`${hours}h`)
  if (minutes > 0) parts.push(`${minutes}m`)
  if (seconds > 0 || parts.length === 0) parts.push(`${seconds}s`)
  return parts.join(' ')
}

function fnv1a(str) {
  let hash = 2166136261
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i)
    hash = (hash * 16777619) >>> 0
  }
  return hash >>> 0
}

// ─────────────────────────────────────────────
// INLINED ENGINE: agility
// ─────────────────────────────────────────────
function getAgilityBankDelayMs(agilityLevel) {
  const lvl = Math.max(1, Math.min(99, agilityLevel))
  const t = (lvl - 1) / 98
  return Math.round(AGILITY_BANK_DELAY_LV1_MS + t * (AGILITY_BANK_DELAY_LV99_MS - AGILITY_BANK_DELAY_LV1_MS))
}
function getAgilityBankDelayFromStats(stats) {
  const agilityXP = stats?.agility?.xp || 0
  const agilityLevel = getLevelFromXP(agilityXP)
  return getAgilityBankDelayMs(agilityLevel)
}
function formatBankDelay(ms) {
  const totalSeconds = Math.round(ms / 1000)
  const mins = Math.floor(totalSeconds / 60)
  const secs = totalSeconds % 60
  if (mins > 0 && secs > 0) return `${mins}m ${secs}s`
  if (mins > 0) return `${mins}m`
  return `${secs}s`
}
function createAgilityState(action) {
  return { active: true, action, ticksRemaining: action.ticks, tickCount: 0 }
}
function processAgilityTick(agilityState) {
  const state = { ...agilityState }
  const events = []
  state.tickCount++
  state.ticksRemaining--
  if (state.ticksRemaining <= 0) {
    events.push({ type: 'courseComplete', xp: state.action.xp, coinReward: state.action.coinReward || 0, actionName: state.action.name })
    state.ticksRemaining = state.action.ticks
  }
  return { agilityState: state, events }
}
function simulateIdleAgility(task, elapsedMs) {
  if (!task || !task.action) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  const laps = Math.floor(totalTicks / task.action.ticks)
  if (laps <= 0) return null
  const xpGained = { agility: task.action.xp * laps }
  const coinsGained = (task.action.coinReward || 0) * laps
  return { xpGained, coinsGained, laps, skill: 'agility', actionName: task.action.name }
}

// ─────────────────────────────────────────────
// INLINED ENGINE: idle skilling / gather / combat
// ─────────────────────────────────────────────
function simulateIdleSkilling(task, elapsedMs, bank) {
  if (!task || !task.action) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  const actionTicks = task.action.ticks
  let actions = Math.floor(totalTicks / actionTicks)
  if (actions <= 0) return null
  const itemsConsumed = {}
  if (task.action.materials) {
    let maxFromMaterials = Infinity
    for (const [itemId, qtyPerAction] of Object.entries(task.action.materials)) {
      const available = (bank && bank[itemId]) ? bank[itemId].quantity : 0
      const possible = Math.floor(available / qtyPerAction)
      if (possible < maxFromMaterials) maxFromMaterials = possible
    }
    if (maxFromMaterials === 0) return null
    actions = Math.min(actions, maxFromMaterials)
    for (const [itemId, qtyPerAction] of Object.entries(task.action.materials)) {
      itemsConsumed[itemId] = qtyPerAction * actions
    }
  }
  const xpGained = {}
  const itemsGained = {}
  const xpPer = task.action.xp || 0
  if (xpPer > 0 && task.skill) xpGained[task.skill] = xpPer * actions
  if (task.action.product) {
    const qty = (task.action.productQty || 1) * actions
    itemsGained[task.action.product] = qty
  }
  return { xpGained, itemsGained, itemsConsumed, actions, skill: task.skill, actionName: task.action.name }
}

function simulateIdleGather(task, elapsedMs) {
  if (!task || !task.gatherTask) return null
  const totalTicks = Math.floor(elapsedMs / TICK_MS)
  const actions = Math.floor(totalTicks / task.gatherTask.ticks)
  if (actions <= 0) return null
  const itemsGained = {}
  const qty = (task.gatherTask.qty || 1) * actions
  itemsGained[task.gatherTask.product] = qty
  return { itemsGained, actions, actionName: task.gatherTask.name }
}

// ─────────────────────────────────────────────
// INLINED ENGINE: canPerformAction + auto-bank
// ─────────────────────────────────────────────
function canPerformAction(inventory, bank, action) {
  if (!action.materials) return true
  for (const [itemId, qty] of Object.entries(action.materials)) {
    const inv = countItem(inventory, itemId)
    const bnk = bank[itemId]?.quantity || 0
    if (inv + bnk < qty) return false
  }
  return true
}

function autoBank(inventory, bank) {
  const newBank = { ...bank }
  const newInv = [...inventory]
  for (let i = 0; i < newInv.length; i++) {
    if (!newInv[i]) continue
    const slot = newInv[i]
    if (newBank[slot.itemId]) {
      newBank[slot.itemId] = { ...newBank[slot.itemId], quantity: newBank[slot.itemId].quantity + slot.quantity }
    } else {
      newBank[slot.itemId] = { itemId: slot.itemId, quantity: slot.quantity }
    }
    newInv[i] = null
  }
  return { inventory: newInv, bank: newBank }
}

// ─────────────────────────────────────────────
// TEST HARNESS
// ─────────────────────────────────────────────
const results = []
let currentGroup = null

function group(name) {
  currentGroup = name
}

function assert(name, condition, detail) {
  results.push({ group: currentGroup, name, pass: !!condition, detail: detail || '' })
}

// ─────────────────────────────────────────────
// RUN ALL TESTS
// ─────────────────────────────────────────────
function runAll() {

  // ── GROUP 1: XP & Leveling ──
  group('XP & Leveling')
  assert('Level 1 starts at 0 XP', getXPForLevel(1) === 0, `got ${getXPForLevel(1)}`)
  assert('Level 10 HP start XP = 1154', getXPForLevel(10) === 1154, `got ${getXPForLevel(10)}`)
  assert('Level 2 XP > 0', getXPForLevel(2) > 0, `got ${getXPForLevel(2)}`)
  assert('Level 99 XP = 13034431', getXPForLevel(99) === 13034431, `got ${getXPForLevel(99)}`)
  assert('getLevelFromXP(0) = 1', getLevelFromXP(0) === 1)
  assert('getLevelFromXP(1154) = 10', getLevelFromXP(1154) === 10, `got ${getLevelFromXP(1154)}`)
  assert('getLevelFromXP(13034431) = 99', getLevelFromXP(13034431) === 99, `got ${getLevelFromXP(13034431)}`)
  assert('getLevelFromXP(-1) = 1', getLevelFromXP(-1) === 1)
  assert('Level caps at 99', getLevelFromXP(MAX_XP) === 99)
  assert('XP table is monotonic', (() => {
    for (let i = 2; i <= 99; i++) if (getXPForLevel(i) <= getXPForLevel(i-1)) return false
    return true
  })(), 'table not monotonically increasing')
  assert('getLevelFromXP(getXPForLevel(50)) = 50', getLevelFromXP(getXPForLevel(50)) === 50, `got ${getLevelFromXP(getXPForLevel(50))}`)
  assert('getLevelFromXP(getXPForLevel(75)) = 75', getLevelFromXP(getXPForLevel(75)) === 75)
  assert('getLevelFromXP(getXPForLevel(99)-1) = 98', getLevelFromXP(getXPForLevel(99) - 1) === 98)
  assert('Level 5 XP > Level 4 XP', getXPForLevel(5) > getXPForLevel(4))
  assert('XP for level 1 = 0', XP_TABLE[1] === 0)
  assert('XP for level 2 = 83', XP_TABLE[2] === 83, `got ${XP_TABLE[2]}`)
  assert('getLevelFromXP(83) = 2', getLevelFromXP(83) === 2, `got ${getLevelFromXP(83)}`)

  // ── GROUP 2: Combat Formulas ──
  group('Combat Formulas')
  assert('effectiveStrength lv1 no bonus = 9', effectiveStrength(1) === 9, `got ${effectiveStrength(1)}`)
  assert('effectiveStrength lv99 = 107', effectiveStrength(99) === 107, `got ${effectiveStrength(99)}`)
  assert('meleeMaxHit lv1 = 1', meleeMaxHit(effectiveStrength(1), 0) >= 1)
  assert('meleeMaxHit lv99 bonuses = expected', (() => { const h = meleeMaxHit(effectiveStrength(99, 0, 1, 3), 64); return h > 0 })())
  assert('maxAttackRoll positive', maxAttackRoll(effectiveAttack(40), 20) > 0)
  assert('maxDefenceRoll positive', maxDefenceRoll(30, 10) > 0)
  assert('hitChance high atk > 0.5', hitChance(10000, 100) > 0.5)
  assert('hitChance low atk < 0.5', hitChance(100, 10000) < 0.5)
  assert('hitChance equal ~ 0.333', Math.abs(hitChance(100, 100) - 1/3) < 0.01, `got ${hitChance(100,100).toFixed(4)}`)
  assert('hitChance is 0-1', (() => { for (let i=10; i<1000; i+=37) { const h = hitChance(i, 500); if (h<0||h>1) return false } return true })())
  assert('getMeleeStyleBonuses accurate gives +3 atk', getMeleeStyleBonuses('accurate').attackStyleBonus === 3)
  assert('getMeleeStyleBonuses aggressive gives +3 str', getMeleeStyleBonuses('aggressive').strengthStyleBonus === 3)
  assert('getMeleeStyleBonuses defensive gives +3 def', getMeleeStyleBonuses('defensive').defenceStyleBonus === 3)

  // ── GROUP 3: Equipment Bonuses ──
  group('Equipment Bonuses')
  const emptyEq = {}
  const itemsData = {
    bronze_sword: { attackBonus: { slash: 7 }, defenceBonus: {}, otherBonus: { meleeStrength: 6 }, attackSpeed: 4, attackStyle: 'slash' },
    iron_chainbody: { attackBonus: {}, defenceBonus: { slash: 13 }, otherBonus: {} }
  }
  const eq1 = { weapon: { itemId: 'bronze_sword' }, body: { itemId: 'iron_chainbody' } }
  const bonuses1 = getEquipmentBonuses(eq1, itemsData)
  assert('Weapon slash bonus applied', bonuses1.attackBonus.slash === 7, `got ${bonuses1.attackBonus.slash}`)
  assert('Body defence slash applied', bonuses1.defenceBonus.slash === 13, `got ${bonuses1.defenceBonus.slash}`)
  assert('Other meleeStrength applied', bonuses1.otherBonus.meleeStrength === 6, `got ${bonuses1.otherBonus.meleeStrength}`)
  assert('Empty eq all zeros', (() => { const b = getEquipmentBonuses({}, {}); return b.attackBonus.slash === 0 && b.otherBonus.meleeStrength === 0 })())
  assert('getAttackSpeed no weapon = 4', getAttackSpeed({}, {}) === 4)
  assert('getAttackSpeed with weapon', getAttackSpeed(eq1, itemsData) === 4, `got ${getAttackSpeed(eq1, itemsData)}`)
  assert('getAttackStyle no weapon = crush', getAttackStyle({}, {}) === 'crush')
  assert('getAttackStyle with weapon = slash', getAttackStyle(eq1, itemsData) === 'slash', `got ${getAttackStyle(eq1, itemsData)}`)

  // ── GROUP 4: Inventory ──
  group('Inventory')
  const inv = () => new Array(INVENTORY_SIZE).fill(null)
  assert('Empty inv has 28 free slots', freeSlots(inv()) === 28)
  const i1 = inv()
  addItem(i1, 'logs', 1, false)
  assert('After add 1 item, 27 free', freeSlots(i1) === 27)
  assert('countItem finds 1', countItem(i1, 'logs') === 1)
  addItem(i1, 'logs', 1, false)
  assert('Non-stackable uses second slot', freeSlots(i1) === 26)
  const i2 = inv()
  addItem(i2, 'coins', 100, true)
  assert('Stackable coins uses 1 slot', freeSlots(i2) === 27)
  addItem(i2, 'coins', 50, true)
  assert('Stackable coins stacks', countItem(i2, 'coins') === 150)
  removeItem(i2, 'coins', 50)
  assert('Remove 50 coins leaves 100', countItem(i2, 'coins') === 100)
  const fullInv = new Array(INVENTORY_SIZE).fill({ itemId: 'logs', quantity: 1 })
  assert('Full inv add fails', addItem(fullInv, 'logs', 1, false) === false)
  assert('freeSlots full inv = 0', freeSlots(fullInv) === 0)
  const i3 = inv()
  addItem(i3, 'x', 5, false)
  assert('Add 5 non-stackable uses 5 slots', freeSlots(i3) === 23)

  // ── GROUP 5: formatIdleTime ──
  group('formatIdleTime')
  assert('0ms = 0s', formatIdleTime(0) === '0s')
  assert('1000ms = 1s', formatIdleTime(1000) === '1s')
  assert('60000ms = 1m', formatIdleTime(60000) === '1m')
  assert('61000ms = 1m 1s', formatIdleTime(61000) === '1m 1s')
  assert('3600000ms = 1h', formatIdleTime(3600000) === '1h')
  assert('3661000ms = 1h 1m 1s', formatIdleTime(3661000) === '1h 1m 1s')
  assert('86400000ms = 1d', formatIdleTime(86400000) === '1d')
  assert('90061000ms = 1d 1h 1m 1s', formatIdleTime(90061000) === '1d 1h 1m 1s')
  assert('500ms rounds to 0s', formatIdleTime(500) === '0s')
  assert('Never empty string', formatIdleTime(0) !== '')

  // ── GROUP 6: simulateIdleSkilling ──
  group('simulateIdleSkilling')
  const logAction = { id: 'normal_logs', name: 'Normal Logs', level: 1, xp: 25, ticks: 4, product: 'logs' }
  const wc1 = simulateIdleSkilling({ type: 'skill', skill: 'woodcutting', action: logAction }, 60000, {})
  assert('WC 60s → 100 ticks → 25 actions', wc1 && wc1.actions === 25, `got ${wc1?.actions}`)
  assert('WC XP = 25 * 25 = 625', wc1 && wc1.xpGained.woodcutting === 625, `got ${wc1?.xpGained?.woodcutting}`)
  assert('WC product = logs', wc1 && wc1.itemsGained.logs === 25, `got ${wc1?.itemsGained?.logs}`)
  const noTask = simulateIdleSkilling(null, 60000, {})
  assert('Null task returns null', noTask === null)
  const smeltAction = { id: 'bronze_bar', name: 'Bronze Bar', level: 1, xp: 6, ticks: 3, product: 'bronze_bar', materials: { tin_ore: 1, copper_ore: 1 } }
  const bankWith = { tin_ore: { quantity: 10 }, copper_ore: { quantity: 10 } }
  const sm1 = simulateIdleSkilling({ type: 'skill', skill: 'smithing', action: smeltAction }, 60000, bankWith)
  assert('Smithing capped by materials', sm1 && sm1.actions === 10, `got ${sm1?.actions}`)
  assert('Smithing consumed tin', sm1 && sm1.itemsConsumed.tin_ore === 10)
  const sm2 = simulateIdleSkilling({ type: 'skill', skill: 'smithing', action: smeltAction }, 60000, {})
  assert('No materials returns null', sm2 === null)

  // ── GROUP 7: simulateIdleGather ──
  group('simulateIdleGather')
  const flaxTask = { gatherTask: { name: 'Pick Flax', product: 'flax', ticks: 3, qty: 1 } }
  const g1 = simulateIdleGather(flaxTask, 60000)

  const chicken = { id: 'chicken', name: 'Chicken', combatLevel: 1, hitpoints: 3, stats: { attack: 1, defence: 1, strength: 1 }, attackSpeed: 4, drops: [{ itemId: 'raw_chicken', quantity: 1, chance: 1.0 }] }
  const cowMonster = { id: 'cow', name: 'Cow', combatLevel: 2, hitpoints: 8, stats: { attack: 2, defence: 2, strength: 2 }, attackSpeed: 4, drops: [{ itemId: 'cowhide', quantity: 1, chance: 1.0 }] }
  const baseStats = { attack: { xp: getXPForLevel(40) }, strength: { xp: getXPForLevel(40) }, defence: { xp: getXPForLevel(40) } }
  const highStats = { attack: { xp: getXPForLevel(99) }, strength: { xp: getXPForLevel(99) }, defence: { xp: getXPForLevel(99) } }
  const noEq = {}

  function simCombat(monster, elapsedMs, stats, equipment, inventory) {
    if (!monster) return null
    const totalTicks = Math.floor(elapsedMs / TICK_MS)
    if (totalTicks <= 0) return null
    const pStats = {
      attack:   getLevelFromXP(stats.attack?.xp || 0),
      strength: getLevelFromXP(stats.strength?.xp || 0),
      defence:  getLevelFromXP(stats.defence?.xp || 0)
    }
    const bonuses = getEquipmentBonuses(equipment, {})
    const weaponSpeed = getAttackSpeed(equipment, {})
    const styleBonuses = getMeleeStyleBonuses('accurate')
    const effStr = effectiveStrength(pStats.strength, 0, 1.0, styleBonuses.strengthStyleBonus)
    const maxHit = meleeMaxHit(effStr, bonuses.otherBonus.meleeStrength)
    const effAtk = effectiveAttack(pStats.attack, 0, 1.0, styleBonuses.attackStyleBonus)
    const atkRoll = maxAttackRoll(effAtk, bonuses.attackBonus.crush || 0)
    const defRoll = maxDefenceRoll(monster.stats.defence, 0)
    const acc = hitChance(atkRoll, defRoll)
    const avgDmg = acc * (maxHit / 2)
    const hitsNeeded = avgDmg > 0 ? Math.ceil(monster.hitpoints / avgDmg) : Infinity
    const ticksPerKill = hitsNeeded < Infinity ? 1 + (hitsNeeded - 1) * weaponSpeed : Infinity
    const RESPAWN_TICKS = 2
    const ticksPerCycle = ticksPerKill < Infinity ? ticksPerKill + RESPAWN_TICKS : Infinity
    const monstersKilled = ticksPerCycle < Infinity ? Math.floor(totalTicks / ticksPerCycle) : 0
    if (monstersKilled <= 0) return { xpGained: {}, lootGained: {}, monstersKilled: 0, lootLost: {} }
    const xpGained = {}
    xpGained.attack = Math.floor(monster.hitpoints * MELEE_XP_PER_DAMAGE) * monstersKilled
    xpGained.hitpoints = Math.floor(monster.hitpoints * HP_XP_PER_DAMAGE) * monstersKilled
    const newInv = [...inventory]
    const lootGained = {}
    const lootLost = {}
    for (let k = 0; k < monstersKilled; k++) {
      for (const drop of (monster.drops || [])) {
        if (Math.random() < drop.chance) {
          const qty = Array.isArray(drop.quantity) ? drop.quantity[0] : drop.quantity
          const empty = newInv.indexOf(null)
          if (empty !== -1) { newInv[empty] = { itemId: drop.itemId, quantity: qty }; lootGained[drop.itemId] = (lootGained[drop.itemId] || 0) + qty }
          else { lootLost[drop.itemId] = (lootLost[drop.itemId] || 0) + qty }
        }
      }
    }
    return { xpGained, lootGained, lootLost, monstersKilled, finalInventory: newInv }
  }

  group('Combat Level')
  function calcCombatLevel(attack, strength, defence, hitpoints, ranged, magic, prayer) {
    const base = 0.25 * (defence + hitpoints + Math.floor(prayer / 2))
    const melee = 0.325 * (attack + strength)
    const rangedCb = 0.325 * Math.floor(3 * ranged / 2)
    const magicCb = 0.325 * Math.floor(3 * magic / 2)
    return Math.floor(base + Math.max(melee, rangedCb, magicCb))
  }

  const smeltBronze = { id: 'bronze_bar', xp: 6, ticks: 3, product: 'bronze_bar', materials: { tin_ore: 1, copper_ore: 1 } }
  const mixedBank = { tin_ore: { quantity: 20 }, copper_ore: { quantity: 15 } }
  const smSim = simulateIdleSkilling({ type: 'skill', skill: 'smithing', action: smeltBronze }, 3600000, mixedBank)
  assert('Bronze: limited by copper (15)', smSim && smSim.actions === 15, `got ${smSim?.actions}`)
  assert('Bronze: consumed 15 tin_ore', smSim && smSim.itemsConsumed.tin_ore === 15)
  assert('Bronze: consumed 15 copper_ore', smSim && smSim.itemsConsumed.copper_ore === 15)
  assert('Bronze: produced 15 bronze_bar', smSim && smSim.itemsGained.bronze_bar === 15)
  const bigBank = { tin_ore: { quantity: 10000 }, copper_ore: { quantity: 10000 } }
  const bigSim = simulateIdleSkilling({ type: 'skill', skill: 'smithing', action: smeltBronze }, 3600000, bigBank)
  assert('Bronze 1hr: time-limited not material-limited', bigSim && bigSim.actions > 0 && bigSim.actions < 10000)
  assert('Woodcutting has no itemsConsumed', wc1 && !wc1.itemsConsumed.logs)

  // ── GROUP 25: Idle Agility Simulation ──
  group('Idle Agility Simulation')
  const varrocAction = { id: 'varrock', name: 'Varrock Rooftop', level: 30, ticks: 75, xp: 238, coinReward: 90 }
  const vResult = simulateIdleAgility({ action: varrocAction }, 3600000)
  const vLaps = Math.floor(Math.floor(3600000 / TICK_MS) / varrocAction.ticks)
  assert('Varrock: correct laps', vResult && vResult.laps === vLaps, `expected ${vLaps}, got ${vResult?.laps}`)
  assert('Varrock: XP = laps * 238', vResult && vResult.xpGained.agility === vLaps * 238, `expected ${vLaps*238}, got ${vResult?.xpGained?.agility}`)
  assert('Varrock: coins = laps * 90', vResult && vResult.coinsGained === vLaps * 90, `expected ${vLaps*90}, got ${vResult?.coinsGained}`)

  // Faster course = more laps
  const seersAction = { id: 'seers_village', name: "Seers' Village Rooftop", level: 60, ticks: 60, xp: 570, coinReward: 300 }
  const sResult = simulateIdleAgility({ action: seersAction }, 3600000)
  assert('Faster course has more laps', sResult && vResult && sResult.laps > vResult.laps)

  // Short time — under 1 lap
  const shortSim = simulateIdleAgility({ action: gnomeAction }, gnomeAction.ticks * TICK_MS - 1)
  assert('Under 1 lap returns null', shortSim === null)

  // Exactly 1 lap worth of time
  const exactOneLap = simulateIdleAgility({ action: gnomeAction }, gnomeAction.ticks * TICK_MS)
  assert('Exactly 1 lap = 1 lap', exactOneLap && exactOneLap.laps === 1, `got ${exactOneLap?.laps}`)
  assert('Exactly 1 lap xp = 86', exactOneLap && exactOneLap.xpGained.agility === 86, `got ${exactOneLap?.xpGained?.agility}`)
  assert('Exactly 1 lap coins = 10', exactOneLap && exactOneLap.coinsGained === 10, `got ${exactOneLap?.coinsGained}`)

  // No coin reward course
  const noCoinsAction = { id: 'test', name: 'No Coins', level: 1, ticks: 50, xp: 100, coinReward: 0 }
  const ncResult = simulateIdleAgility({ action: noCoinsAction }, 3600000)
  assert('Zero coinReward: coinsGained = 0', ncResult && ncResult.coinsGained === 0, `got ${ncResult?.coinsGained}`)

  // actionName propagated
  assert('actionName propagated in result', gnomeResult && gnomeResult.actionName === gnomeAction.name)
}

// ─────────────────────────────────────────────
// RENDER RESULTS
// ─────────────────────────────────────────────
function renderResults() {
  runAll()

  const groups = {}
  for (const r of results) {
    if (!groups[r.group]) groups[r.group] = []
    groups[r.group].push(r)
  }

  const totalPass = results.filter(r => r.pass).length
  const totalFail = results.filter(r => !r.pass).length
  const total = results.length

  document.getElementById('subtitle').textContent = `${total} assertions across ${Object.keys(groups).length} groups`

  const summaryEl = document.getElementById('summary')
  summaryEl.innerHTML = `
    <div class="summary-box"><div class="num pass">${totalPass}</div><div class="lbl">Passed</div></div>
    <div class="summary-box"><div class="num ${totalFail > 0 ? 'fail' : 'pass'}">${totalFail}</div><div class="lbl">Failed</div></div>
    <div class="summary-box"><div class="num">${total}</div><div class="lbl">Total</div></div>
    <div class="summary-box"><div class="num ${totalFail === 0 ? 'pass' : 'fail'}">${Math.round(100 * totalPass / total)}%</div><div class="lbl">Pass Rate</div></div>
  `

  const resultsEl = document.getElementById('results')
  resultsEl.innerHTML = ''

  // Always open failing groups, collapse passing ones
  for (const [groupName, groupResults] of Object.entries(groups)) {
    const pass = groupResults.filter(r => r.pass).length
    const fail = groupResults.filter(r => !r.pass).length
    const allPass = fail === 0

    const groupEl = document.createElement('div')
    groupEl.className = 'group'

    const header = document.createElement('div')
    header.className = 'group-header'
    header.innerHTML = `
      <span class="group-title ${allPass ? 'pass' : 'fail'}">${allPass ? '✓' : '✗'} ${groupName}</span>
      <span class="badge ${allPass ? 'badge-pass' : 'badge-fail'}">${pass}/${pass + fail}</span>
    `

    const body = document.createElement('div')
    body.className = 'group-body' + (!allPass ? ' open' : '')

    for (const r of groupResults) {
      const testEl = document.createElement('div')
      testEl.className = 'test'
      testEl.innerHTML = `
        <div class="test-name">
          <div class="dot ${r.pass ? 'dot-pass' : 'dot-fail'}"></div>
          <span class="${r.pass ? 'pass' : 'fail'}">${r.name}</span>
        </div>
        ${r.detail ? `<div class="test-detail">${r.detail}</div>` : ''}
      `
      body.appendChild(testEl)
    }

    header.onclick = () => body.classList.toggle('open')
    groupEl.appendChild(header)
    groupEl.appendChild(body)
    resultsEl.appendChild(groupEl)
  }
}
